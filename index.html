<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Dysfunctional Family</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#0a0a1a; overflow:hidden; font-family:monospace; }

#loading {
position:fixed; inset:0; background:#0a0a1a;
display:flex; flex-direction:column; align-items:center; justify-content:center;
gap:16px; z-index:999; color:#f5c842;
}
#lbw { width:220px; height:12px; border:2px solid #f5c842; border-radius:2px; overflow:hidden; }
#lb  { height:100%; width:0%; background:#f5c842; transition:width .3s; }
#loading p { font-size:11px; letter-spacing:2px; }

#title, #charselect { position:fixed; inset:0; display:none; z-index:90; }
#title canvas, #charselect canvas { width:100%; height:100%; image-rendering:pixelated; }

#hud {
position:fixed; top:0; left:0; right:0; display:none;
justify-content:space-between; align-items:center;
padding:6px 12px; background:rgba(0,0,0,.85);
color:#f5c842; font-size:clamp(7px,2vw,10px);
letter-spacing:1px; z-index:50; border-bottom:1px solid #f5c84222;
}

#game-wrap {
position:fixed; inset:0; display:none;
align-items:center; justify-content:center;
}
#gc { image-rendering:pixelated; display:block; }

/* Mobile controls */
#controls {
position:fixed; bottom:10px; left:0; right:0;
display:none; justify-content:space-between; align-items:flex-end;
padding:0 16px; z-index:60; pointer-events:none;
}
#ctrl-left-group { display:flex; gap:6px; pointer-events:all; }
#ctrl-right-group { pointer-events:all; }
.ctrl-btn {
width:58px; height:58px;
background:rgba(245,200,66,0.15);
border:2px solid rgba(245,200,66,0.4);
border-radius:10px; color:#f5c842; font-size:24px;
display:flex; align-items:center; justify-content:center;
user-select:none; touch-action:none; cursor:pointer;
-webkit-tap-highlight-color:transparent;
}
.ctrl-btn:active,.ctrl-btn.on { background:rgba(245,200,66,0.38); }
#btn-jump { width:68px; height:68px; font-size:28px; border-radius:50%; }
#btn-ability { width:58px; height:58px; background:rgba(100,200,255,0.15); border-color:rgba(100,200,255,0.4); color:#64c8ff; }
#btn-ability:active,#btn-ability.on { background:rgba(100,200,255,0.38); }

.overlay {
position:fixed; inset:0; background:rgba(0,0,0,.92);
display:none; flex-direction:column; align-items:center; justify-content:center;
gap:18px; z-index:200; color:#f5c842; text-align:center;
}
.overlay h2 { font-size:clamp(14px,4vw,24px); letter-spacing:3px; }
.overlay p  { font-size:clamp(8px,2vw,11px); color:#ccc; line-height:2.2; }
.overlay button {
font-family:monospace; background:#f5c842; color:#0a0a0f;
border:none; padding:12px 30px; font-size:clamp(9px,2vw,12px);
cursor:pointer; letter-spacing:2px; box-shadow:4px 4px 0 #7a4a00;
}
.overlay button:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #7a4a00; }
#win h2      { text-shadow:0 0 24px #f5c842; }
#gameover h2 { text-shadow:0 0 24px #cc3333; }
</style>
</head>
<body>

<div id="loading">
  <p>LOADING...</p>
  <div id="lbw"><div id="lb"></div></div>
</div>

<div id="transition" style="position:fixed;inset:0;background:#0a0a1a;z-index:500;pointer-events:none;opacity:0;transition:opacity 0.4s;"></div>

<div id="title" style="position:fixed;inset:0;display:none;z-index:90;">
  <canvas id="title-canvas" style="width:100%;height:100%;"></canvas>
</div>

<div id="charselect" style="position:fixed;inset:0;display:none;z-index:90;">
  <canvas id="charselect-canvas" style="width:100%;height:100%;"></canvas>
</div>

<div id="hud">
  <span id="hud-hp" style="display:none;">❤❤❤</span>
  <span>DYSFUNCTIONAL FAMILY</span>
  <span id="hud-coins">COINS: 0</span>
</div>

<div id="game-wrap"><canvas id="gc"></canvas></div>

<!-- Mobile controls -->
<div id="controls">
  <div id="ctrl-left-group">
    <div class="ctrl-btn" id="btn-left">◀</div>
    <div class="ctrl-btn" id="btn-right">▶</div>
  </div>
  <div id="ctrl-right-group">
    <div class="ctrl-btn" id="btn-ability">⚡</div>
    <div class="ctrl-btn" id="btn-jump">▲</div>
  </div>
</div>

<div id="win" class="overlay">
  <h2>YOU WIN!</h2>
  <p>You survived your dysfunctional family!</p>
  <div id="win-stats"></div>
  <button onclick="location.reload()">PLAY AGAIN</button>
</div>

<div id="gameover" class="overlay">
  <h2>GAME OVER</h2>
  <p>Your family was too much for you!</p>
  <div id="gameover-stats"></div>
  <button onclick="location.reload()">PLAY AGAIN</button>
</div>

<div id="pause" style="position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:200;color:#f5c842;text-align:center;">
  <h2 style="font-size:clamp(14px,4vw,24px);text-shadow:0 0 24px #f5c842;letter-spacing:3px;">PAUSED</h2>
  <button onclick="resumeGame()" style="font-family:monospace;background:#f5c842;color:#0a0a0f;border:none;padding:12px 30px;font-size:clamp(9px,2vw,12px);cursor:pointer;letter-spacing:2px;box-shadow:4px 4px 0 #7a4a00;">RESUME</button>
  <button onclick="restartGame()" style="font-family:monospace;background:#dd8800;color:#fff;border:none;padding:12px 30px;font-size:clamp(9px,2vw,12px);cursor:pointer;letter-spacing:2px;box-shadow:4px 4px 0 #7a4400;">RESTART</button>
  <button id="mute-btn" onclick="toggleMute()" style="font-family:monospace;background:#666666;color:#fff;border:none;padding:12px 30px;font-size:clamp(9px,2vw,12px);cursor:pointer;letter-spacing:2px;box-shadow:4px 4px 0 #333333;">🔊 MUSIC: ON</button>
  <button onclick="location.reload()" style="font-family:monospace;background:#cc3333;color:#fff;border:none;padding:12px 30px;font-size:clamp(9px,2vw,12px);cursor:pointer;letter-spacing:2px;box-shadow:4px 4px 0 #7a1a00;">QUIT</button>
  <div style="margin-top:12px;font-size:clamp(7px,1.5vw,9px);color:#aaa;line-height:1.8;">
    ARROWS/WASD: MOVE | SPACE: JUMP | E: ABILITY | ESC: PAUSE

</div>

// ═══════════════════════════════════════════════════
//  WEB AUDIO API
// ═══════════════════════════════════════════════════
let audioCtx = null;
let musicNodes = null;
let musicMuted = false;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function sfxJump() {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(200, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(400, ctx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.15);
}

function sfxStomp() {
  const ctx = ensureAudio();
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();
  osc1.type = 'triangle';
  osc1.frequency.setValueAtTime(80, ctx.currentTime);
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(800, ctx.currentTime);
  osc2.frequency.linearRampToValueAtTime(1200, ctx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
  osc1.connect(gain).connect(ctx.destination);
  osc2.connect(gain).connect(ctx.destination);
  osc1.start(); osc1.stop(ctx.currentTime + 0.12);
  osc2.start(); osc2.stop(ctx.currentTime + 0.12);
}

  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.frequency.setValueAtTime(880, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(1320, ctx.currentTime + 0.08);

}

}

function sfxPowerUp() {
  const ctx = ensureAudio();
  const notes = [440, 660, 880];
  let currentTime = ctx.currentTime;
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, currentTime);
    gain.gain.setValueAtTime(0.1, currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, currentTime + 0.12);
    osc.connect(gain).connect(ctx.destination);
    osc.start(currentTime); osc.stop(currentTime + 0.12);
    currentTime += 0.1;
  });
}

function sfxBossRoar() {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(60, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(90, ctx.currentTime + 0.4);
  filter.type = 'highpass';
  filter.frequency.setValueAtTime(80, ctx.currentTime);
  gain.gain.setValueAtTime(0.2, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
  osc.connect(filter).connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.5);
}

function bgMusic() {
  if (musicMuted) return;
  const actx = ensureAudio();

  const master = actx.createGain();
  master.gain.setValueAtTime(0.25, actx.currentTime);
  master.connect(actx.destination);

  const nodes = { playing: true, masterGain: master };
  musicNodes = nodes;

  const BPM  = 142;
  const STEP = 60 / BPM / 2;   // 8th-note ≈ 0.211 s
  const LEN  = 32;

  // D-minor chiptune — 4 bars (Dm - Bb - F - A progression)
  const MELODY = [
    587,  0, 698,  0, 659, 587, 523, 440,  // bar 1: D5 - F5 - E5 D5 C5 A4
    466,  0, 587,  0, 698, 659, 587,   0,  // bar 2: Bb4 - D5 - F5 E5 D5 -
    440,  0, 523, 659, 440, 392, 349,   0,  // bar 3: A4 - C5 E5 A4 G4 F4 -
    330,  0, 440,  0, 523, 466, 440,   0,  // bar 4: E4 - A4 - C5 Bb4 A4 -
  ];
  const BASS = [
    147, 0, 0, 0, 117, 0, 0, 0,  // D3 ... Bb2 ...
     87, 0, 0, 0, 110, 0, 0, 0,  // F2 ... A2 ...
    110, 0, 0, 0,  98, 0, 0, 0,  // A2 ... G2 ...
     87, 0, 0, 0, 110, 0, 0, 0,  // F2 ... A2 ...
  ];
  // kick on beats 1 & 3, snare on beats 2 & 4 (per bar of 8 eighth notes)
  const KICK_PAT  = Array.from({length:4}, ()=>[1,0,0,0,1,0,0,0]).flat();
  const SNARE_PAT = Array.from({length:4}, ()=>[0,0,1,0,0,0,1,0]).flat();

  // One-time noise buffer reused for every snare hit
  const nBuf = actx.createBuffer(1, Math.ceil(actx.sampleRate * 0.06), actx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let k = 0; k < nd.length; k++) nd[k] = Math.random() * 2 - 1;

  function playKick(t) {
    const osc = actx.createOscillator(), g = actx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    g.gain.setValueAtTime(0.45, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(g).connect(master);
    osc.start(t); osc.stop(t + 0.15);
  }

  function playSnare(t) {
    const src = actx.createBufferSource(), filt = actx.createBiquadFilter(), g = actx.createGain();
    src.buffer = nBuf;
    filt.type = 'bandpass'; filt.frequency.value = 2000; filt.Q.value = 0.8;
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    src.connect(filt).connect(g).connect(master);
    src.start(t); src.stop(t + 0.08);
  }

  let step = 0;
  function tick(t) {
    if (!nodes.playing) return;
    const i = step % LEN;

    if (MELODY[i]) {
      const osc = actx.createOscillator(), g = actx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(MELODY[i], t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.15, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + STEP * 0.78);
      osc.connect(g).connect(master);
      osc.start(t); osc.stop(t + STEP);
    }

    if (BASS[i]) {
      const osc = actx.createOscillator(), g = actx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(BASS[i], t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.2, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + STEP * 1.8);
      osc.connect(g).connect(master);
      osc.start(t); osc.stop(t + STEP * 2);
    }

    if (KICK_PAT[i])  playKick(t);
    if (SNARE_PAT[i]) playSnare(t);

    step++;
    const next = t + STEP;
    setTimeout(() => tick(next), Math.max(0, (next - actx.currentTime - 0.05) * 1000));
  }

  tick(actx.currentTime + 0.05);
}

function stopMusic() {
  if (musicNodes) {
    musicNodes.playing = false;
    if (musicNodes.masterGain && audioCtx) {
      musicNodes.masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
    }
    musicNodes = null;
  }
}

function darkenColor(hex, factor=0.7) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.floor((n >> 16 & 255) * factor);
  const g = Math.floor((n >> 8 & 255) * factor);
  const b = Math.floor((n & 255) * factor);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function lightenColor(hex, factor=1.3) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, Math.floor((n >> 16 & 255) * factor));
  const g = Math.min(255, Math.floor((n >> 8 & 255) * factor));
  const b = Math.min(255, Math.floor((n & 255) * factor));
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function resolvePlatforms(dt){
  player.onGround = false;

  PLATFORMS.forEach(p => {
    const [px, py, pw, ph] = p;
    const pl = player;
    const pr = pl.x + pl.w;
    const pb = pl.y + pl.h;
    const isOneWay = (ph !== 32); // Thin platforms are one-way

    if (pr <= px || pl.x >= px + pw) return;

    // Landing on top (all platforms)
    if (pl.vy >= 0) {
      const prevBottom = pb - pl.vy * dt;
      if (prevBottom <= py && pb >= py) {
        pl.y  = py - pl.h;
        pl.vy = 0;
        pl.onGround = true;
      }
    }

    // Head bonk from below (solid platforms only)
    if (!isOneWay && pl.vy < 0) {
      const prevTop = pl.y - pl.vy * dt;
      if (prevTop >= py + ph && pl.y <= py + ph) {
        pl.vy = 0;
        pl.y  = py + ph;
      }
    }

    // Side collision (solid platforms only)
    if (!isOneWay) {
      if (pb > py + 4 && pl.y < py + ph) {
        if (pl.vx > 0 && pr > px   && pl.x < px)      { pl.x = px - pl.w; pl.vx = 0; }
        if (pl.vx < 0 && pl.x < px + pw && pr > px+pw){ pl.x = px + pw;   pl.vx = 0; }
      }
    }
  });

  if (player.y + player.h > VH + 100) {
    player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true;
  }
  if (player.x < 0)              { player.x = 0;              player.vx = 0; }
  if (player.x + player.w > LEVEL_W) { player.x = LEVEL_W - player.w; player.vx = 0; }
}

// ═══════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════
function update(dt, now){
  // Sub-step physics for frame-rate independence
  let remaining = Math.min(dt, 0.05); // Cap at 50ms to prevent spiral of death
  while (remaining > 0) {
    const pdt = Math.min(remaining, PHYS_STEP);
    remaining -= pdt;

    const goLeft  = keys['ArrowLeft'] ||keys['a']||mctrl.left;
  const goRight = keys['ArrowRight']||keys['d']||mctrl.right;
  const doJump  = keys[' ']||keys['ArrowUp']||keys['w']||mctrl.jump;
  const doAbility = keys['e']||keys['E']||mctrl.ability;

  let moveSpd = MOVE_SPD;
  if (player.powerUp === 'speed') moveSpd *= 1.5;

  if (goLeft)       player.vx = -moveSpd;
  else if (goRight) player.vx =  moveSpd;
  else              player.vx *= .75;

  if (doJump && !wasJumpDown) {
    // Coyote time: can jump for a brief window after leaving ground
    if (player.onGround || player.coyoteTimer > 0) {
      // Normal ground jump
      player.vy = JUMP_VEL;
      player.onGround = false;
      player.coyoteTimer = 0;  // Consume coyote
      player.hasDoubleJumped = false;
      sfxJump(); haptic([10]);
      player.jumpBufferTimer = 0;  // Clear buffer on successful jump
    } else if (!player.hasDoubleJumped && player.canDoubleJump) {
      // Double jump in mid-air
      player.vy = JUMP_VEL * 0.85;
      player.hasDoubleJumped = true;
      sfxJump(); haptic([10, 5, 10]);
      // Double jump dust burst
      for (let i = 0; i < 8; i++) {
        const angle = Math.random() * 6.28;
        dustParticles.push({
          x: player.x + player.w/2 + Math.cos(angle) * 6,
          y: player.y + player.h,
          vx: Math.cos(angle) * 35,
          vy: Math.sin(angle) * 20 + 10,
          life: 0.3,
          size: Math.random() * 2 + 1,
        });
      }
      // Quick squash/stretch for double jump feel
      playerSquash.sx = 0.7;
      playerSquash.sy = 1.3;
    } else {
      // Buffer the jump input for landing
      player.jumpBufferTimer = 0.12;
    }
  }
  wasJumpDown = doJump;

  // Coyote time: grace period after leaving ground
  if (player.onGround) {
    player.coyoteTimer = 0.1;
  } else {
    player.coyoteTimer -= pdt;
  }

  // Jump buffer: track if jump was pressed while in air
  player.jumpBufferTimer -= pdt;

  // Ability cooldown
  player.abilityTimer -= pdt;

  // Ability trigger
  if (doAbility && !wasAbilityDown && player.abilityTimer <= 0) {
    triggerAbility();
  }
  wasAbilityDown = doAbility;

  // Reset double jump when landing
  if (player.onGround) {
    player.hasDoubleJumped = false;
  }


  player.vy += GRAVITY * pdt;
  player.vy  = Math.min(player.vy, MAX_FALL);

  player.x += player.vx * pdt;
  player.y += player.vy * pdt;
  resolvePlatforms(pdt);

  // Input buffering: execute buffered jump on landing
  if (player.onGround && player.jumpBufferTimer > 0) {
    player.vy = JUMP_VEL;
    player.onGround = false;
    player.hasDoubleJumped = false;
    sfxJump(); haptic([10]);
    player.jumpBufferTimer = 0;
  }


  if (Math.abs(player.vx) > 10) {
    player.fTimer += pdt;
    if (player.fTimer > .1) { player.fTimer = 0; player.frame = (player.frame+1)%2; }
  } else {
    player.frame = 0;
  }

  const targetCam = player.x + player.w/2 - VW/3;
  camX += (targetCam - camX) * Math.min(pdt*10, 1);
  camX  = Math.max(0, Math.min(camX, LEVEL_W - VW));

  // Power-ups
  player.powerUpTimer -= pdt;
  if (player.powerUpTimer < 0) player.powerUp = null;

  // Magnet coin pull
  if (player.powerUp === 'magnet') {
    coins.forEach(c => {
      if (c.collected) return;
      const dx = player.x + player.w/2 - c.x;
      const dy = player.y + player.h/2 - c.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 80) {
        c.x += dx / dist * 100 * pdt;
        c.y += dy / dist * 100 * pdt;
      }

  }

  // Coin pickup
  coins.forEach(c => {
    if (c.collected) return;
    if (Math.abs(player.x+player.w/2 - c.x)<18 && Math.abs(player.y+player.h/2 - c.y)<18) {
      c.collected = true; coinsCollected++;
      score += 10;
      document.getElementById('hud-coins').textContent = `SCORE: ${score} | COINS: ${coinsCollected}`;
      spawnSparkles(c.x, c.y, 8, '#ffdd00');

  if (!flagReached && bossDefeated && Math.abs(player.x + player.w/2 - FLAG.x) < 60 && Math.abs(player.y + player.h/2 - FLAG.y) < 60) {

  for (let i = 0; i < CHECKPOINTS.length; i++) {

      sfxPowerUp();
      showMsg('CHECKPOINT!', 1200);
      spawnSparkles(cp.x, cp.y - 20, 12, '#ffd700');
    }
  }

  // Palm tree power-ups
  PALM_TREES.forEach(pt => {
    if (Math.abs(player.x + player.w/2 - pt.x) < 25 && Math.abs(player.y + player.h/2 - (GROUND_Y-20)) < 30) {
      if (player.powerUp !== pt.type) {
        player.powerUp = pt.type;
        player.powerUpTimer = pt.type === 'shield' ? 5 : pt.type === 'speed' ? 6 : 8;
        showMsg(pt.type.toUpperCase() + ' POWER UP!', 1500);
        sfxPowerUp();
      }
    }
  });

  // Enemy AI
  enemies.forEach(e => {
    const pdx = player.x + player.w/2 - e.x;
    const pdy = player.y + player.h/2 - e.y;
    const pdist = Math.hypot(pdx, pdy);

    // Behavior-specific logic
    if (e.behavior === 'charger') {
      // Knight: charges toward player when close
      if (pdist < 150 && Math.abs(pdx) > 0) {
        e.patrolVx = (pdx > 0 ? 1 : -1) * 80;
      } else {
        e.patrolVx = e.basePatrolVx * (pdx > 0 ? 1 : -1);
      }
    } else if (e.behavior === 'ambush') {
      // Rogue: stands still until player is close, then charges
      e.ambushTimer -= pdt;
      if (pdist < 100 && e.ambushTimer <= 0) {
        e.ambushTimer = 1.0;
        e.patrolVx = (pdx > 0 ? 1 : -1) * 100;
      } else if (e.ambushTimer <= 0) {
        e.patrolVx = 0;
      }
    } else if (e.behavior === 'kiter') {
      // Ranger: moves away from player when close
      if (pdist < 120) {
        e.patrolVx = (pdx > 0 ? -1 : 1) * 60;
      } else {
        e.patrolVx = 30 * (e.facing);
      }
    } else if (e.behavior === 'jumper') {
      // Ninja: patrols normally, periodically jumps
      e.jumpTimer -= pdt;
      if (e.jumpTimer <= 0) {
        e.vy = -200;
        e.jumpTimer = Math.random() * 2 + 2;
      }
      // Apply gravity to jumping ninjas
      e.vy += GRAVITY * pdt;
      e.y += e.vy * pdt;
    } else if (e.behavior === 'teleport') {
      // Mage: teleports periodically
      e.teleportTimer -= pdt;
      if (e.teleportTimer <= 0) {
        const oldX = e.x;
        const oldY = e.y;
        e.x = e.patrolLeft + Math.random() * (e.patrolRight - e.patrolLeft);
        e.teleportTimer = Math.random() * 2 + 2;
        // Spawn sparkles at old and new position
        for (let j = 0; j < 6; j++) {
          const angle = Math.random() * 6.28;
          sparkles.push({
            x: oldX + Math.cos(angle) * 2,
            y: oldY + Math.sin(angle) * 2,
            vx: Math.cos(angle) * 80,
            vy: Math.sin(angle) * 80,
            life: 0.4,
            color: '#9944ff',
          });
          sparkles.push({
            x: e.x + Math.cos(angle) * 2,
            y: e.y + Math.sin(angle) * 2,
            vx: Math.cos(angle) * 80,
            vy: Math.sin(angle) * 80,
            life: 0.4,
            color: '#9944ff',
          });
        }
      }
    } else if (e.behavior === 'sniper') {
      // Archer: stands in place or patrols slowly, fires faster
      // Keep default patrol
    }
    // Standard and tank behaviors use default patrol

    // Default patrol movement (scaled by difficulty)
    if (e.behavior !== 'teleport') {  // Teleport handles position differently
      const dm = getDifficultyMult();
      e.x += e.patrolVx * dm * pdt;
      if (e.x <= e.patrolLeft) { e.x = e.patrolLeft; e.patrolVx = Math.abs(e.patrolVx); }
      if (e.x >= e.patrolRight) { e.x = e.patrolRight; e.patrolVx = -Math.abs(e.patrolVx); }
    }

    e.facing = e.patrolVx > 0 ? 1 : -1;
    e.insultTimer -= pdt;

    if (e.insultTimer <= 0) {
      const insult = INSULTS[Math.floor(Math.random() * INSULTS.length)];
      e.insultTimer = e.insultCooldown;

      // Different cooldowns by behavior, reduced by difficulty
      const dm = getDifficultyMult();
      if (e.behavior === 'sniper') {
        e.insultCooldown = (Math.random() * 0.3 + 1.5) / dm;
      } else {
        e.insultCooldown = (Math.random() * 1.5 + 2.5) / dm;
      }

      // Show speech bubble above enemy
      showInsultAboveEnemy(e, insult);

      // Fire projectile
      const dx = player.x + player.w/2 - e.x;
      const dy = player.y + player.h/2 - e.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0) {
        // Sniper and kiter enemies fire faster projectiles
        let projSpeed = 90;
        if (e.behavior === 'sniper') {
          projSpeed = 130;
        } else if (e.behavior === 'kiter') {
          projSpeed = 110;
        }

        projectiles.push({
          x: e.x,
          y: e.y,
          vx: dx / dist * projSpeed,
          vy: dy / dist * projSpeed - 30,
          life: 4,
          insult: insult,
        });
      }
    }
  });

  // ═══════════════════════════════════════════════════
  // BOSS AI
  // ═══════════════════════════════════════════════════
  if (boss && !boss.defeated) {
    // Check if player entered boss arena (x > 2900)
    if (!boss.active && player.x > 2900) {
      boss.active = true;
      showMsg('CHARLA AWAKENS!', 2000);
      if (!boss.roarPlayed) {
        sfxBossRoar();
        screenShake.intensity = 8;
        screenShake.timer = 0.5;
        boss.roarPlayed = true;
      }
    }

    if (boss.active && !boss.defeated) {
      // Boss movement and attack patterns
      boss.invTimer -= pdt;
      boss.moveTimer -= pdt;
      boss.attackTimer -= pdt;
      boss.telegraphTimer -= pdt;

      // Hover movement - boss bobs up and down and moves horizontally
      // Swoops lower so player can stomp from platforms or well-timed ground jumps
      const baseY = GROUND_Y - 75;
      const hoverAmount = Math.sin(now / 1000) * 45 + Math.sin(now / 600) * 15;
      boss.targetY = baseY + hoverAmount;

      // Move towards target Y
      const yDiff = boss.targetY - boss.y;
      boss.vy += yDiff * 0.5 * pdt;
      boss.vy *= 0.95;
      boss.y += boss.vy * pdt;

      // Horizontal swooping movement - reduced speed during telegraph
      if (boss.moveTimer <= 0) {
        boss.moveTimer = 2 + Math.random() * 2;
        boss.vx = (Math.random() > 0.5 ? 1 : -1) * (80 + boss.maxHp - boss.hp) * 10;
      }
      if (!boss.telegraphing) {
        boss.x += boss.vx * pdt;
      } else {
        boss.x += boss.vx * pdt * 0.3; // Pause movement during telegraph
      }

      // Keep boss in arena bounds
      boss.x = Math.max(2920, Math.min(boss.x, 3450));

      // Determine attack type based on HP
      let attackType = 'normal';
      if (boss.hp <= 2) {
        attackType = 'firebreath';
      } else if (boss.hp === 3) {
        attackType = 'divebomb';
      }

      // Boss attacks (more aggressive as HP decreases)
      const attackInterval = 3 - (boss.maxHp - boss.hp) * 0.4;

      if (!boss.telegraphing && boss.attackTimer <= 0) {
        // Start telegraph phase
        boss.telegraphing = true;
        boss.telegraphTimer = 1.0;
        boss.telegraphType = attackType;
        boss.attackTimer = attackInterval;
        sfxBossWarn();
      }

      if (boss.telegraphing && boss.telegraphTimer <= 0) {
        // Execute the attack
        boss.telegraphing = false;

        if (boss.telegraphType === 'divebomb') {
          // Dive bomb attack: boss swoops down rapidly
          boss.y = Math.max(GROUND_Y - 80, boss.y - 150);
          boss.vy = -200;
        } else if (boss.telegraphType === 'firebreath') {
          // Fire breath: rapid stream of projectiles in arc
          for (let j = 0; j < 8; j++) {
            const angle = (j / 8) * Math.PI - Math.PI / 2;
            projectiles.push({
              x: boss.x + 30,
              y: boss.y - 10,
              vx: Math.cos(angle) * 100,
              vy: Math.sin(angle) * 100,
              life: 5,
              insult: 'FWOOSH!',
            });
          }
        } else {
          // Normal spread attack
          const numProjectiles = 3 + Math.floor((boss.maxHp - boss.hp) * 0.5);
          const baseDx = player.x + player.w/2 - boss.x;
          const baseDy = player.y + player.h/2 - boss.y;

          for (let i = 0; i < numProjectiles; i++) {
            const spreadAngle = (i - (numProjectiles - 1) / 2) * 0.4;
            const angle = Math.atan2(baseDy, baseDx) + spreadAngle;
            projectiles.push({
              x: boss.x,
              y: boss.y,
              vx: Math.cos(angle) * 120,
              vy: Math.sin(angle) * 120,
              life: 5,
              insult: 'RAWR!',
            });
          }
        }
      }
    }

    // Boss stomp collision detection
    if (boss.active && !boss.defeated && boss.invTimer <= 0) {
      const bLeft = boss.x - boss.w/2;
      const bRight = boss.x + boss.w/2;
      const bTop = boss.y - boss.h;
      const bBottom = boss.y;

      const pLeft = player.x;
      const pRight = player.x + player.w;
      const pBottom = player.y + player.h;
      const pTop = player.y;

      // Check if player landed on boss
      if (pRight > bLeft + 4 && pLeft < bRight - 4) {
        if (player.vy > 0 && pBottom >= bTop && pBottom <= bTop + 20) {
          // Successful stomp on boss!
          boss.hp--;
          score += 500;
          sfxBossHit();
          boss.invTimer = 0.4;

          // Bounce player
          player.vy = JUMP_VEL * 0.8;
          player.onGround = false;

          // Flash effect
          playerSquash.sx = 1.3;
          playerSquash.sy = 0.65;

          // Particle burst
          for (let j = 0; j < 20; j++) {
            const angle = Math.random() * 6.28;
            const speed = Math.random() * 150 + 60;
            sparkles.push({
              x: boss.x, y: bTop + boss.h/2,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed - 80,
              life: 0.7,
              color: ['#ff4488', '#ff6644', '#ffaa00', '#ffdd00'][Math.floor(Math.random() * 4)],
            });
          }

          // Screen shake
          screenShake.intensity = 5;
          screenShake.timer = 0.2;

          // Boss defeated?
          if (boss.hp <= 0) {
            boss.defeated = true;
            bossDefeated = true;
            score += 2000;
            showMsg('CHARLA DEFEATED!', 2500);
            sfxWin();

            // Big explosion
            for (let j = 0; j < 40; j++) {
              const angle = Math.random() * 6.28;
              const speed = Math.random() * 200 + 100;
              sparkles.push({
                x: boss.x, y: boss.y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 100,
                life: 1.2,
                color: ['#ff2222', '#ff6644', '#ffaa00', '#ffdd00', '#ff4488'][Math.floor(Math.random() * 5)],
              });
            }

            // Huge screen shake
            screenShake.intensity = 12;
            screenShake.timer = 0.4;
          }
        }
      }
    }
  }

  // Stomp combo timer
  stompComboTimer -= pdt;
  if (stompComboTimer <= 0) stompCombo = 0;

  // Stomp-to-kill: check if player is falling onto enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const ePw = e.w, ePh = e.h;
    const eLeft = e.x - ePw/2;
    const eRight = e.x + ePw/2;
    const eTop = e.y - ePh;
    const eBottom = e.y;

    const pLeft = player.x;
    const pRight = player.x + player.w;
    const pBottom = player.y + player.h;
    const pTop = player.y;

    // Check horizontal overlap
    if (pRight > eLeft + 2 && pLeft < eRight - 2) {
      // Stomp: player falling, feet near enemy head
      if (player.vy > 0 && pBottom >= eTop && pBottom <= eTop + 14) {
        // Check if warrior with remaining HP
        if (e.behavior === 'tank' && e.hp && e.hp > 1) {
          // Multi-hit warrior: damage but don't kill
          e.hp--;
          sfxStomp(); haptic([20, 10, 40]);

          // Bounce player normally
          const bounceBoost = Math.min(stompCombo * 20, 80);
          player.vy = JUMP_VEL * 0.65 - bounceBoost;
          player.onGround = false;

          // Squash effect on player
          playerSquash.sx = 1.4;
          playerSquash.sy = 0.6;

          // Flash warrior
          e.flashTimer = 0.2;

          // Show "1 MORE!" popup
          scorePopups.push({
            x: e.x, y: eTop - 15,
            text: '1 MORE!',
            timer: 1.0,
            color: '#ff4444',
            scale: 1.2,
          });

          // Smaller particle burst for non-final hit
          for (let j = 0; j < 8; j++) {
            const angle = Math.random() * 6.28;
            const speed = Math.random() * 80 + 30;
            sparkles.push({
              x: e.x, y: eTop + ePh/2,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed - 40,
              life: 0.4,
              color: '#ffaa00',
            });
          }

          screenShake.intensity = 2;
          screenShake.timer = 0.15;

          continue;
        }

        // Final stomp: enemy is killed
        stompCombo++;
        sfxStomp();
        stompComboTimer = 1.5;

        // Bounce player upward (higher with combos)
        const bounceBoost = Math.min(stompCombo * 20, 80);
        player.vy = JUMP_VEL * 0.65 - bounceBoost;
        player.onGround = false;

        // Squash effect on player
        playerSquash.sx = 1.4;
        playerSquash.sy = 0.6;

        // Spawn death animation
        deathAnims.push({
          x: e.x, y: eTop, w: ePw, h: ePh,
          name: e.name, color: e.color, skin: e.skin, hair: e.hair, cls: e.cls,
          squish: 1.0, // 1.0 = normal, animates to 0
          timer: 0.4,
          phase: 'squish',
        });

        // Score popup
        const pts = stompCombo * 100;
        score += pts;
        enemiesStomped++;
        scorePopups.push({
          x: e.x, y: eTop - 5,
          text: stompCombo > 1 ? `${pts} x${stompCombo}!` : `${pts}`,
          timer: 1.2,
          color: stompCombo > 2 ? '#ff4444' : stompCombo > 1 ? '#ffaa00' : '#ffdd00',
          scale: 1 + stompCombo * 0.15,
        });

        // Big particle burst
        const burstColors = ['#ffdd00','#ff6644','#ff4444','#ffaa00', e.color];
        for (let j = 0; j < 16 + stompCombo * 4; j++) {
          const angle = Math.random() * 6.28;
          const speed = Math.random() * 120 + 50;
          sparkles.push({
            x: e.x, y: eTop + ePh/2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 60,
            life: 0.6 + Math.random() * 0.4,
            color: burstColors[Math.floor(Math.random() * burstColors.length)],
          });
        }

        // Screen shake
        screenShake.intensity = 3 + stompCombo;
        screenShake.timer = 0.2;

        // Health pickup drop (30% chance)
        if (Math.random() < 0.3) {
          healthPickups.push({
            x: e.x,
            y: eTop,
            vx: 0,
            vy: -80,
            life: 8,
            collected: false,
            glow: 0,
          });
        }

        // Remove enemy
        enemies.splice(i, 1);

        // Show combo message
        if (stompCombo >= 3) {
          showMsg('STOMP COMBO x' + stompCombo + '!', 1200);
        }

        continue;
      }

      // Side/bottom collision with enemy (damage player — full heart = 2 HP)
      if (!player.invTimer && !(player.powerUp === 'shield') && !player.abilityActive &&
          pBottom > eTop + 8 && pTop < eBottom &&
          pRight > eLeft && pLeft < eRight) {
        player.hp -= 2;
        sfxDamage(); haptic([80]);
        player.invTimer = 1.5;
        redFlash.timer = 0.4;
        redFlash.intensity = 0.5;
        // Knockback
        player.vx = (player.x < e.x) ? -120 : 120;
        player.vy = -180;
        screenShake.intensity = 6;
        screenShake.timer = 0.3;
        playerSquash.sx = 0.6;
        playerSquash.sy = 1.4;
        spawnSparkles(player.x + player.w/2, player.y + player.h/2, 12, '#ff3333');
        if (player.hp <= 0) {
          showGameOverStats();
          document.getElementById('gameover').style.display='flex';
        }
        updateHPDisplay();
      }
    }
  }

  // Landing dust particles
  if (player.onGround && !wasOnGround) {
    // Just landed
    playerSquash.sx = 1.35;
    playerSquash.sy = 0.65;
    for (let i = 0; i < 6; i++) {
      const side = i < 3 ? -1 : 1;
      dustParticles.push({
        x: player.x + player.w/2 + side * (Math.random() * 8 + 2),
        y: player.y + player.h,
        vx: side * (Math.random() * 40 + 20),
        vy: -Math.random() * 20 - 5,
        life: 0.35,
        size: Math.random() * 2.5 + 1,
      });
    }
  }
  wasOnGround = player.onGround;

  // Jump stretch
  if (keys[' '] || keys['ArrowUp'] || keys['w'] || mctrl.jump) {
    if (player.vy < -100) {
      playerSquash.sx = 0.8;
      playerSquash.sy = 1.25;
    }
  }

  // Squash/stretch interpolation (runs once per frame, outside physics loop)
  playerSquash.sx += (1 - playerSquash.sx) * Math.min(dt * 12, 1);
  playerSquash.sy += (1 - playerSquash.sy) * Math.min(dt * 12, 1);

  // Screen shake update
  if (screenShake.timer > 0) {
    screenShake.timer -= dt;
    const t = screenShake.timer > 0 ? screenShake.intensity : 0;
    screenShake.x = (Math.random() - 0.5) * t * 2;
    screenShake.y = (Math.random() - 0.5) * t * 2;
  } else {
    screenShake.x = 0;
    screenShake.y = 0;
  }

  // Red flash update
  if (redFlash.timer > 0) {
    redFlash.timer -= dt;
  }

  // Update death animations
  deathAnims = deathAnims.filter(da => {
    da.timer -= dt;
    if (da.phase === 'squish') {
      da.squish = Math.max(0, da.timer / 0.4);
    }
    return da.timer > 0;
  });
  if (deathAnims.length > 10) deathAnims = deathAnims.slice(-10);

  // Update dust particles
  dustParticles = dustParticles.filter(d => {
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.life -= dt;
    return d.life > 0;
  });
  if (dustParticles.length > 50) dustParticles = dustParticles.slice(-50);

  // Update score popups
  scorePopups = scorePopups.filter(sp => {
    sp.y -= 30 * dt;
    sp.timer -= dt;
    return sp.timer > 0;
  });
  if (scorePopups.length > 15) scorePopups = scorePopups.slice(-15);

  // Update celebration particles
  celebrationParticles = celebrationParticles.filter(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= dt;
    return p.life > 0;
  });
  if (celebrationParticles.length > 60) celebrationParticles = celebrationParticles.slice(-60);

  // Update projectiles
  projectiles = projectiles.filter(proj => {
    proj.x += proj.vx * pdt;
    proj.y += proj.vy * pdt;
    proj.vy += 200 * pdt;
    proj.life -= pdt;

    spawnSparkles(proj.x, proj.y, 1, '#ff6644');

    if (!player.invTimer && !(player.powerUp === 'shield')) {
      const dx = player.x + player.w/2 - proj.x;
      const dy = player.y + player.h/2 - proj.y;
      if (Math.hypot(dx, dy) < 12) {
        player.hp -= 1; // Half-heart damage (1 out of 2 per heart)
        sfxDamage(); haptic([50]);
        player.invTimer = 1.0;
        // Red screen flash on projectile hit
        redFlash.timer = 0.35;
        redFlash.intensity = 0.4;
        insultTexts.push({
          text: proj.insult,
          x: player.x + player.w/2,
          y: player.y - 10,
          timer: 1.5
        });
        spawnSparkles(player.x + player.w/2, player.y + player.h/2, 12, '#ff3333');
        if (player.hp <= 0) {
          showGameOverStats();
          document.getElementById('gameover').style.display='flex';
        }
        updateHPDisplay();
        return false;
      }
    }

    return proj.life > 0;
  });
  if (projectiles.length > 30) projectiles = projectiles.slice(-30);

  // Update insult texts
  insultTexts = insultTexts.filter(it => {
    it.timer -= dt;
    return it.timer > 0;
  });
  if (insultTexts.length > 10) insultTexts = insultTexts.slice(-10);

  // Update sparkles
  sparkles.forEach(s => {
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy += 200 * dt;
    s.life -= dt;
  });
  sparkles = sparkles.filter(s => s.life > 0);
  if (sparkles.length > 150) sparkles = sparkles.slice(-150);

  // Invincibility
  player.invTimer -= dt;

  // Player projectile updates
  for (let i = playerProjectiles.length - 1; i >= 0; i--) {
    const proj = playerProjectiles[i];
    proj.life -= pdt;

    if (proj.type === 'arrow' || proj.type === 'shuriken') {
      proj.x += proj.vx * pdt;
      proj.y += proj.vy * pdt;
      proj.rotation = (proj.rotation || 0) + (proj.vx * pdt) / 20;
    } else if (proj.type === 'slash') {
      // Slash doesn't move, just exists briefly
    } else if (proj.type === 'afterimage') {
      // Afterimage doesn't move
    } else if (proj.type === 'orb') {
      // Homing projectile
      if (proj.target && enemies.includes(proj.target)) {
        const dx = proj.target.x - proj.x;
        const dy = proj.target.y - proj.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 10) {
          proj.vx = (dx / dist) * proj.speed;
          proj.vy = (dy / dist) * proj.speed;
        }
      }
      proj.x += proj.vx * pdt;
      proj.y += proj.vy * pdt;
    } else if (proj.type === 'shield_bash') {
      proj.timer -= pdt;
      if (proj.timer <= 0) {
        player.abilityActive = false;
      }
    } else if (proj.type === 'slam_pending') {
      // Check if we hit ground
      if (player.onGround) {
        // Create shockwave
        playerProjectiles[i] = {
          x: player.x + player.w/2,
          y: player.y + player.h,
          type: 'shockwave',
          radius: 0,
          maxRadius: 60,
          damage: true,
          life: 0.3,
        };
      }
    } else if (proj.type === 'shockwave') {
      proj.radius = proj.maxRadius * (1 - proj.life / 0.3);
    }

    // Check collisions with enemies
    if (proj.life <= 0) {
      playerProjectiles.splice(i, 1);
      continue;
    }

    // Damage enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const eLeft = e.x - e.w/2;
      const eRight = e.x + e.w/2;
      const eTop = e.y - e.h;
      const eBottom = e.y;

      let hit = false;

      if (proj.type === 'arrow' || proj.type === 'shuriken') {
        const projSize = 3;
        if (proj.x > eLeft && proj.x < eRight && proj.y > eTop && proj.y < eBottom) {
          hit = true;
        }
      } else if (proj.type === 'slash') {
        const slashRange = 20;
        const dx = e.x - proj.x;
        const dist = Math.abs(dx);
        if (dist < slashRange && proj.y > eTop && proj.y < eBottom) {
          hit = true;
        }
      } else if (proj.type === 'orb') {
        const orbRange = 8;
        const dx = e.x - proj.x;
        const dy = e.y - proj.y;
        if (Math.hypot(dx, dy) < orbRange) {
          hit = true;
        }
      } else if (proj.type === 'shield_bash' && proj.damage) {
        const bashRange = 30;
        const dx = e.x - proj.x;
        if (Math.abs(dx) < bashRange && proj.y > eTop && proj.y < eBottom) {
          hit = true;
        }
      } else if (proj.type === 'shockwave' && proj.damage) {
        const dx = e.x - proj.x;
        const dy = e.y - (proj.y - 10);
        if (Math.hypot(dx, dy) < proj.radius) {
          hit = true;
        }
      }

      if (hit) {
        // Kill enemy
        deathAnims.push({
          x: e.x, y: eTop, w: e.w, h: e.h,
          name: e.name, color: e.color, skin: e.skin, hair: e.hair, cls: e.cls,
          squish: 1.0,
          timer: 0.4,
          phase: 'squish',
        });

        // Score popup
        score += 50;
        scorePopups.push({
          x: e.x, y: eTop - 5,
          text: '50',
          timer: 1.2,
          color: '#ff8844',
          scale: 1,
        });

        // Particles
        for (let k = 0; k < 12; k++) {
          const angle = Math.random() * 6.28;
          const speed = Math.random() * 100 + 40;
          sparkles.push({
            x: e.x, y: eTop + e.h/2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 40,
            life: 0.5,
            color: ['#ff6644','#ff4444','#ffaa00'][Math.floor(Math.random() * 3)],
          });
        }

        // Health pickup drop
        if (Math.random() < 0.3) {
          healthPickups.push({
            x: e.x,
            y: eTop,
            vx: 0,
            vy: -80,
            life: 8,
            collected: false,
            glow: 0,
          });
        }

        // Remove enemy
        enemies.splice(j, 1);

        // Remove projectile (some piercing projectiles could keep going)
        if (proj.type !== 'orb') {
          playerProjectiles.splice(i, 1);
        }
        break;
      }
    }
  }
  if (playerProjectiles.length > 20) playerProjectiles = playerProjectiles.slice(-20);

  // Health pickup updates
  for (let i = healthPickups.length - 1; i >= 0; i--) {
    const hp = healthPickups[i];
    hp.life -= pdt;
    hp.glow = (hp.glow || 0) + pdt;

    if (!hp.collected) {
      hp.vy += GRAVITY * pdt;
      hp.y += hp.vy * pdt;
      hp.x += hp.vx * pdt;

      // Land on platforms
      PLATFORMS.forEach(p => {
        const [px, py, pw, ph] = p;
        if (hp.x > px && hp.x < px + pw && hp.y + 4 > py && hp.y < py + ph && hp.vy >= 0) {
          hp.y = py - 4;
          hp.vy = 0;
        }
      });

      // Player collision
      if (!hp.collected && Math.abs(player.x + player.w/2 - hp.x) < 16 && Math.abs(player.y + player.h/2 - hp.y) < 16) {
        hp.collected = true;
        player.hp = Math.min(player.hp + 2, player.maxHp);
        updateHPDisplay();
        sfxHeal();
        scorePopups.push({
          x: hp.x, y: hp.y - 10,
          text: '+1❤',
          timer: 0.8,
          color: '#44ff44',
          scale: 1.1,
        });
      }
    }

    if (hp.life <= 0 || hp.collected) {
      healthPickups.splice(i, 1);
    }
  }
  if (healthPickups.length > 5) healthPickups = healthPickups.slice(-5);

  // ── Water pool interaction ──
  const pCx = player.x + player.w / 2;
  const pBot = player.y + player.h;
  const waterSurface = VH - 32; // top of the pool = GROUND_Y
  WATER_POOLS.forEach(wp => {
    if (pCx > wp.x && pCx < wp.x + wp.w && pBot > waterSurface + 4) {
      // Player touched water — bounce them out with splash
      if (player.vy > 50) {
        // Spawn splash particles
        for (let i = 0; i < 10; i++) {
          waterSplashes.push({
            x: pCx + (Math.random() - 0.5) * wp.w * 0.6,
            y: waterSurface,
            vx: (Math.random() - 0.5) * 80,
            vy: -Math.random() * 100 - 40,
            size: Math.random() * 2.5 + 1,
            life: 0.5 + Math.random() * 0.3,
            maxLife: 0.8,
          });
        }
        if (typeof sfxJump === 'function') sfxJump();
      }
      // Bounce player out
      player.vy = JUMP_VEL * 0.7;
      player.y = waterSurface - player.h;
    }
  });

  // ── Lava pool interaction (DAMAGE) ──
  const lavaSurface = VH - 32; // top of lava = GROUND_Y
  LAVA_POOLS.forEach(lp => {
    if (pCx > lp.x && pCx < lp.x + lp.w && pBot > lavaSurface + 4) {
      if (!player.invTimer || player.invTimer <= 0) {
        if (!(player.powerUp === 'shield')) {
          player.hp -= 2; // Full heart damage from lava
          player.invTimer = 1.5;
          screenShake.intensity = 8;
          screenShake.timer = 0.35;
          redFlash.timer = 0.45;
          redFlash.intensity = 0.55;
          playerSquash.sx = 0.6;
          playerSquash.sy = 1.4;
          spawnSparkles(pCx, pBot, 14, '#ff4400');
          if (typeof sfxDamage === 'function') sfxDamage();
          if (player.hp <= 0) {
            showGameOverStats();
            document.getElementById('gameover').style.display = 'flex';
          }
          updateHPDisplay();
        }
      }
      // Bounce player out of lava regardless
      player.vy = JUMP_VEL * 0.8;
      player.y = lavaSurface - player.h;
    }
  });

  // ── Lava bubbles & heat shimmers ──
  LAVA_POOLS.forEach(lp => {
    const lpTop = lp.y - lp.depth; // GROUND_Y level
    // Random bubbles rising from within the lava
    if (Math.random() < pdt * 3) {
      lavaBubbles.push({
        x: lp.x + Math.random() * lp.w,
        y: lpTop + Math.random() * lp.depth * 0.7 + lp.depth * 0.2,
        vy: -15 - Math.random() * 25,
        size: Math.random() * 2 + 1.5,
        life: 0.6 + Math.random() * 0.4,
      });
    }
    // Heat shimmer particles rising above the surface
    if (Math.random() < pdt * 2) {
      heatShimmers.push({
        x: lp.x + Math.random() * lp.w,
        y: lpTop - Math.random() * 5,
        vy: -10 - Math.random() * 15,
        size: Math.random() * 3 + 2,
        life: 1.0,
      });
    }
  });

  if (player.y > VH + 80) {
    // Respawn at last checkpoint
    const cp = CHECKPOINTS[player.lastCheckpoint];
    player.x = cp.x;
    player.y = cp.y - player.h;
    player.vx = 0; player.vy = 0;

    // HP penalty (lose 1 HP)
    if (player.hp > 1) {
      player.hp -= 1;
      updateHPDisplay();
    }

    // Respawn invincibility
    player.invTimer = 1.5;

    // Brief visual feedback
    spawnSparkles(player.x, player.y, 8, '#4488ff');
  }
  } // End of physics sub-step loop

  // Tutorial checks (run once per frame, after physics)
  const timeSinceStart = performance.now() - gameStartTime;

  // First enemy
  if (!tutorials.firstEnemy) {
    for (let e of enemies) {
      const dist = Math.abs(e.x - player.x);
      if (dist < 200 && player.x > 100) {
        tutorials.firstEnemy = true;
        showMsg("JUMP ON ENEMIES TO STOMP THEM!\nWATCH OUT FOR INSULT PROJECTILES!", 3000);
        break;
      }
    }
  }

  // First coin
  if (!tutorials.firstCoin) {
    for (let c of coins) {
      if (!c.collected) {
        const dist = Math.sqrt((c.x - player.x) ** 2 + (c.y - player.y) ** 2);
        if (dist < 150) {
          tutorials.firstCoin = true;
          showMsg("COLLECT COINS FOR POINTS!", 2000);
          break;
        }
      }
    }
  }

  // First lava
  if (!tutorials.firstLava) {
    for (let lp of LAVA_POOLS) {
      if (Math.abs(player.x - lp.x) < 100) {
        tutorials.firstLava = true;
        showMsg("DANGER! LAVA DEALS DAMAGE!\nWATER IS SAFE - IT BOUNCES YOU OUT", 3000);
        break;
      }
    }
  }

  // First power-up (palm trees)
  if (!tutorials.firstPowerUp) {
    for (let pt of PALM_TREES) {
      const dist = Math.sqrt((pt.x - player.x) ** 2 + (pt.y - player.y) ** 2);
      if (dist < 120) {
        tutorials.firstPowerUp = true;
        showMsg("TOUCH PALM TREES FOR POWER-UPS!\nSHIELD / SPEED / MAGNET", 3000);
        break;
      }
    }
  }

  // First ability (after 5 seconds)
  if (!tutorials.firstAbility && timeSinceStart > 5000) {
    tutorials.firstAbility = true;
    showMsg(`PRESS [E] TO USE YOUR ${player.charCls.toUpperCase()} ABILITY!`, 3000);
  }

  // Boss intro
  if (!tutorials.bossIntro && player.x > 2850) {
    tutorials.bossIntro = true;
    showMsg("BOSS FIGHT! STOMP CHARLA'S HEAD!\nWATCH FOR TELEGRAPHED ATTACKS!", 3500);
  }

  // Particle updates (visual only, runs once per frame)
  lavaBubbles = lavaBubbles.filter(b => {
    b.y += b.vy * dt;
    b.life -= dt;
    return b.life > 0;
  });
  if (lavaBubbles.length > 20) lavaBubbles = lavaBubbles.slice(-20);
  heatShimmers = heatShimmers.filter(s => {
    s.y += s.vy * dt;
    s.x += Math.sin(s.life * 8 + s.x) * 0.3;
    s.life -= dt;
    return s.life > 0;
  });
  if (heatShimmers.length > 20) heatShimmers = heatShimmers.slice(-20);
  waterSplashes = waterSplashes.filter(sp => {
    sp.x += sp.vx * dt;
    sp.y += sp.vy * dt;
    sp.vy += 180 * dt;
    sp.life -= dt;
    return sp.life > 0;
  });
  if (waterSplashes.length > 30) waterSplashes = waterSplashes.slice(-30);
}

function spawnSparkles(x, y, count, color) {
  const actualCount = Math.min(count, 150 - sparkles.length);
  if (actualCount <= 0) return;
  for (let i = 0; i < actualCount; i++) {
    const angle = Math.random() * 6.28;
    const speed = Math.random() * 60 + 40;
    sparkles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 30,
      life: 0.6,
      color: color,
    });
  }
}

function showInsultAboveEnemy(enemy, text) {
  insultTexts.push({
    text: text,
    x: enemy.x,
    y: enemy.y - 28,
    timer: 2,
    isFromEnemy: true,
  });
}

function updateHPDisplay() {
  // Hidden text HUD — visual canvas hearts are primary now
  const fullHearts = Math.floor(Math.max(0, player.hp) / 2);
  const halfHeart = player.hp % 2 === 1 ? 1 : 0;
  const emptyHearts = Math.floor(player.maxHp / 2) - fullHearts - halfHeart;
  document.getElementById('hud-hp').textContent = '❤'.repeat(fullHearts) + (halfHeart ? '♡' : '') + '◇'.repeat(Math.max(0, emptyHearts));
}

function drawBG(now){
  const sky=ctx.createLinearGradient(0,0,0,VH);
  sky.addColorStop(0,'#0a0a2a');
  sky.addColorStop(1,'#1a1a4a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,VW,VH);

  bgStars.forEach(s=>{
    let tw=(Math.sin(now*.002+s.twinkle)+1)/2;
    if (s.bright) {
      ctx.fillStyle=`rgba(255,255,220,${.6+tw*.4})`;
      const spike = 3;
      ctx.fillRect(s.x-camX*.2, s.y-spike, 1, spike*2);
      ctx.fillRect(s.x-camX*.2-spike, s.y, spike*2, 1);
    } else {
      ctx.fillStyle=`rgba(255,255,220,${.3+tw*.5})`;
      ctx.beginPath();
      ctx.arc(s.x-camX*.2, s.y, s.r, 0,6.28);
      ctx.fill();
    }
  });

  ctx.fillStyle='rgba(255,255,200,.85)';
  ctx.beginPath(); ctx.arc(VW*.78, VH*.14, 22, 0,6.28); ctx.fill();
  ctx.fillStyle='rgba(20,20,60,.6)';
  ctx.beginPath(); ctx.arc(VW*.78+8, VH*.14-5, 18, 0,6.28); ctx.fill();

  const grad = ctx.createRadialGradient(VW*.78, VH*.14, 10, VW*.78, VH*.14, 30);
  grad.addColorStop(0, 'rgba(255,255,200,.3)');
  grad.addColorStop(1, 'rgba(255,255,200,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(VW*.78, VH*.14, 30, 0, 6.28); ctx.fill();

  ctx.fillStyle='#1a2a3a';
  for(let i=0;i<10;i++){
    const hx=((i*280)-camX*.15)%LEVEL_W - camX*.15%280;
    ctx.beginPath();
    ctx.moveTo(hx,VH*.7);
    ctx.quadraticCurveTo(hx+60,VH*.45,hx+120,VH*.7);
    ctx.fill();
  }

  ctx.fillStyle='#1a4a2a';
  for(let i=0;i<30;i++){
    const tx=((i*90)-camX*.3)%LEVEL_W - camX*.3%90;
    const th=Math.sin(i*0.7)*20+40;
    ctx.fillRect(tx, VH*.6-th, 8, th);
  }
}

function drawPlatform(p){
  const [px,py,pw,ph,col]=p;
  const rx=px-camX, ry=py;
  if(rx+pw<0||rx>VW) return;

  ctx.fillStyle=col;
  ctx.fillRect(rx,ry,pw,ph);
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.fillRect(rx,ry,pw,3);
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.fillRect(rx,ry+ph-4,pw,4);

  if(ph===32){
    ctx.fillStyle='#6aaa3a';
    ctx.fillRect(rx,ry,pw,6);
    ctx.fillStyle='#7acc44';
    for(let i=4;i<pw;i+=8){
      ctx.fillRect(rx+i,ry-3,2,4);
      ctx.fillRect(rx+i+3,ry-4,2,5);
    }
  } else {
    ctx.strokeStyle='rgba(0,0,0,.25)';
    ctx.lineWidth=1;
    for(let bx=0;bx<pw;bx+=18){
      ctx.beginPath(); ctx.moveTo(rx+bx,ry); ctx.lineTo(rx+bx,ry+ph); ctx.stroke();
    }
    for(let ny=0;ny<ph;ny+=6) {
      ctx.fillStyle='rgba(0,0,0,.1)';
      ctx.fillRect(rx,ry+ny,pw,1);
    }
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.fillRect(rx,ry,pw,1);
  }
}

function drawCoin(c, now){
  if(c.collected) return;
  const cx=c.x-camX, cy=c.y;
  if(cx<-20||cx>VW+20) return;
  const bob=Math.sin(now*.005+c.x*.01)*3;
  const pulse=(Math.sin(now*.008+c.x*.02)+1)/2;
  const scale = Math.cos(now*.01+c.x*.005)*0.5+0.5;

  ctx.fillStyle=`rgba(255,220,50,${.12+pulse*.1})`;
  ctx.beginPath(); ctx.arc(cx,cy+bob,12,0,6.28); ctx.fill();

  ctx.fillStyle='#f5c842';
  ctx.beginPath(); ctx.ellipse(cx,cy+bob,7*scale,7,0,0,6.28); ctx.fill();

  ctx.fillStyle='#ffee88';
  ctx.beginPath(); ctx.ellipse(cx-1,cy+bob-1,4*scale,4,0,0,6.28); ctx.fill();

  ctx.fillStyle='#cc9900';
  ctx.font='bold 6px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('$',cx,cy+bob);
}

function drawPalmTree(pt, now) {
  if(pt.collected) return;
  const px = pt.x - camX;
  const baseY = GROUND_Y;
  if (px < -40 || px > VW + 40) return;

  const bob = Math.sin(now * 0.004 + pt.x * 0.01) * 1.5;

  const glowColors = { shield:'#ffdd00', speed:'#4488ff', magnet:'#cc44ff' };
  const glowRGB = { shield:'255,220,0', speed:'68,136,255', magnet:'204,68,255' };
  const gc = glowColors[pt.type];
  const gr = glowRGB[pt.type];

  // Pulsing glow on ground
  const pulse = (Math.sin(now*.005+pt.x)+1)/2;
  const grd = ctx.createRadialGradient(px, baseY-2, 2, px, baseY-2, 20);
  grd.addColorStop(0, `rgba(${gr},${.25+pulse*.15})`);
  grd.addColorStop(1, `rgba(${gr},0)`);
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(px, baseY-2, 20, 0, 6.28); ctx.fill();

  // === TRUNK (segmented, slightly curved) ===
  const trunkH = 28;
  const topY = baseY - trunkH + bob;
  ctx.fillStyle = '#7a4a1e';
  // Draw trunk as segments curving slightly right
  for(let i=0; i<6; i++){
    const t = i/6;
    const segY = baseY - trunkH*t + bob*(1-t);
    const curve = Math.sin(t*2)*1.5;
    const w = 3 - t*0.8;
    ctx.fillRect(px-w/2+curve, segY-trunkH/6, w, trunkH/6+1);
  }
  // Trunk ring details
  ctx.fillStyle = '#5a3515';
  for(let i=1; i<5; i++){
    const ry = baseY - i*5 + bob*(1-i/6);
    ctx.fillRect(px-2, ry, 4, 1);
  }
  // Trunk highlight
  ctx.fillStyle = 'rgba(255,200,120,.18)';
  ctx.fillRect(px+1, topY+2, 1, trunkH-4);

  // === PALM FRONDS (5 drooping leaves) ===
  const sway = Math.sin(now*.002+pt.x)*.06;
  const frondData = [
    {angle:-2.3+sway, len:16}, // far left
    {angle:-1.1+sway, len:13}, // left
    {angle:0+sway,    len:12}, // center up
    {angle:1.1+sway,  len:13}, // right
    {angle:2.3+sway,  len:16}, // far right
  ];
  frondData.forEach((fr,fi)=>{
    const steps = 10;
    for(let s=0;s<steps;s++){
      const t = s/steps;
      const droop = t*t*8;
      const fx = px + Math.sin(fr.angle)*fr.len*t;
      const fy = topY + 2 - fr.len*t*(1-t*.4) + droop;
      const lw = (1-t)*3.5+0.5;
      // Main leaf spine
      ctx.fillStyle = fi%2===0 ? '#3a9a2a' : '#2e8a22';
      ctx.fillRect(fx-lw/2, fy-0.5, lw, 2);
      // Side leaflets
      if(s>1 && s<steps-1){
        ctx.fillStyle = '#4aaa3a';
        ctx.fillRect(fx-lw-1, fy-1, lw, 1);
        ctx.fillRect(fx+lw*.3, fy+0.5, lw, 1);
      }
    }
  });

  // Coconuts
  ctx.fillStyle = '#8b6914';
  ctx.beginPath(); ctx.arc(px-3, topY+4, 2.5, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(px+2.5, topY+5, 2.5, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#a07a1e';
  ctx.beginPath(); ctx.arc(px-3, topY+3.5, 1.2, 0, 6.28); ctx.fill();

  // Type label floating above
  const ta = .6 + pulse*.4;
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  const label = pt.type.toUpperCase();
  ctx.fillText(label, px+1, topY-5);
  ctx.globalAlpha = ta;
  ctx.fillStyle = gc;
  ctx.fillText(label, px, topY-6);
  ctx.globalAlpha = 1;
}

function drawSparkle(s) {
  const alpha = Math.max(0, Math.min(1, s.life * 1.6));
  const size = 1.2 + s.life * 1.5;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = s.color;
  ctx.beginPath();
  ctx.arc(s.x - camX, s.y, size, 0, 6.28);
  ctx.fill();
  // Inner bright core
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = alpha * 0.5;
  ctx.beginPath();
  ctx.arc(s.x - camX, s.y, size * 0.4, 0, 6.28);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawProjectile(proj, now) {
  const px = proj.x - camX;
  const py = proj.y;
  if (px < -20 || px > VW + 20) return;

  const rot = now * 0.008 + proj.x * 0.1;
  const pulse = (Math.sin(now * 0.012) + 1) / 2;

  // Trail particles
  ctx.fillStyle = `rgba(255,80,30,${0.15 + pulse * 0.1})`;
  ctx.beginPath(); ctx.arc(px - proj.vx * 0.03, py - proj.vy * 0.03, 6, 0, 6.28); ctx.fill();
  ctx.fillStyle = 'rgba(255,50,20,0.08)';
  ctx.beginPath(); ctx.arc(px - proj.vx * 0.06, py - proj.vy * 0.06, 4, 0, 6.28); ctx.fill();

  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(rot);

  // Outer glow
  const glow = ctx.createRadialGradient(0, 0, 4, 0, 0, 12);
  glow.addColorStop(0, 'rgba(255,80,0,0.3)');
  glow.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(0, 0, 12, 0, 6.28); ctx.fill();

  // Main face circle
  const faceGrad = ctx.createRadialGradient(-2, -2, 1, 0, 0, 8);
  faceGrad.addColorStop(0, '#ff6633');
  faceGrad.addColorStop(0.6, '#ee3311');
  faceGrad.addColorStop(1, '#aa1100');
  ctx.fillStyle = faceGrad;
  ctx.beginPath(); ctx.arc(0, 0, 8, 0, 6.28); ctx.fill();

  // Face outline
  ctx.strokeStyle = '#880000';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(0, 0, 8, 0, 6.28); ctx.stroke();

  // Angry eyebrows (V shapes)
  ctx.strokeStyle = '#440000';
  ctx.lineWidth = 1.5;
  // Left eyebrow (angled down toward center)
  ctx.beginPath(); ctx.moveTo(-5, -4); ctx.lineTo(-2, -2.5); ctx.stroke();

// ═══════════════════════════════════════════════════
//  SHARED CHARACTER SPRITE DRAWING
// ═══════════════════════════════════════════════════
function drawCharSprite(ctx, cx, cy, w, h, data, now, opts) {
  const facing  = opts.facing  || 1;
  const bob     = opts.bob     || 0;
  const isEnemy = opts.isEnemy || false;
  const frame   = opts.frame   || 0;

  ctx.save();

    ctx.translate(cx + w, cy); ctx.scale(-1, 1); ctx.translate(-w, 0);
  } else {
    ctx.translate(cx, cy);
  }

  const x = 0, y = 0, pw = w, ph = h;
  const cls = data.cls;

  // ── shared inner helpers (close over ctx, x, y, pw, ph, bob, data) ──
  const shadow = () => {
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(pw/2, ph+bob, pw*0.38, 2, 0, 0, 6.28); ctx.fill();
  };
  const boots = (lx, rx, by, bw, bh, col) => {
    const stride = frame === 1 ? 0.09 : -0.09;
    ctx.fillStyle = col;
    ctx.fillRect(x+pw*(lx+stride), y+ph*by+bob, pw*bw, ph*bh);
    ctx.fillRect(x+pw*(rx-stride), y+ph*by+bob, pw*bw, ph*bh);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*(lx+stride), y+ph*by+bob, pw*bw, ph*bh);
    ctx.strokeRect(x+pw*(rx-stride), y+ph*by+bob, pw*bw, ph*bh);
  };
  // stdEyes: white rect + black pupil for both eyes
  // lx/rx = left/right white x-fraction; ey = y-fraction
  const stdEyes = (lx, rx, ey) => {
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+pw*lx,        y+ph*ey+bob,        pw*0.08, ph*0.06);
    ctx.fillRect(x+pw*rx,        y+ph*ey+bob,        pw*0.08, ph*0.06);
    ctx.fillStyle = '#000';
    ctx.fillRect(x+pw*(lx+0.02), y+ph*(ey+0.01)+bob, pw*0.04, ph*0.04);
    ctx.fillRect(x+pw*(rx+0.02), y+ph*(ey+0.01)+bob, pw*0.04, ph*0.04);
  };

  const angryBrows = (lx1, y1, lx2, y2, rx1, rx2) => {
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x+pw*lx1, y+ph*y1+bob); ctx.lineTo(x+pw*lx2, y+ph*y2+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+pw*rx1, y+ph*y1+bob); ctx.lineTo(x+pw*rx2, y+ph*y2+bob); ctx.stroke();
  };

  const skinArms = (ay, ah, lw) => {
    ctx.fillStyle = data.skin;
    ctx.fillRect(x-pw*0.1, y+ph*ay+bob, pw*0.2, ph*ah);
    ctx.fillRect(x+pw*0.9, y+ph*ay+bob, pw*0.2, ph*ah);
    ctx.strokeStyle = '#000'; ctx.lineWidth = lw;
    ctx.strokeRect(x-pw*0.1, y+ph*ay+bob, pw*0.2, ph*ah);
    ctx.strokeRect(x+pw*0.9, y+ph*ay+bob, pw*0.2, ph*ah);
  };

  if (cls === 'archer') {

    boots(0.05, 0.55, 0.72, 0.4, 0.28, '#8b5513');

    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(x+pw*0.1, y+ph*0.35+bob, pw*0.8, ph*0.4);

  } else if (cls === 'ranger') {

    ctx.strokeStyle = '#000'; ctx.lineWidth = 0.5; ctx.strokeRect(x+pw*0.12, y+ph*0.38+bob, pw*0.76, ph*0.36);

    ctx.fillRect(x+pw*0.2, y+ph*0.4+bob, pw*0.3, ph*0.34);
    ctx.fillRect(x+pw*0.5, y+ph*0.4+bob, pw*0.3, ph*0.34);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 0.5;
    ctx.strokeRect(x+pw*0.2, y+ph*0.4+bob, pw*0.3, ph*0.34);
    ctx.strokeRect(x+pw*0.5, y+ph*0.4+bob, pw*0.3, ph*0.34);
    ctx.fillStyle = data.skin; ctx.fillRect(x+pw*0.22, y+ph*0.08+bob, pw*0.56, ph*0.3);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(x+pw*0.22, y+ph*0.08+bob, pw*0.56, ph*0.3);
    ctx.fillStyle = data.hair; ctx.fillRect(x+pw*0.22, y+ph*0.06+bob, pw*0.56, ph*0.1);
    ctx.fillStyle = data.color; ctx.fillRect(x+pw*0.2, y+ph*0.14+bob, pw*0.6, ph*0.1);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 0.5; ctx.strokeRect(x+pw*0.2, y+ph*0.14+bob, pw*0.6, ph*0.1);
    stdEyes(0.30, 0.62, 0.16);
    if (isEnemy) angryBrows(0.28, 0.14, 0.38, 0.12, 0.76, 0.66);
    ctx.fillStyle = data.color; ctx.fillRect(x+pw*0.35, y+ph*0.02+bob, pw*0.1, ph*0.08);
    ctx.fillStyle = '#ffaa44';
    ctx.fillRect(x+pw*0.36, y+ph*0.01+bob, pw*0.03, ph*0.02);
    ctx.fillRect(x+pw*0.42, y+ph*0.0+bob,  pw*0.03, ph*0.02);
    skinArms(0.42, 0.28, 0.5);
    ctx.fillStyle = '#7a4010'; ctx.fillRect(x+pw*0.12, y+ph*0.65+bob, pw*0.76, ph*0.08);
    ctx.fillStyle = '#cccccc'; ctx.fillRect(x+pw*0.72, y+ph*0.62+bob, pw*0.06, ph*0.12);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 0.5; ctx.strokeRect(x+pw*0.72, y+ph*0.62+bob, pw*0.06, ph*0.12);
    ctx.strokeStyle = '#8b5513'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x+pw*0.15, y+ph*0.45+bob, pw*0.12, 0.2, Math.PI-0.2); ctx.stroke();
    ctx.fillStyle = '#ffcc00'; ctx.fillRect(x+pw*0.05, y+ph*0.43+bob, pw*0.12, ph*0.04);

  } else {
    shadow();
    ctx.fillStyle = data.color; ctx.fillRect(x+pw*0.1, y+ph*0.38+bob, pw*0.8, ph*0.36);

    ctx.fillRect(x-pw*0.08, y+ph*0.4+bob,  pw*0.2, ph*0.3);

    ctx.fillRect(x+pw*0.2,  y+ph*0.06+bob, pw*0.6, ph*0.35);

    ctx.fillRect(x+pw*0.18, y+ph*0.72+bob, pw*0.24, ph*0.28);
    ctx.fillRect(x+pw*0.58, y+ph*0.72+bob, pw*0.24, ph*0.28);
    ctx.fillStyle = data.hair; ctx.fillRect(x+pw*0.14, y+ph*0.04+bob, pw*0.72, ph*0.1);
