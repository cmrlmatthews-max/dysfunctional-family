let csSelectedIdx = 0;
let csHoverIdx = -1;
let csSparkles = [];
let csAnimId = null;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `${r},${g},${b}`;
}

function initCharSelectScreen() {
  charSelectCanvas = document.getElementById('charselect-canvas');
  charSelectCtx = charSelectCanvas.getContext('2d');
  charSelectCanvas.width = TITLE_W;
  charSelectCanvas.height = TITLE_H;

  csSelectedIdx = 0;
  selectedChar = OFFICE[0];
  csSparkles = [];

  charSelectCanvas.addEventListener('click', handleCharSelectClick);
  charSelectCanvas.addEventListener('mousemove', handleCharSelectMouseMove);

  csAnimId = requestAnimationFrame(charSelectLoop);
}

function getCharCardRects() {
  const cards = [];
  const cols = 4, rows = 2;
  const cardW = 70, cardH = 70;
  const gapX = 16, gapY = 12;
  const totalW = cols * cardW + (cols - 1) * gapX;
  const totalH = rows * cardH + (rows - 1) * gapY;
  const startX = TITLE_W / 2 - totalW / 2;
  const startY = TITLE_H * 0.22;

  for (let i = 0; i < OFFICE.length; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    cards.push({
      x: startX + col * (cardW + gapX),
      y: startY + row * (cardH + gapY),
      w: cardW,
      h: cardH,
    });
  }
  return cards;
}

function getGoButtonRect() {
  const bw = 180, bh = 38;
  return { x: TITLE_W / 2 - bw / 2, y: TITLE_H * 0.78, w: bw, h: bh };
}

function drawCharCard(cc, card, family, isSelected, isHover, now) {
  // === PAINTERLY CHARACTER CARD ===

  // Outer glow for selected cards
  if (isSelected) {
    const selGlowOuter = cc.createRadialGradient(card.x + card.w/2, card.y + card.h/2, 5, card.x + card.w/2, card.y + card.h/2, card.w * 1.4);
    selGlowOuter.addColorStop(0, `rgba(255,240,100,0.2)`);
    selGlowOuter.addColorStop(0.5, `rgba(255,200,50,0.08)`);
    selGlowOuter.addColorStop(1, `rgba(255,200,50,0)`);
    cc.fillStyle = selGlowOuter;
    cc.beginPath(); cc.arc(card.x + card.w/2, card.y + card.h/2, card.w * 1.4, 0, 6.28); cc.fill();
  }

  // Card background with rounded corners (painterly)
  const cardBg = isSelected ? 'rgba(255,220,50,0.18)' : isHover ? 'rgba(120,120,160,0.22)' : 'rgba(50,50,80,0.4)';
  const bgGrad = cc.createLinearGradient(card.x, card.y, card.x, card.y + card.h);
  bgGrad.addColorStop(0, cardBg);
  bgGrad.addColorStop(1, `rgba(${isSelected ? '255,200,30,0.12' : isHover ? '100,100,150,0.15' : '40,40,70,0.3'})`);
  cc.fillStyle = bgGrad;
  cc.beginPath();
  cc.moveTo(card.x + 6, card.y);
  cc.lineTo(card.x + card.w - 6, card.y);
  cc.quadraticCurveTo(card.x + card.w, card.y, card.x + card.w, card.y + 6);
  cc.lineTo(card.x + card.w, card.y + card.h - 6);
  cc.quadraticCurveTo(card.x + card.w, card.y + card.h, card.x + card.w - 6, card.y + card.h);
  cc.lineTo(card.x + 6, card.y + card.h);
  cc.quadraticCurveTo(card.x, card.y + card.h, card.x, card.y + card.h - 6);
  cc.lineTo(card.x, card.y + 6);
  cc.quadraticCurveTo(card.x, card.y, card.x + 6, card.y);
  cc.fill();

  // Highlight edge on top
  cc.fillStyle = isSelected ? 'rgba(255,255,200,0.25)' : isHover ? 'rgba(200,200,230,0.15)' : 'rgba(200,200,200,0.05)';
  cc.beginPath();
  cc.moveTo(card.x + 6, card.y + 1);
  cc.lineTo(card.x + card.w - 6, card.y + 1);
  cc.quadraticCurveTo(card.x + card.w - 1, card.y + 1, card.x + card.w - 1, card.y + 5);
  cc.lineTo(card.x + 1, card.y + 5);
  cc.quadraticCurveTo(card.x + 1, card.y + 1, card.x + 6, card.y + 1);
  cc.fill();

  // Card border with soft rounded corners
  cc.strokeStyle = isSelected ? 'rgba(255,220,0,0.8)' : isHover ? 'rgba(140,140,200,0.5)' : 'rgba(100,100,130,0.3)';
  cc.lineWidth = isSelected ? 2.5 : isHover ? 1.8 : 1.2;
  cc.lineCap = 'round';
  cc.lineJoin = 'round';
  cc.beginPath();
  cc.moveTo(card.x + 6, card.y);
  cc.lineTo(card.x + card.w - 6, card.y);
  cc.quadraticCurveTo(card.x + card.w, card.y, card.x + card.w, card.y + 6);
  cc.lineTo(card.x + card.w, card.y + card.h - 6);
  cc.quadraticCurveTo(card.x + card.w, card.y + card.h, card.x + card.w - 6, card.y + card.h);
  cc.lineTo(card.x + 6, card.y + card.h);
  cc.quadraticCurveTo(card.x, card.y + card.h, card.x, card.y + card.h - 6);
  cc.lineTo(card.x, card.y + 6);
  cc.quadraticCurveTo(card.x, card.y, card.x + 6, card.y);
  cc.stroke();

  // Selected card corner accents (painterly decorations)
  if (isSelected) {
    const blink = (Math.sin(now * 0.008) + 1) / 2;
    cc.strokeStyle = `rgba(255,240,100,${0.7 + blink * 0.3})`;
    cc.lineWidth = 2;
    cc.lineCap = 'round';
    const cs = 7;
    // Top-left corner
    cc.beginPath(); cc.moveTo(card.x - 1, card.y + cs); cc.lineTo(card.x - 1, card.y - 1); cc.lineTo(card.x + cs, card.y - 1); cc.stroke();
    // Top-right corner
    cc.beginPath(); cc.moveTo(card.x + card.w - cs, card.y - 1); cc.lineTo(card.x + card.w + 1, card.y - 1); cc.lineTo(card.x + card.w + 1, card.y + cs); cc.stroke();
    // Bottom-left corner
    cc.beginPath(); cc.moveTo(card.x - 1, card.y + card.h - cs); cc.lineTo(card.x - 1, card.y + card.h + 1); cc.lineTo(card.x + cs, card.y + card.h + 1); cc.stroke();
    // Bottom-right corner
    cc.beginPath(); cc.moveTo(card.x + card.w - cs, card.y + card.h + 1); cc.lineTo(card.x + card.w + 1, card.y + card.h + 1); cc.lineTo(card.x + card.w + 1, card.y + card.h - cs); cc.stroke();
  }

  // Character sprite
  const sprW = 22, sprH = 30;
  const sprX = card.x + card.w/2 - sprW/2;
  const sprY = card.y + 8;
  const bob = Math.sin(now * 0.003 + (card.x * 0.01)) * 2;

  drawCharSprite(cc, sprX, sprY + bob, sprW, sprH, family, now, {
    facing: 1, bob: 0, isEnemy: false, invTimer: 0, powerUp: null
  });

  // Character name with soft shadow
  cc.font = 'bold 9px monospace';
  cc.textAlign = 'center';
  cc.textBaseline = 'top';

  // Shadow text
  cc.fillStyle = isSelected ? 'rgba(0,0,0,0.4)' : 'rgba(0,0,0,0.2)';
  cc.fillText(family.name, card.x + card.w/2 + 1, card.y + card.h - 16 + 1);

  // Main text with gradient
  const nameGrad = cc.createLinearGradient(card.x, card.y + card.h - 18, card.x, card.y + card.h - 14);
  nameGrad.addColorStop(0, isSelected ? '#ffff99' : '#b0b0e0');
  nameGrad.addColorStop(1, isSelected ? '#ffdd00' : '#8888bb');
  cc.fillStyle = nameGrad;
  cc.fillText(family.name, card.x + card.w/2, card.y + card.h - 16);

  // Class name with soft styling
  cc.font = '7px monospace';
  cc.fillStyle = isSelected ? 'rgba(255,240,100,0.75)' : 'rgba(170,170,200,0.5)';
  cc.fillText(family.cls.toUpperCase(), card.x + card.w/2, card.y + card.h - 6);
}

let csGoBtnHover = false;

function handleCharSelectMouseMove(e) {
  const rect = charSelectCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const cards = getCharCardRects();
  csHoverIdx = -1;
  for (let i = 0; i < cards.length; i++) {
    const c = cards[i];
    if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
      csHoverIdx = i;
      break;
    }
  }

  const goBtn = getGoButtonRect();
  csGoBtnHover = mx >= goBtn.x && mx <= goBtn.x + goBtn.w && my >= goBtn.y && my <= goBtn.y + goBtn.h;

  charSelectCanvas.style.cursor = (csHoverIdx >= 0 || csGoBtnHover) ? 'pointer' : 'default';
}

function handleCharSelectClick(e) {
  const rect = charSelectCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const cards = getCharCardRects();
  for (let i = 0; i < cards.length; i++) {
    const c = cards[i];
    if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
      csSelectedIdx = i;
      selectedChar = OFFICE[i];
      for (let j = 0; j < 20; j++) {
        const angle = Math.random() * 6.28;
        const speed = Math.random() * 80 + 30;
        csSparkles.push({
          x: c.x + c.w/2, y: c.y + c.h/2,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 0.5 + Math.random() * 0.3,
          color: OFFICE[i].color,
        });
      }
      return;
    }
  }

  const goBtn = getGoButtonRect();
  if (mx >= goBtn.x && mx <= goBtn.x + goBtn.w && my >= goBtn.y && my <= goBtn.y + goBtn.h) {
    startGame();
  }
}

function charSelectLoop(now) {
  const cc = charSelectCtx;

  // === BACKGROUND: Dark blue-gray office-at-night gradient ===
  const bg = cc.createLinearGradient(0, 0, 0, TITLE_H);
  bg.addColorStop(0, '#0a0f1a');
  bg.addColorStop(0.25, '#1a2535');
  bg.addColorStop(0.5, '#2a3545');
  bg.addColorStop(0.75, '#1a2535');
  bg.addColorStop(1, '#1a2030');
  cc.fillStyle = bg;
  cc.fillRect(0, 0, TITLE_W, TITLE_H);

  // === FLUORESCENT CEILING LIGHTS (rectangular warm white glows) ===
  const lightPhase = now * 0.0002;
  const ceilingLights = [
    {x:0.2, y:0.1, w:80, h:12, opacity: 0.15},
    {x:0.75, y:0.12, w:90, h:14, opacity: 0.13},
    {x:0.5, y:0.08, w:100, h:13, opacity: 0.14}
  ];
  ceilingLights.forEach(light => {
    const pulse = (Math.sin(lightPhase + light.x * 5) + 1) / 2;
    const lx = TITLE_W * light.x;
    const ly = TITLE_H * light.y;

    // Soft horizontal glow rectangle
    const lightGrad = cc.createLinearGradient(lx - light.w, ly, lx + light.w, ly);
    lightGrad.addColorStop(0, `rgba(255,240,200,0)`);
    lightGrad.addColorStop(0.2, `rgba(255,245,220,${(light.opacity + pulse * 0.06) * 0.8})`);
    lightGrad.addColorStop(0.5, `rgba(255,250,230,${light.opacity + pulse * 0.08})`);
    lightGrad.addColorStop(0.8, `rgba(255,245,220,${(light.opacity + pulse * 0.06) * 0.8})`);
    lightGrad.addColorStop(1, `rgba(255,240,200,0)`);
    cc.fillStyle = lightGrad;
    cc.fillRect(lx - light.w, ly - light.h/2, light.w * 2, light.h);
  });

  // === CITY SKYLINE at bottom (dark building rectangles with lit windows) ===
  menuStars.forEach(s => {
    // Reuse menuStars array to draw building rectangles instead
    const buildingH = 80 + s.layer * 40;
    const buildingW = 40 + Math.random() * 30;
    const buildingX = s.x;
    const buildingY = TITLE_H * 0.65 - buildingH;

    cc.fillStyle = `rgba(15,20,35,0.8)`;
    cc.fillRect(buildingX, buildingY, buildingW, buildingH);

    // Draw lit windows (small yellow/white rectangles)
    const windowSize = 4;
    const windowGap = 8;
    for (let wx = buildingX + 6; wx < buildingX + buildingW - 4; wx += windowGap) {
      for (let wy = buildingY + 8; wy < buildingY + buildingH - 4; wy += windowGap) {
        // Randomly lit windows
        if (Math.random() > 0.3) {
          const windowGlow = cc.createRadialGradient(wx + 2, wy + 2, 0, wx + 2, wy + 2, 5);
          windowGlow.addColorStop(0, `rgba(255,240,150,0.6)`);
          windowGlow.addColorStop(1, `rgba(255,220,100,0.1)`);
          cc.fillStyle = windowGlow;
          cc.beginPath(); cc.arc(wx + 2, wy + 2, 5, 0, 6.28); cc.fill();

          cc.fillStyle = `rgba(255,245,180,0.8)`;
          cc.fillRect(wx, wy, windowSize, windowSize);
        }
      }
    }
  });

  // === TITLE with painterly styling ===
  cc.textAlign = 'center';
  cc.textBaseline = 'middle';
  cc.font = 'bold 30px monospace';
  const headerPulse = (Math.sin(now * 0.003) + 1) / 2;

  // Large glow behind title
  const titleGlowGrad = cc.createRadialGradient(TITLE_W/2, TITLE_H * 0.08, 20, TITLE_W/2, TITLE_H * 0.08, 200);
  titleGlowGrad.addColorStop(0, `rgba(255,200,100,${0.04 + headerPulse * 0.04})`);
  titleGlowGrad.addColorStop(1, 'rgba(245,200,66,0)');
  cc.fillStyle = titleGlowGrad;
  cc.beginPath(); cc.arc(TITLE_W/2, TITLE_H * 0.08, 200, 0, 6.28); cc.fill();

  // Multi-layer text with soft shadows
  cc.fillStyle = 'rgba(0,0,0,0.3)';
  cc.fillText('SELECT YOUR FIGHTER', TITLE_W/2 + 3, TITLE_H * 0.08 + 3);
  cc.fillStyle = 'rgba(0,0,0,0.5)';
  cc.fillText('SELECT YOUR FIGHTER', TITLE_W/2 + 2, TITLE_H * 0.08 + 2);

  const hGrad = cc.createLinearGradient(0, TITLE_H * 0.05, 0, TITLE_H * 0.11);
  hGrad.addColorStop(0, '#ffee99');
  hGrad.addColorStop(0.5, '#f5c842');
  hGrad.addColorStop(1, '#cc8800');
  cc.fillStyle = hGrad;
  cc.fillText('SELECT YOUR FIGHTER', TITLE_W/2, TITLE_H * 0.08);

  cc.fillStyle = `rgba(255,255,220,${0.15 + headerPulse * 0.15})`;
  cc.fillText('SELECT YOUR FIGHTER', TITLE_W/2, TITLE_H * 0.08 - 1);

  // Decorative line
  const lw = 300 + headerPulse * 30;
  const lg = cc.createLinearGradient(TITLE_W/2 - lw/2, 0, TITLE_W/2 + lw/2, 0);
  lg.addColorStop(0, 'rgba(245,200,66,0)');
  lg.addColorStop(0.2, 'rgba(255,220,100,0.6)');
  lg.addColorStop(0.5, 'rgba(245,200,66,1)');
  lg.addColorStop(0.8, 'rgba(255,220,100,0.6)');
  lg.addColorStop(1, 'rgba(245,200,66,0)');
  cc.fillStyle = lg;
  cc.fillRect(TITLE_W/2 - lw/2, TITLE_H * 0.14, lw, 3);

  // === CHARACTER CARDS (painterly style) ===
  const cards = getCharCardRects();
  cards.forEach((card, i) => {
    const fam = OFFICE[i];
    const isSelected = i === csSelectedIdx;
    const isHover = i === csHoverIdx;

    drawCharCard(cc, card, fam, isSelected, isHover, now);
  });

  // === SPARKLES from selection ===
  csSparkles = csSparkles.filter(s => {
    s.x += s.vx * 0.016;
    s.y += s.vy * 0.016;
    s.vy += 120 * 0.016;
    s.life -= 0.016;
    if (s.life <= 0) return false;

    const alpha = s.life * 2;
    // Painterly sparkle with glow
    const sparkRgb = hexToRgb(s.color);
    const sparkGlow = cc.createRadialGradient(s.x, s.y, 0, s.x, s.y, 4);
    sparkGlow.addColorStop(0, `rgba(${sparkRgb},1)`);
    sparkGlow.addColorStop(1, `rgba(${sparkRgb},0)`);
    cc.globalAlpha = Math.min(alpha * 0.5, 0.8);
    cc.fillStyle = sparkGlow;
    cc.beginPath(); cc.arc(s.x, s.y, 4, 0, 6.28); cc.fill();

    // Core sparkle
    cc.fillStyle = s.color;
    cc.globalAlpha = Math.min(alpha, 1);
    cc.beginPath(); cc.arc(s.x, s.y, 2.2, 0, 6.28); cc.fill();

    // Highlight
    cc.fillStyle = '#fff';
    cc.globalAlpha = Math.min(alpha * 0.6, 0.8);
    cc.beginPath(); cc.arc(s.x, s.y, 0.9, 0, 6.28); cc.fill();
    cc.globalAlpha = 1;
    return true;
  });
  if (csSparkles.length > 60) csSparkles = csSparkles.slice(-60);

  // === GO BUTTON (painterly rounded style) ===
  const goBtn = getGoButtonRect();
  const goPulse = (Math.sin(now * 0.005) + 1) / 2;
  const goScale = csGoBtnHover ? 1.08 : 1.0;

  cc.save();
  cc.translate(goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2);
  cc.scale(goScale, goScale);
  cc.translate(-(goBtn.x + goBtn.w/2), -(goBtn.y + goBtn.h/2));

  // Large soft outer glow
  const goGlowOuter = cc.createRadialGradient(goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2, 20, goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2, 140);
  goGlowOuter.addColorStop(0, `rgba(255,220,100,${csGoBtnHover ? 0.18 : 0.06 + goPulse * 0.06})`);
  goGlowOuter.addColorStop(0.6, `rgba(245,200,66,${csGoBtnHover ? 0.08 : 0.02})`);
  goGlowOuter.addColorStop(1, 'rgba(245,200,66,0)');
  cc.fillStyle = goGlowOuter;
  cc.beginPath(); cc.arc(goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2, 140, 0, 6.28); cc.fill();

  // Rounded button shadow
  cc.fillStyle = 'rgba(0,0,0,0.4)';
  cc.beginPath();
  cc.moveTo(goBtn.x + 10, goBtn.y + 4);
  cc.lineTo(goBtn.x + goBtn.w - 10, goBtn.y + 4);
  cc.quadraticCurveTo(goBtn.x + goBtn.w + 2, goBtn.y + 4, goBtn.x + goBtn.w + 2, goBtn.y + goBtn.h/2);
  cc.quadraticCurveTo(goBtn.x + goBtn.w + 2, goBtn.y + goBtn.h, goBtn.x + goBtn.w - 10, goBtn.y + goBtn.h + 2);
  cc.lineTo(goBtn.x + 10, goBtn.y + goBtn.h + 2);
  cc.quadraticCurveTo(goBtn.x - 2, goBtn.y + goBtn.h, goBtn.x - 2, goBtn.y + goBtn.h/2);
  cc.quadraticCurveTo(goBtn.x - 2, goBtn.y + 4, goBtn.x + 10, goBtn.y + 4);
  cc.fill();

  // Main button with rounded corners
  const goBtnGrad = cc.createLinearGradient(0, goBtn.y, 0, goBtn.y + goBtn.h);
  goBtnGrad.addColorStop(0, csGoBtnHover ? '#fff299' : '#ffef99');
  goBtnGrad.addColorStop(0.5, csGoBtnHover ? '#ffe066' : '#f5c842');
  goBtnGrad.addColorStop(1, csGoBtnHover ? '#e8a832' : '#d4b234');
  cc.fillStyle = goBtnGrad;
  cc.beginPath();
  cc.moveTo(goBtn.x + 10, goBtn.y);
  cc.lineTo(goBtn.x + goBtn.w - 10, goBtn.y);
  cc.quadraticCurveTo(goBtn.x + goBtn.w, goBtn.y, goBtn.x + goBtn.w, goBtn.y + goBtn.h/2);
  cc.quadraticCurveTo(goBtn.x + goBtn.w, goBtn.y + goBtn.h, goBtn.x + goBtn.w - 10, goBtn.y + goBtn.h);
  cc.lineTo(goBtn.x + 10, goBtn.y + goBtn.h);
  cc.quadraticCurveTo(goBtn.x, goBtn.y + goBtn.h, goBtn.x, goBtn.y + goBtn.h/2);
  cc.quadraticCurveTo(goBtn.x, goBtn.y, goBtn.x + 10, goBtn.y);
  cc.fill();

  // Highlight on top
  cc.fillStyle = 'rgba(255,255,255,0.3)';
  cc.beginPath();
  cc.moveTo(goBtn.x + 10, goBtn.y + 1);
  cc.lineTo(goBtn.x + goBtn.w - 10, goBtn.y + 1);
  cc.quadraticCurveTo(goBtn.x + goBtn.w - 1, goBtn.y + 1, goBtn.x + goBtn.w - 1, goBtn.y + goBtn.h/3);
  cc.lineTo(goBtn.x + 1, goBtn.y + goBtn.h/3);
  cc.quadraticCurveTo(goBtn.x + 1, goBtn.y + 1, goBtn.x + 10, goBtn.y + 1);
  cc.fill();

  // Soft border
  cc.strokeStyle = csGoBtnHover ? 'rgba(180,100,0,0.6)' : 'rgba(150,90,0,0.4)';
  cc.lineWidth = 2.5;
  cc.lineCap = 'round';
  cc.lineJoin = 'round';
  cc.beginPath();
  cc.moveTo(goBtn.x + 10, goBtn.y);
  cc.lineTo(goBtn.x + goBtn.w - 10, goBtn.y);
  cc.quadraticCurveTo(goBtn.x + goBtn.w, goBtn.y, goBtn.x + goBtn.w, goBtn.y + goBtn.h/2);
  cc.quadraticCurveTo(goBtn.x + goBtn.w, goBtn.y + goBtn.h, goBtn.x + goBtn.w - 10, goBtn.y + goBtn.h);
  cc.lineTo(goBtn.x + 10, goBtn.y + goBtn.h);
  cc.quadraticCurveTo(goBtn.x, goBtn.y + goBtn.h, goBtn.x, goBtn.y + goBtn.h/2);
  cc.quadraticCurveTo(goBtn.x, goBtn.y, goBtn.x + 10, goBtn.y);
  cc.stroke();

  cc.font = 'bold 18px monospace';
  cc.textAlign = 'center';
  cc.textBaseline = 'middle';

  // Text shadow
  cc.fillStyle = 'rgba(0,0,0,0.4)';
  cc.fillText("LET'S GO!", goBtn.x + goBtn.w/2 + 1.5, goBtn.y + goBtn.h/2 + 1.5);

  // Main text
  const textGrad = cc.createLinearGradient(goBtn.x, goBtn.y, goBtn.x, goBtn.y + goBtn.h);
  textGrad.addColorStop(0, '#4a2a00');
  textGrad.addColorStop(1, '#2a1600');
  cc.fillStyle = textGrad;
  cc.fillText("LET'S GO!", goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2);

  cc.restore();

  cc.font = '8px monospace';
  cc.textAlign = 'center';
  cc.fillStyle = 'rgba(150,150,150,0.35)';
  cc.fillText('CLICK A CHARACTER TO SELECT // THEN HIT GO', TITLE_W/2, TITLE_H - 10);

  csAnimId = requestAnimationFrame(charSelectLoop);
}

function stopCharSelectLoop() {
  if (csAnimId) { cancelAnimationFrame(csAnimId); csAnimId = null; }
  if (charSelectCanvas) {
    charSelectCanvas.removeEventListener('click', handleCharSelectClick);
    charSelectCanvas.removeEventListener('mousemove', handleCharSelectMouseMove);
  }
}

function goToCharSelect() {
  fadeTransition(() => {
    stopTitleLoop();
    document.getElementById('title').style.display = 'none';
    document.getElementById('charselect').style.display = 'flex';
    initCharSelectScreen();
  });
}

// ═══════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════
function startGame(){
  // Default to intern architect if no character has been chosen
  if (!selectedChar) selectedChar = INTERN;

  stopCharSelectLoop();
  document.getElementById('charselect').style.display='none';
  document.getElementById('title').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('game-wrap').style.display='flex';
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.getElementById('controls').style.display='flex';
  }
  resizeCanvas();
  initState();
  lastT=performance.now();
  showMsg('GO!',1000);
  bgMusic();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
(function boot(){
  const bar=document.getElementById('lb');
  let p=0;
  const iv=setInterval(()=>{
    p+=Math.random()*18+8;
    bar.style.width=Math.min(p,95)+'%';
    if(p>=95){
      clearInterval(iv);
      bar.style.width='100%';
      setTimeout(()=>{
        document.getElementById('loading').style.display='none';
        document.getElementById('title').style.display='flex';
        initTitleScreen();
        setupControls();
        setupSwipe();
      },300);
    }
  },100);
})();
</script>
