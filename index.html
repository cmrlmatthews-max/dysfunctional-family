//  WEB AUDIO API

let audioCtx = null;
let musicNodes = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function sfxJump() {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(200, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(400, ctx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.15);
}

function sfxStomp() {
  const ctx = ensureAudio();
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();
  osc1.type = 'triangle';
  osc1.frequency.setValueAtTime(80, ctx.currentTime);
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(800, ctx.currentTime);
  osc2.frequency.linearRampToValueAtTime(1200, ctx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
  osc1.connect(gain).connect(ctx.destination);
  osc2.connect(gain).connect(ctx.destination);
  osc1.start(); osc1.stop(ctx.currentTime + 0.12);
  osc2.start(); osc2.stop(ctx.currentTime + 0.12);
}

function sfxCoin() {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.frequency.setValueAtTime(880, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(1320, ctx.currentTime + 0.08);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.15);
}

function sfxDamage() {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(120, ctx.currentTime);

  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
}

function sfxPowerUp() {
  const ctx = ensureAudio();
  const notes = [440, 660, 880];
  let currentTime = ctx.currentTime;
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, currentTime);
    gain.gain.setValueAtTime(0.1, currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, currentTime + 0.12);
    osc.connect(gain).connect(ctx.destination);
    osc.start(currentTime); osc.stop(currentTime + 0.12);
    currentTime += 0.1;
  });
}

function sfxWin() {
  const ctx = ensureAudio();
  const notes = [523, 659, 784, 1047];
  let currentTime = ctx.currentTime;
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, currentTime);
    gain.gain.setValueAtTime(0.12, currentTime);

    osc.connect(gain).connect(ctx.destination);
    osc.start(currentTime); osc.stop(currentTime + 0.18);
    currentTime += 0.15;
  });
}

function bgMusic() {
  const ctx = ensureAudio();
  if (musicNodes) return;
  musicNodes = [];
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();
  osc1.type = 'sine';
  osc2.type = 'sine';
  osc1.frequency.setValueAtTime(110, ctx.currentTime);
  osc2.frequency.setValueAtTime(110.5, ctx.currentTime);
  gain.gain.setValueAtTime(0.04, ctx.currentTime);
  osc1.connect(gain).connect(ctx.destination);
  osc2.connect(gain).connect(ctx.destination);
  osc1.start();
  osc2.start();
  musicNodes = [osc1, osc2, gain];
}

function darkenColor(hex, factor=0.7) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.floor((n >> 16 & 255) * factor);
  const g = Math.floor((n >> 8 & 255) * factor);
  const b = Math.floor((n & 255) * factor);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function lightenColor(hex, factor=1.3) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, Math.floor((n >> 16 & 255) * factor));
  const g = Math.min(255, Math.floor((n >> 8 & 255) * factor));
  const b = Math.min(255, Math.floor((n & 255) * factor));
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

      insultCooldown:Math.random()*1.5+2.5,
      patrolLeft:patrolLeft,
      patrolRight:patrolRight,
      patrolVx:30,
    };
  });

  bgStars=[];
  for(let i=0;i<160;i++){
    bgStars.push({
      x:Math.random()*LEVEL_W,
      y:Math.random()*(VH*.6),
      r:Math.random()*1.2+.3,
      twinkle:Math.random()*6.28,
      bright:Math.random()<0.15
    });
  }

  document.getElementById('hud-coins').textContent='COINS: 0';
  document.getElementById('hud-hp').textContent='❤'.repeat(player.hp)+('').padEnd(player.maxHp-player.hp,'◇');
}

// ═══════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════
function resolvePlatforms(dt){
  player.onGround = false;

  PLATFORMS.forEach(p => {
    const [px, py, pw, ph] = p;
    const pl = player;
    const pr = pl.x + pl.w;
    const pb = pl.y + pl.h;
    const isOneWay = (ph !== 32); // Thin platforms are one-way

    if (pr <= px || pl.x >= px + pw) return;

    // Landing on top (all platforms)
    if (pl.vy >= 0) {
      const prevBottom = pb - pl.vy * dt;
      if (prevBottom <= py && pb >= py) {
        pl.y  = py - pl.h;
        pl.vy = 0;
        pl.onGround = true;
      }
    }

    // Head bonk from below (solid platforms only)
    if (!isOneWay && pl.vy < 0) {
      const prevTop = pl.y - pl.vy * dt;
      if (prevTop >= py + ph && pl.y <= py + ph) {
        pl.vy = 0;
        pl.y  = py + ph;
      }
    }

    // Side collision (solid platforms only)
    if (!isOneWay) {
      if (pb > py + 4 && pl.y < py + ph) {
        if (pl.vx > 0 && pr > px   && pl.x < px)      { pl.x = px - pl.w; pl.vx = 0; }
        if (pl.vx < 0 && pl.x < px + pw && pr > px+pw){ pl.x = px + pw;   pl.vx = 0; }
      }
    }
  });

  if (player.y + player.h > VH + 100) {
    player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true;
  }
  if (player.x < 0)              { player.x = 0;              player.vx = 0; }
  if (player.x + player.w > LEVEL_W) { player.x = LEVEL_W - player.w; player.vx = 0; }
}

// ═══════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════
function update(dt, now){
  const pdt = Math.min(dt, PHYS_STEP);

  const goLeft  = keys['ArrowLeft'] ||keys['a']||mctrl.left;
  const goRight = keys['ArrowRight']||keys['d']||mctrl.right;
  const doJump  = keys[' ']||keys['ArrowUp']||keys['w']||mctrl.jump;

  let moveSpd = MOVE_SPD;
  if (player.powerUp === 'speed') moveSpd *= 1.5;

  if (goLeft)       player.vx = -moveSpd;
  else if (goRight) player.vx =  moveSpd;
  else              player.vx *= .75;

  if (doJump && !wasJumpDown && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
    sfxJump();
  }
  wasJumpDown = doJump;

  player.vy += GRAVITY * pdt;
  player.vy  = Math.min(player.vy, MAX_FALL);

  player.x += player.vx * pdt;
  player.y += player.vy * pdt;
  resolvePlatforms(pdt);

  if (Math.abs(player.vx) > 10) {
    player.fTimer += pdt;
    if (player.fTimer > .1) { player.fTimer = 0; player.frame = (player.frame+1)%2; }
  } else {
    player.frame = 0;
  }

  const targetCam = player.x + player.w/2 - VW/3;
  camX += (targetCam - camX) * Math.min(pdt*10, 1);
  camX  = Math.max(0, Math.min(camX, LEVEL_W - VW));

  // Power-ups
  player.powerUpTimer -= pdt;
  if (player.powerUpTimer < 0) player.powerUp = null;

  // Magnet coin pull
  if (player.powerUp === 'magnet') {
    coins.forEach(c => {
      if (c.collected) return;
      const dx = player.x + player.w/2 - c.x;
      const dy = player.y + player.h/2 - c.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 80) {
        c.x += dx / dist * 100 * pdt;
        c.y += dy / dist * 100 * pdt;
      }
    });
  }

  // Coin pickup
  coins.forEach(c => {
    if (c.collected) return;
    if (Math.abs(player.x+player.w/2 - c.x)<18 && Math.abs(player.y+player.h/2 - c.y)<18) {
      c.collected = true; coinsCollected++;
      document.getElementById('hud-coins').textContent = 'COINS: ' + coinsCollected;
      spawnSparkles(c.x, c.y, 8, '#ffdd00');
      sfxCoin();
      if (coinsCollected >= totalCoins) {
        sfxWin();
        setTimeout(()=>{ document.getElementById('win').style.display='flex'; }, 1000);
      }
    }
  });

  // Flag celebration
  if (!flagReached && coinsCollected >= totalCoins && Math.abs(player.x + player.w/2 - FLAG.x) < 40 && Math.abs(player.y + player.h/2 - FLAG.y) < 40) {
    flagReached = true;
    sfxWin();
    for (let i = 0; i < 32; i++) {
      const angle = Math.random() * 6.28;
      const speed = Math.random() * 180 + 80;
      celebrationParticles.push({
        x: FLAG.x, y: FLAG.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 100,
        life: 1.5,
        color: ['#ffdd00', '#ff6644', '#ff4444', '#ffaa00'][Math.floor(Math.random() * 4)],
      });
    }
  }

  // Palm tree power-ups
  PALM_TREES.forEach(pt => {
    if (Math.abs(player.x + player.w/2 - pt.x) < 25 && Math.abs(player.y + player.h/2 - (GROUND_Y-20)) < 30) {
      if (player.powerUp !== pt.type) {
        player.powerUp = pt.type;
        player.powerUpTimer = pt.type === 'shield' ? 5 : pt.type === 'speed' ? 6 : 8;
        showMsg(pt.type.toUpperCase() + ' POWER UP!', 1500);
        sfxPowerUp();
      }
    }
  });

  // Enemy AI
  enemies.forEach(e => {
    // Patrol movement
    e.x += e.patrolVx * pdt;
    if (e.x <= e.patrolLeft) { e.x = e.patrolLeft; e.patrolVx = Math.abs(e.patrolVx); }
    if (e.x >= e.patrolRight) { e.x = e.patrolRight; e.patrolVx = -Math.abs(e.patrolVx); }

    e.facing = e.patrolVx > 0 ? 1 : -1;
    e.insultTimer -= pdt;

    if (e.insultTimer <= 0) {
      const insult = INSULTS[Math.floor(Math.random() * INSULTS.length)];
      e.insultTimer = e.insultCooldown;
      e.insultCooldown = Math.random()*1.5+2.5;

      // Show speech bubble above enemy
      showInsultAboveEnemy(e, insult);

      // Fire projectile
      const dx = player.x + player.w/2 - e.x;
      const dy = player.y + player.h/2 - e.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0) {
        projectiles.push({
          x: e.x,
          y: e.y,
          vx: dx / dist * 90,
          vy: dy / dist * 90 - 30,
          life: 4,
          insult: insult,
        });
      }
    }
  });

  // Stomp combo timer
  stompComboTimer -= pdt;
  if (stompComboTimer <= 0) stompCombo = 0;

  // Stomp-to-kill: check if player is falling onto enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const ePw = e.w, ePh = e.h;
    const eLeft = e.x - ePw/2;
    const eRight = e.x + ePw/2;
    const eTop = e.y - ePh;
    const eBottom = e.y;

    const pLeft = player.x;
    const pRight = player.x + player.w;
    const pBottom = player.y + player.h;
    const pTop = player.y;

    // Check horizontal overlap
    if (pRight > eLeft + 2 && pLeft < eRight - 2) {
      // Stomp: player falling, feet near enemy head
      if (player.vy > 0 && pBottom >= eTop && pBottom <= eTop + 14) {
        // Successful stomp!
        stompCombo++;
        sfxStomp();
        stompComboTimer = 1.5;

        // Bounce player upward (higher with combos)
        const bounceBoost = Math.min(stompCombo * 20, 80);
        player.vy = JUMP_VEL * 0.65 - bounceBoost;
        player.onGround = false;

        // Squash effect on player
        playerSquash.sx = 1.4;
        playerSquash.sy = 0.6;

        // Spawn death animation
        deathAnims.push({
          x: e.x, y: eTop, w: ePw, h: ePh,
          name: e.name, color: e.color, skin: e.skin, hair: e.hair, cls: e.cls,
          squish: 1.0, // 1.0 = normal, animates to 0
          timer: 0.4,
          phase: 'squish',
        });

        // Score popup
        const pts = stompCombo * 100;
        scorePopups.push({
          x: e.x, y: eTop - 5,
          text: stompCombo > 1 ? `${pts} x${stompCombo}!` : `${pts}`,
          timer: 1.2,
          color: stompCombo > 2 ? '#ff4444' : stompCombo > 1 ? '#ffaa00' : '#ffdd00',
          scale: 1 + stompCombo * 0.15,
        });

        // Big particle burst
        const burstColors = ['#ffdd00','#ff6644','#ff4444','#ffaa00', e.color];
        for (let j = 0; j < 16 + stompCombo * 4; j++) {
          const angle = Math.random() * 6.28;
          const speed = Math.random() * 120 + 50;
          sparkles.push({
            x: e.x, y: eTop + ePh/2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 60,
            life: 0.6 + Math.random() * 0.4,
            color: burstColors[Math.floor(Math.random() * burstColors.length)],
          });
        }

        // Screen shake
        screenShake.intensity = 3 + stompCombo;
        screenShake.timer = 0.2;

        // Remove enemy
        enemies.splice(i, 1);

        // Show combo message
        if (stompCombo >= 3) {
          showMsg('STOMP COMBO x' + stompCombo + '!', 1200);
        }

        continue;
      }

      // Side/bottom collision with enemy (damage player)
      if (!player.invTimer && !(player.powerUp === 'shield') &&
          pBottom > eTop + 8 && pTop < eBottom &&
          pRight > eLeft && pLeft < eRight) {
        player.hp--;
        sfxDamage();
        player.invTimer = 1.5;
        // Knockback
        player.vx = (player.x < e.x) ? -120 : 120;
        player.vy = -180;
        screenShake.intensity = 6;
        screenShake.timer = 0.3;
        playerSquash.sx = 0.6;
        playerSquash.sy = 1.4;
        spawnSparkles(player.x + player.w/2, player.y + player.h/2, 12, '#ff3333');
        if (player.hp <= 0) {
          document.getElementById('gameover').style.display='flex';
        }
        updateHPDisplay();
      }
    }
  }

  // Landing dust particles
  if (player.onGround && !wasOnGround) {
    // Just landed
    playerSquash.sx = 1.35;
    playerSquash.sy = 0.65;
    for (let i = 0; i < 6; i++) {
      const side = i < 3 ? -1 : 1;
      dustParticles.push({
        x: player.x + player.w/2 + side * (Math.random() * 8 + 2),
        y: player.y + player.h,
        vx: side * (Math.random() * 40 + 20),
        vy: -Math.random() * 20 - 5,
        life: 0.35,
        size: Math.random() * 2.5 + 1,
      });
    }
  }
  wasOnGround = player.onGround;

  // Jump stretch
  if (keys[' '] || keys['ArrowUp'] || keys['w'] || mctrl.jump) {
    if (player.vy < -100) {
      playerSquash.sx = 0.8;
      playerSquash.sy = 1.25;
    }
  }

  // Squash/stretch interpolation
  playerSquash.sx += (1 - playerSquash.sx) * Math.min(pdt * 12, 1);
  playerSquash.sy += (1 - playerSquash.sy) * Math.min(pdt * 12, 1);

  // Screen shake update
  if (screenShake.timer > 0) {
    screenShake.timer -= pdt;
    const t = screenShake.timer > 0 ? screenShake.intensity : 0;
    screenShake.x = (Math.random() - 0.5) * t * 2;
    screenShake.y = (Math.random() - 0.5) * t * 2;
  } else {
    screenShake.x = 0;
    screenShake.y = 0;
  }

  // Update death animations
  deathAnims = deathAnims.filter(da => {
    da.timer -= pdt;
    if (da.phase === 'squish') {
      da.squish = Math.max(0, da.timer / 0.4);
    }
    return da.timer > 0;
  });

  // Update dust particles
  dustParticles = dustParticles.filter(d => {
    d.x += d.vx * pdt;
    d.y += d.vy * pdt;
    d.life -= pdt;
    return d.life > 0;
  });

  // Update score popups
  scorePopups = scorePopups.filter(sp => {
    sp.y -= 30 * pdt;
    sp.timer -= pdt;
    return sp.timer > 0;
  });

  // Update celebration particles
  celebrationParticles = celebrationParticles.filter(p => {
    p.x += p.vx * pdt;
    p.y += p.vy * pdt;
    p.vy += 200 * pdt;
    p.life -= pdt;
    return p.life > 0;
  });

  // Update projectiles
  projectiles = projectiles.filter(proj => {
    proj.x += proj.vx * pdt;
    proj.y += proj.vy * pdt;
    proj.vy += 200 * pdt;
    proj.life -= pdt;

    spawnSparkles(proj.x, proj.y, 1, '#ff6644');

    if (!player.invTimer && !(player.powerUp === 'shield')) {
      const dx = player.x + player.w/2 - proj.x;
      const dy = player.y + player.h/2 - proj.y;
      if (Math.hypot(dx, dy) < 12) {
        player.hp--;
        sfxDamage();
        player.invTimer = 1.5;
        insultTexts.push({
          text: proj.insult,
          x: player.x + player.w/2,
          y: player.y - 10,
          timer: 1.5
        });
        spawnSparkles(player.x + player.w/2, player.y + player.h/2, 12, '#ff3333');
        if (player.hp <= 0) {
          document.getElementById('gameover').style.display='flex';
        }
        updateHPDisplay();
        return false;
      }
    }

    return proj.life > 0;
  });

  // Update insult texts
  insultTexts = insultTexts.filter(it => {
    it.timer -= pdt;
    return it.timer > 0;
  });

  // Update sparkles
  sparkles.forEach(s => {
    s.x += s.vx * pdt;
    s.y += s.vy * pdt;
    s.vy += 200 * pdt;
    s.life -= pdt;
  });
  sparkles = sparkles.filter(s => s.life > 0);

  // Invincibility
  player.invTimer -= pdt;

  if (player.y > VH + 80) {
    player.x = Math.max(0, camX+40); player.y = GROUND_Y-50;
    player.vx = 0; player.vy = 0;
  }
}

function spawnSparkles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * 6.28;
    const speed = Math.random() * 60 + 40;
    sparkles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 30,
      life: 0.6,
      color: color,
    });
  }
}

function showInsultAboveEnemy(enemy, text) {
  insultTexts.push({
    text: text,
    x: enemy.x,
    y: enemy.y - 28,
    timer: 2,
    isFromEnemy: true,
  });
}

function updateHPDisplay() {
  const hearts = '❤'.repeat(Math.max(0, player.hp));
  const empty = '◇'.repeat(Math.max(0, player.maxHp - player.hp));
  document.getElementById('hud-hp').textContent = hearts + empty;
}

// ═══════════════════════════════════════════════════
//  DRAW HELPERS
// ═══════════════════════════════════════════════════
function drawBG(now){
  const sky=ctx.createLinearGradient(0,0,0,VH);
  sky.addColorStop(0,'#0a0a2a');
  sky.addColorStop(1,'#1a1a4a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,VW,VH);

  bgStars.forEach(s=>{
    let tw=(Math.sin(now*.002+s.twinkle)+1)/2;
    if (s.bright) {
      ctx.fillStyle=`rgba(255,255,220,${.6+tw*.4})`;
      const spike = 3;
      ctx.fillRect(s.x-camX*.2, s.y-spike, 1, spike*2);
      ctx.fillRect(s.x-camX*.2-spike, s.y, spike*2, 1);
    } else {
      ctx.fillStyle=`rgba(255,255,220,${.3+tw*.5})`;
      ctx.beginPath();
      ctx.arc(s.x-camX*.2, s.y, s.r, 0,6.28);
      ctx.fill();
    }
  });

  ctx.fillStyle='rgba(255,255,200,.85)';
  ctx.beginPath(); ctx.arc(VW*.78, VH*.14, 22, 0,6.28); ctx.fill();
  ctx.fillStyle='rgba(20,20,60,.6)';
  ctx.beginPath(); ctx.arc(VW*.78+8, VH*.14-5, 18, 0,6.28); ctx.fill();

  const grad = ctx.createRadialGradient(VW*.78, VH*.14, 10, VW*.78, VH*.14, 30);
  grad.addColorStop(0, 'rgba(255,255,200,.3)');
  grad.addColorStop(1, 'rgba(255,255,200,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(VW*.78, VH*.14, 30, 0, 6.28); ctx.fill();

  ctx.fillStyle='#1a2a3a';
  for(let i=0;i<10;i++){
    const hx=((i*280)-camX*.15)%LEVEL_W - camX*.15%280;
    ctx.beginPath();
    ctx.moveTo(hx,VH*.7);
    ctx.quadraticCurveTo(hx+60,VH*.45,hx+120,VH*.7);
    ctx.fill();
  }

  ctx.fillStyle='#1a4a2a';
  for(let i=0;i<30;i++){
    const tx=((i*90)-camX*.3)%LEVEL_W - camX*.3%90;
    const th=Math.sin(i*0.7)*20+40;
    ctx.fillRect(tx, VH*.6-th, 8, th);
  }
}

function drawPlatform(p){
  const [px,py,pw,ph,col]=p;
  const rx=px-camX, ry=py;
  if(rx+pw<0||rx>VW) return;

  ctx.fillStyle=col;
  ctx.fillRect(rx,ry,pw,ph);
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.fillRect(rx,ry,pw,3);
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.fillRect(rx,ry+ph-4,pw,4);

  if(ph===32){
    ctx.fillStyle='#6aaa3a';
    ctx.fillRect(rx,ry,pw,6);
    ctx.fillStyle='#7acc44';
    for(let i=4;i<pw;i+=8){
      ctx.fillRect(rx+i,ry-3,2,4);
      ctx.fillRect(rx+i+3,ry-4,2,5);
    }
  } else {
    ctx.strokeStyle='rgba(0,0,0,.25)';
    ctx.lineWidth=1;
    for(let bx=0;bx<pw;bx+=18){
      ctx.beginPath(); ctx.moveTo(rx+bx,ry); ctx.lineTo(rx+bx,ry+ph); ctx.stroke();
    }
    for(let ny=0;ny<ph;ny+=6) {
      ctx.fillStyle='rgba(0,0,0,.1)';
      ctx.fillRect(rx,ry+ny,pw,1);
    }
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.fillRect(rx,ry,pw,1);
  }
}

function drawCoin(c, now){
  if(c.collected) return;
  const cx=c.x-camX, cy=c.y;
  if(cx<-20||cx>VW+20) return;
  const bob=Math.sin(now*.005+c.x*.01)*3;
  const pulse=(Math.sin(now*.008+c.x*.02)+1)/2;
  const scale = Math.cos(now*.01+c.x*.005)*0.5+0.5;

  ctx.fillStyle=`rgba(255,220,50,${.12+pulse*.1})`;
  ctx.beginPath(); ctx.arc(cx,cy+bob,12,0,6.28); ctx.fill();

  ctx.fillStyle='#f5c842';
  ctx.beginPath(); ctx.ellipse(cx,cy+bob,7*scale,7,0,0,6.28); ctx.fill();

  ctx.fillStyle='#ffee88';
  ctx.beginPath(); ctx.ellipse(cx-1,cy+bob-1,4*scale,4,0,0,6.28); ctx.fill();

  ctx.fillStyle='#cc9900';
  ctx.font='bold 6px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('$',cx,cy+bob);
}

function drawPalmTree(pt, now) {
  if(pt.collected) return;
  const px = pt.x - camX;
  const baseY = GROUND_Y;
  if (px < -40 || px > VW + 40) return;

  const bob = Math.sin(now * 0.004 + pt.x * 0.01) * 1.5;

  const glowColors = { shield:'#ffdd00', speed:'#4488ff', magnet:'#cc44ff' };
  const glowRGB = { shield:'255,220,0', speed:'68,136,255', magnet:'204,68,255' };
  const gc = glowColors[pt.type];
  const gr = glowRGB[pt.type];

  // Pulsing glow on ground
  const pulse = (Math.sin(now*.005+pt.x)+1)/2;
  const grd = ctx.createRadialGradient(px, baseY-2, 2, px, baseY-2, 20);
  grd.addColorStop(0, `rgba(${gr},${.25+pulse*.15})`);
  grd.addColorStop(1, `rgba(${gr},0)`);
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(px, baseY-2, 20, 0, 6.28); ctx.fill();

  // === TRUNK (segmented, slightly curved) ===
  const trunkH = 28;
  const topY = baseY - trunkH + bob;
  ctx.fillStyle = '#7a4a1e';
  // Draw trunk as segments curving slightly right
  for(let i=0; i<6; i++){
    const t = i/6;
    const segY = baseY - trunkH*t + bob*(1-t);
    const curve = Math.sin(t*2)*1.5;
    const w = 3 - t*0.8;
    ctx.fillRect(px-w/2+curve, segY-trunkH/6, w, trunkH/6+1);
  }
  // Trunk ring details
  ctx.fillStyle = '#5a3515';
  for(let i=1; i<5; i++){
    const ry = baseY - i*5 + bob*(1-i/6);
    ctx.fillRect(px-2, ry, 4, 1);
  }
  // Trunk highlight
  ctx.fillStyle = 'rgba(255,200,120,.18)';
  ctx.fillRect(px+1, topY+2, 1, trunkH-4);

  // === PALM FRONDS (5 drooping leaves) ===
  const sway = Math.sin(now*.002+pt.x)*.06;
  const frondData = [
    {angle:-2.3+sway, len:16}, // far left
    {angle:-1.1+sway, len:13}, // left
    {angle:0+sway,    len:12}, // center up
    {angle:1.1+sway,  len:13}, // right
    {angle:2.3+sway,  len:16}, // far right
  ];
  frondData.forEach((fr,fi)=>{
    const steps = 10;
    for(let s=0;s<steps;s++){
      const t = s/steps;
      const droop = t*t*8;
      const fx = px + Math.sin(fr.angle)*fr.len*t;
      const fy = topY + 2 - fr.len*t*(1-t*.4) + droop;
      const lw = (1-t)*3.5+0.5;
      // Main leaf spine
      ctx.fillStyle = fi%2===0 ? '#3a9a2a' : '#2e8a22';
      ctx.fillRect(fx-lw/2, fy-0.5, lw, 2);
      // Side leaflets
      if(s>1 && s<steps-1){
        ctx.fillStyle = '#4aaa3a';
        ctx.fillRect(fx-lw-1, fy-1, lw, 1);
        ctx.fillRect(fx+lw*.3, fy+0.5, lw, 1);
      }
    }
  });

  // Coconuts
  ctx.fillStyle = '#8b6914';
  ctx.beginPath(); ctx.arc(px-3, topY+4, 2.5, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(px+2.5, topY+5, 2.5, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#a07a1e';
  ctx.beginPath(); ctx.arc(px-3, topY+3.5, 1.2, 0, 6.28); ctx.fill();

  // Type label floating above
  const ta = .6 + pulse*.4;
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  const label = pt.type.toUpperCase();
  ctx.fillText(label, px+1, topY-5);
  ctx.globalAlpha = ta;
  ctx.fillStyle = gc;
  ctx.fillText(label, px, topY-6);
  ctx.globalAlpha = 1;
}

function drawSparkle(s) {
  const alpha = Math.max(0, Math.min(1, s.life * 1.6));
  const size = 1.2 + s.life * 1.5;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = s.color;
  ctx.beginPath();
  ctx.arc(s.x - camX, s.y, size, 0, 6.28);
  ctx.fill();
  // Inner bright core
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = alpha * 0.5;
  ctx.beginPath();
  ctx.arc(s.x - camX, s.y, size * 0.4, 0, 6.28);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawProjectile(proj, now) {
  const px = proj.x - camX;
  const py = proj.y;
  if (px < -20 || px > VW + 20) return;

  const rot = now * 0.008 + proj.x * 0.1;
  const pulse = (Math.sin(now * 0.012) + 1) / 2;

  // Trail particles
  ctx.fillStyle = `rgba(255,80,30,${0.15 + pulse * 0.1})`;
  ctx.beginPath(); ctx.arc(px - proj.vx * 0.03, py - proj.vy * 0.03, 6, 0, 6.28); ctx.fill();
  ctx.fillStyle = 'rgba(255,50,20,0.08)';
  ctx.beginPath(); ctx.arc(px - proj.vx * 0.06, py - proj.vy * 0.06, 4, 0, 6.28); ctx.fill();

  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(rot);

  // Outer glow
  const glow = ctx.createRadialGradient(0, 0, 4, 0, 0, 12);
  glow.addColorStop(0, 'rgba(255,80,0,0.3)');
  glow.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(0, 0, 12, 0, 6.28); ctx.fill();

  // Main face circle
  const faceGrad = ctx.createRadialGradient(-2, -2, 1, 0, 0, 8);
  faceGrad.addColorStop(0, '#ff6633');
  faceGrad.addColorStop(0.6, '#ee3311');
  faceGrad.addColorStop(1, '#aa1100');
  ctx.fillStyle = faceGrad;
  ctx.beginPath(); ctx.arc(0, 0, 8, 0, 6.28); ctx.fill();

  // Face outline
  ctx.strokeStyle = '#880000';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(0, 0, 8, 0, 6.28); ctx.stroke();

  // Angry eyebrows (V shapes)
  ctx.strokeStyle = '#440000';
  ctx.lineWidth = 1.5;
  // Left eyebrow (angled down toward center)
  ctx.beginPath(); ctx.moveTo(-5, -4); ctx.lineTo(-2, -2.5); ctx.stroke();
  // Right eyebrow (angled down toward center)
  ctx.beginPath(); ctx.moveTo(5, -4); ctx.lineTo(2, -2.5); ctx.stroke();

  // Angry eyes (white with dark pupil)
  ctx.fillStyle = '#fff';
  ctx.fillRect(-5, -2, 3, 2.5);
  ctx.fillRect(2, -2, 3, 2.5);
  // Pupils
  ctx.fillStyle = '#220000';
  ctx.fillRect(-4, -1.5, 2, 2);
  ctx.fillRect(3, -1.5, 2, 2);

  // Frown mouth
  ctx.strokeStyle = '#440000';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.arc(0, 5, 3.5, Math.PI + 0.4, -0.4);
  ctx.stroke();

  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  SHARED CHARACTER SPRITE DRAWING
// ═══════════════════════════════════════════════════
function drawCharSprite(ctx, cx, cy, w, h, data, now, opts) {
  const facing = opts.facing || 1;
  const walking = opts.walking || false;
  const jumping = opts.jumping || false;
  const frame = opts.frame || 0;
  const bob = opts.bob || 0;
  const isEnemy = opts.isEnemy || false;
  const invTimer = opts.invTimer || 0;
  const powerUp = opts.powerUp || null;

  ctx.save();

  // Apply facing direction (mirror)
  if (facing === -1) {
    ctx.translate(cx + w, cy);
    ctx.scale(-1, 1);
    ctx.translate(-w, 0);
  } else {
    ctx.translate(cx, cy);
  }

  const x = 0, y = 0;
  const pw = w, ph = h;

  // Class-specific drawing
  const cls = data.cls;

  if (cls === 'archer') {
    // Green hood/cap, green tunic, brown boots, bow and quiver
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(pw/2, ph + bob, pw*0.38, 2, 0, 0, 6.28); ctx.fill();

    // Boots (brown)
    ctx.fillStyle = '#8b5513';
    ctx.fillRect(x+pw*0.05, y+ph*0.72+bob, pw*0.4, ph*0.28);
    ctx.fillRect(x+pw*0.55, y+ph*0.72+bob, pw*0.4, ph*0.28);

    // Black outlines around boots
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.05, y+ph*0.72+bob, pw*0.4, ph*0.28);
    ctx.strokeRect(x+pw*0.55, y+ph*0.72+bob, pw*0.4, ph*0.28);

    // Body tunic (character color)
    ctx.fillStyle = data.color;
    ctx.fillRect(x+pw*0.1, y+ph*0.35+bob, pw*0.8, ph*0.4);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.1, y+ph*0.35+bob, pw*0.8, ph*0.4);

    // Arms (skin)
    ctx.fillStyle = data.skin;
    ctx.fillRect(x-pw*0.1, y+ph*0.4+bob, pw*0.2, ph*0.3);
    ctx.fillRect(x+pw*0.9, y+ph*0.4+bob, pw*0.2, ph*0.3);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x-pw*0.1, y+ph*0.4+bob, pw*0.2, ph*0.3);
    ctx.strokeRect(x+pw*0.9, y+ph*0.4+bob, pw*0.2, ph*0.3);

    // Head (skin)
    ctx.fillStyle = data.skin;
    ctx.fillRect(x+pw*0.2, y+ph*0.05+bob, pw*0.6, ph*0.33);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.2, y+ph*0.05+bob, pw*0.6, ph*0.33);

    // Hood (green, covering top of head)
    ctx.fillStyle = data.color;
    ctx.fillRect(x+pw*0.15, y+ph*0.02+bob, pw*0.7, ph*0.18);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.15, y+ph*0.02+bob, pw*0.7, ph*0.18);

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+pw*0.28, y+ph*0.15+bob, pw*0.08, ph*0.06);
    ctx.fillRect(x+pw*0.64, y+ph*0.15+bob, pw*0.08, ph*0.06);
    ctx.fillStyle = '#000';
    ctx.fillRect(x+pw*0.3, y+ph*0.16+bob, pw*0.04, ph*0.04);
    ctx.fillRect(x+pw*0.66, y+ph*0.16+bob, pw*0.04, ph*0.04);

    if (isEnemy) {
      // Angry eyebrows
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x+pw*0.26, y+ph*0.13+bob);
      ctx.lineTo(x+pw*0.36, y+ph*0.11+bob);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x+pw*0.74, y+ph*0.13+bob);
      ctx.lineTo(x+pw*0.64, y+ph*0.11+bob);
      ctx.stroke();
    }

    // Bow on back (brown arc)
    ctx.strokeStyle = '#8b5513';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x+pw*0.5, y+ph*0.25+bob, pw*0.15, 0.3, Math.PI-0.3);
    ctx.stroke();

    // Quiver (brown rectangle with arrow tips)
    ctx.fillStyle = '#8b5513';
    ctx.fillRect(x+pw*0.6, y+ph*0.2+bob, pw*0.12, ph*0.2);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(x+pw*0.62, y+ph*0.18+bob, pw*0.08, ph*0.04);
    ctx.fillRect(x+pw*0.62, y+ph*0.25+bob, pw*0.08, ph*0.04);
    ctx.fillRect(x+pw*0.62, y+ph*0.32+bob, pw*0.08, ph*0.04);

  } else if (cls === 'knight') {
    // Full helmet, plate armor, shield
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(pw/2, ph + bob, pw*0.38, 2, 0, 0, 6.28); ctx.fill();

    // Armored boots
    ctx.fillStyle = '#666';
    ctx.fillRect(x+pw*0.08, y+ph*0.72+bob, pw*0.36, ph*0.28);
    ctx.fillRect(x+pw*0.56, y+ph*0.72+bob, pw*0.36, ph*0.28);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.08, y+ph*0.72+bob, pw*0.36, ph*0.28);
    ctx.strokeRect(x+pw*0.56, y+ph*0.72+bob, pw*0.36, ph*0.28);

    // Plate armor body
    ctx.fillStyle = data.color;
    ctx.fillRect(x+pw*0.1, y+ph*0.38+bob, pw*0.8, ph*0.35);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.1, y+ph*0.38+bob, pw*0.8, ph*0.35);

    // Armor highlight
    ctx.fillStyle = '#aaa';
    ctx.fillRect(x+pw*0.12, y+ph*0.4+bob, pw*0.06, ph*0.15);

    // Arms (armor color)
    ctx.fillStyle = data.color;
    ctx.fillRect(x-pw*0.1, y+ph*0.42+bob, pw*0.2, ph*0.28);
    ctx.fillRect(x+pw*0.9, y+ph*0.42+bob, pw*0.2, ph*0.28);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x-pw*0.1, y+ph*0.42+bob, pw*0.2, ph*0.28);
    ctx.strokeRect(x+pw*0.9, y+ph*0.42+bob, pw*0.2, ph*0.28);

    // Helmet (full, character color)
    ctx.fillStyle = data.color;
    ctx.fillRect(x+pw*0.15, y+ph*0.04+bob, pw*0.7, ph*0.38);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.15, y+ph*0.04+bob, pw*0.7, ph*0.38);

    // Visor slit
    ctx.fillStyle = '#000';
    ctx.fillRect(x+pw*0.3, y+ph*0.18+bob, pw*0.4, ph*0.06);

    // Eyes behind visor
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+pw*0.35, y+ph*0.19+bob, pw*0.06, ph*0.04);
    ctx.fillRect(x+pw*0.59, y+ph*0.19+bob, pw*0.06, ph*0.04);
    ctx.fillStyle = '#000';
    ctx.fillRect(x+pw*0.36, y+ph*0.2+bob, pw*0.03, ph*0.02);
    ctx.fillRect(x+pw*0.6, y+ph*0.2+bob, pw*0.03, ph*0.02);

    // Shield
    ctx.fillStyle = '#1a6699';
    ctx.fillRect(x+pw*0.75, y+ph*0.35+bob, pw*0.25, ph*0.25);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.75, y+ph*0.35+bob, pw*0.25, ph*0.25);

    // Shield cross emblem
    ctx.strokeStyle = '#ffdd00';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x+pw*0.875, y+ph*0.4+bob);
    ctx.lineTo(x+pw*0.875, y+ph*0.6+bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+pw*0.78, y+ph*0.475+bob);
    ctx.lineTo(x+pw*0.97, y+ph*0.475+bob);
    ctx.stroke();

  } else if (cls === 'rogue') {
    // Large hood, dark cloak, glowing eyes, dagger
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(pw/2, ph + bob, pw*0.38, 2, 0, 0, 6.28); ctx.fill();

    // Dark cloak body
    ctx.fillStyle = '#222';
    ctx.fillRect(x+pw*0.08, y+ph*0.32+bob, pw*0.84, ph*0.5);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.08, y+ph*0.32+bob, pw*0.84, ph*0.5);

    // Dark boots
    ctx.fillStyle = '#111';
    ctx.fillRect(x+pw*0.1, y+ph*0.7+bob, pw*0.35, ph*0.3);
    ctx.fillRect(x+pw*0.55, y+ph*0.7+bob, pw*0.35, ph*0.3);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.1, y+ph*0.7+bob, pw*0.35, ph*0.3);
    ctx.strokeRect(x+pw*0.55, y+ph*0.7+bob, pw*0.35, ph*0.3);

    // Large hood/cowl (character color)
    ctx.fillStyle = data.color;
    ctx.beginPath();
    ctx.ellipse(x+pw*0.5, y+ph*0.15+bob, pw*0.45, ph*0.2, 0, 0, Math.PI);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Lower face visible (skin)
    ctx.fillStyle = data.skin;
    ctx.fillRect(x+pw*0.35, y+ph*0.2+bob, pw*0.3, ph*0.15);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.35, y+ph*0.2+bob, pw*0.3, ph*0.15);

    // Glowing eyes (green dots under hood)
    ctx.fillStyle = '#00ff00';
    ctx.beginPath(); ctx.arc(x+pw*0.42, y+ph*0.12+bob, pw*0.04, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(x+pw*0.58, y+ph*0.12+bob, pw*0.04, 0, 6.28); ctx.fill();

    // Eye glow
    ctx.fillStyle = 'rgba(0,255,0,.3)';
    ctx.beginPath(); ctx.arc(x+pw*0.42, y+ph*0.12+bob, pw*0.07, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(x+pw*0.58, y+ph*0.12+bob, pw*0.07, 0, 6.28); ctx.fill();

    // Dagger in hand (silver blade)
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(x+pw*0.85, y+ph*0.4+bob, pw*0.08, ph*0.12);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x+pw*0.85, y+ph*0.4+bob, pw*0.08, ph*0.12);

    // Dagger handle (brown)
    ctx.fillStyle = '#8b5513';
    ctx.fillRect(x+pw*0.83, y+ph*0.52+bob, pw*0.12, ph*0.08);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x+pw*0.83, y+ph*0.52+bob, pw*0.12, ph*0.08);

  } else if (cls === 'warrior') {

    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.08, y+ph*0.72+bob, pw*0.36, ph*0.28);
    ctx.strokeRect(x+pw*0.56, y+ph*0.72+bob, pw*0.36, ph*0.28);

    // Muscular tunic (character color)
    ctx.fillStyle = data.color;
    ctx.fillRect(x+pw*0.1, y+ph*0.35+bob, pw*0.8, ph*0.38);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.1, y+ph*0.35+bob, pw*0.8, ph*0.38);

    // Muscle highlight
    ctx.fillStyle = '#ffaa66';
    ctx.fillRect(x+pw*0.15, y+ph*0.38+bob, pw*0.06, ph*0.12);
    ctx.fillRect(x+pw*0.79, y+ph*0.38+bob, pw*0.06, ph*0.12);

    // Belt with pouches
    ctx.fillStyle = '#7a4010';
    ctx.fillRect(x+pw*0.1, y+ph*0.65+bob, pw*0.8, ph*0.08);
    ctx.fillStyle = '#5a3010';
    ctx.fillRect(x+pw*0.25, y+ph*0.64+bob, pw*0.08, ph*0.1);
    ctx.fillRect(x+pw*0.67, y+ph*0.64+bob, pw*0.08, ph*0.1);

    // Head (skin)
    ctx.fillStyle = data.skin;
    ctx.fillRect(x+pw*0.2, y+ph*0.06+bob, pw*0.6, ph*0.32);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+pw*0.2, y+ph*0.06+bob, pw*0.6, ph*0.32);

    // Hair (visible with spiky look)
    ctx.fillStyle = data.hair;
    ctx.fillRect(x+pw*0.2, y+ph*0.04+bob, pw*0.6, ph*0.12);
    // Spiky hair
    ctx.fillRect(x+pw*0.25, y+ph*0.0+bob, pw*0.08, ph*0.06);
    ctx.fillRect(x+pw*0.45, y+ph*0.0+bob, pw*0.08, ph*0.06);
    ctx.fillRect(x+pw*0.65, y+ph*0.0+bob, pw*0.08, ph*0.06);

    // Headband
    ctx.fillStyle = data.color;
    ctx.fillRect(x+pw*0.2, y+ph*0.14+bob, pw*0.6, ph*0.06);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x+pw*0.2, y+ph*0.14+bob, pw*0.6, ph*0.06);

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+pw*0.28, y+ph*0.15+bob, pw*0.08, ph*0.06);
    ctx.fillRect(x+pw*0.64, y+ph*0.15+bob, pw*0.08, ph*0.06);
    ctx.fillStyle = '#000';
    ctx.fillRect(x+pw*0.3, y+ph*0.16+bob, pw*0.04, ph*0.04);
    ctx.fillRect(x+pw*0.66, y+ph*0.16+bob, pw*0.04, ph*0.04);

    if (isEnemy) {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x+pw*0.26, y+ph*0.13+bob);
      ctx.lineTo(x+pw*0.36, y+ph*0.11+bob);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x+pw*0.74, y+ph*0.13+bob);
      ctx.lineTo(x+pw*0.64, y+ph*0.11+bob);
      ctx.stroke();
    }

    // Arm wraps
    ctx.fillStyle = '#ddd';
    ctx.fillRect(x-pw*0.1, y+ph*0.4+bob, pw*0.2, ph*0.3);
    ctx.fillRect(x+pw*0.9, y+ph*0.4+bob, pw*0.2, ph*0.3);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x-pw*0.1, y+ph*0.4+bob, pw*0.2, ph*0.3);
    ctx.strokeRect(x+pw*0.9, y+ph*0.4+bob, pw*0.2, ph*0.3);

    // Wrap lines
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x-pw*0.08, y+ph*(0.42+i*0.09)+bob);
      ctx.lineTo(x-pw*0.02, y+ph*(0.42+i*0.09)+bob);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x+pw*1.02, y+ph*(0.42+i*0.09)+bob);
      ctx.lineTo(x+pw*1.08, y+ph*(0.42+i*0.09)+bob);
      ctx.stroke();
    }

    // Sword (gray blade, brown handle)
    ctx.fillStyle = '#888';
    ctx.fillRect(x+pw*0.75, y+ph*0.3+bob, pw*0.08, ph*0.25);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x+pw*0.75, y+ph*0.3+bob, pw*0.08, ph*0.25);

    // Sword handle
    ctx.fillStyle = '#8b5513';
    ctx.fillRect(x+pw*0.76, y+ph*0.54+bob, pw*0.06, ph*0.08);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x+pw*0.76, y+ph*0.54+bob, pw*0.06, ph*0.08);

  } else if (cls === 'ninja') {
    // Full face mask, black body suit, wrapped hands, throwing star
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(pw/2, ph + bob, pw*0.38, 2, 0, 0, 6.28); ctx.fill();

    // Split-toe boots (dark)
    ctx.fillStyle = '#000';
    ctx.fillRect(x+pw*0.08, y+ph*0.72+bob, pw*0.35, ph*0.28);
    ctx.fillRect(x+pw*0.57, y+ph*0.72+bob, pw*0.35, ph*0.28);

    // Wraps
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x-pw*0.1, y+ph*(0.46+i*0.07)+bob);

    // Full face mask
    ctx.fillStyle = '#000';

    // Throwing star on belt (silver)

    ctx.save();
    ctx.translate(x+pw*0.5, y+ph*0.65+bob);

    ctx.strokeStyle = '#000';

  } else if (cls === 'swordsman') {

  } else if (cls === 'mage') {

  } else {
    // Default fallback character (like original)
    ctx.fillStyle = 'rgba(0,0,0,.25)';

function drawEnemy(enemy, now){
  const sx = enemy.x - camX;
  if(sx < -40 || sx > VW + 40) return;

  const pw = enemy.w, ph = enemy.h;
  const foot = enemy.y;
  const ty = foot - ph;
  const bob = Math.sin(now * 0.003 + enemy.bobPhi) * 0.8;
  const b = bob;
  const isRight = enemy.facing > 0;

  // Draw character sprite
  const charData = {
    name: enemy.name,
    color: enemy.color,
    skin: enemy.skin,
    hair: enemy.hair,
    cls: enemy.cls
  };

  drawCharSprite(ctx, sx - pw/2, ty, pw, ph, charData, now, {
    facing: isRight ? 1 : -1,
    bob: b,
    isEnemy: true,
    invTimer: 0,
    powerUp: null
  });

  ctx.font='bold 6px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(0,0,0,.65)';
  ctx.fillText(enemy.name, sx+1, ty+b+1);
  ctx.fillStyle='#cc3333';
  ctx.fillText(enemy.name, sx, ty+b);

  ctx.fillStyle='#cc3333';
  ctx.font='bold 10px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.fillText('!', sx, ty+b-8);
}

function drawPlayer(now){
  const p=player;
  const sx=p.x-camX;
  const pw=p.w, ph=p.h;
  const y=p.y;
  const isRight = p.vx>=0;
  const bob=p.onGround&&Math.abs(p.vx)>10 ? Math.sin(now*.018)*1.5 : 0;
  const b=bob;
  const isInvincible = p.invTimer > 0;
  const flashOn = Math.sin(now * 0.02) > 0;

  if (isInvincible && !flashOn) {
    ctx.globalAlpha = 0.5;
  }

  if (p.powerUp === 'shield') {
    ctx.fillStyle = '#ffdd0044';
    ctx.beginPath();
    ctx.arc(sx+pw/2, y+ph/2+b, pw*1.5, 0, 6.28);
    ctx.fill();
    ctx.strokeStyle = '#ffdd00';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Apply squash/stretch
  ctx.save();
  const sqCx = sx + pw/2;
  const sqCy = y + ph;
  ctx.translate(sqCx, sqCy);
  ctx.scale(playerSquash.sx, playerSquash.sy);
  ctx.translate(-sqCx, -sqCy);

  // Speed trail effect
  if (p.powerUp === 'speed' && Math.abs(p.vx) > 80) {
    const dir = p.vx > 0 ? -1 : 1;
    for (let i = 1; i <= 3; i++) {
      ctx.globalAlpha = 0.15 / i;
      const trailData = {
        name: p.charName, color: p.charColor,
        skin: p.charSkin, hair: p.charHair, cls: p.charCls
      };
      drawCharSprite(ctx, sx - pw/2 + dir * i * 8, y, pw, ph, trailData, now, {
        facing: isRight ? 1 : -1, bob: b, isEnemy: false, invTimer: 0, powerUp: null
      });
    }
    ctx.globalAlpha = isInvincible && !flashOn ? 0.5 : 1;
  }

  // Draw character sprite using shared function
  const charData = {
    name: p.charName,
    color: p.charColor,
    skin: p.charSkin,
    hair: p.charHair,
    cls: p.charCls
  };

  drawCharSprite(ctx, sx - pw/2, y, pw, ph, charData, now, {
    facing: isRight ? 1 : -1,
    walking: p.onGround && Math.abs(p.vx) > 10,
    jumping: !p.onGround,
    frame: p.frame,
    bob: b,
    isEnemy: false,
    invTimer: p.invTimer,
    powerUp: p.powerUp
  });

  ctx.globalAlpha = 1;
  ctx.restore(); // end squash/stretch

  ctx.font='bold 6px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.fillText(p.charName,sx+pw/2+1,y+b+1);
  ctx.fillStyle='#fff';
  ctx.fillText(p.charName,sx+pw/2,y+b);
}

function drawFlag(now){
  const fx=FLAG.x-camX, fy=FLAG.y;
  if(fx<-20||fx>VW+20) return;

  // Pole
  ctx.fillStyle='#aaa';
  ctx.fillRect(fx-2,fy,4,GROUND_Y-fy);

  // Waving flag with segments
  const wave=Math.sin(now*.008)*4;
  const segmentCount = 5;
  ctx.fillStyle='#f5c842';
  for (let i = 0; i < segmentCount; i++) {
    const t = i / segmentCount;
    const nextT = (i + 1) / segmentCount;
    const y1 = fy + t * 20 + Math.sin(now * 0.008 + t * 2) * 2;
    const y2 = fy + nextT * 20 + Math.sin(now * 0.008 + nextT * 2) * 2;
    const x2 = fx + 2 + (26 * t) + wave * t;
    const x3 = fx + 2 + (26 * nextT) + wave * nextT;
    ctx.beginPath();
    ctx.moveTo(fx+2, y1);
    ctx.lineTo(x2, y1);
    ctx.lineTo(x3, y2);
    ctx.lineTo(fx+2, y2);
    ctx.closePath();
    ctx.fill();
  }

  ctx.fillStyle='#aa7700';
  ctx.font='bold 8px monospace';
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.fillText('★',fx+5,fy+10+wave/2);

  // Base
  ctx.fillStyle='#888';
  ctx.fillRect(fx-6,GROUND_Y-4,16,8);

  // Draw celebration particles
  celebrationParticles.forEach(p => {
    const alpha = p.life / 1.5;
    ctx.fillStyle = `${p.color.slice(0, -1)},${alpha * 0.8})`;
    ctx.fillRect(p.x - camX - 2, p.y - 2, 4, 4);
  });
}

function drawInsultText(it, now) {
  if (!it.text) return;
  const tx = it.x - camX;
  const ty = it.y;

  const alpha = it.timer < 0.3 ? it.timer / 0.3 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;

  const fontSize = it.isFromEnemy ? 8 : 7;
  ctx.font = `bold ${fontSize}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Measure text for bubble sizing
  const textWidth = ctx.measureText(it.text).width;
  const padX = 8, padY = 6;
  const bubbleW = textWidth + padX * 2;
  const bubbleH = fontSize + padY * 2;
  const bubbleX = tx - bubbleW / 2;
  const bubbleY = ty - bubbleH / 2;
  const tailSize = 5;
  const cornerR = 5;

  if (it.isFromEnemy) {
    // White speech bubble with rounded corners
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;

    // Rounded rectangle
    ctx.beginPath();
    ctx.moveTo(bubbleX + cornerR, bubbleY);
    ctx.lineTo(bubbleX + bubbleW - cornerR, bubbleY);
    ctx.arcTo(bubbleX + bubbleW, bubbleY, bubbleX + bubbleW, bubbleY + cornerR, cornerR);
    ctx.lineTo(bubbleX + bubbleW, bubbleY + bubbleH - cornerR);
    ctx.arcTo(bubbleX + bubbleW, bubbleY + bubbleH, bubbleX + bubbleW - cornerR, bubbleY + bubbleH, cornerR);
    ctx.lineTo(bubbleX + bubbleW / 2 + tailSize, bubbleY + bubbleH);
    // Tail pointing down toward NPC
    ctx.lineTo(bubbleX + bubbleW / 2, bubbleY + bubbleH + tailSize);
    ctx.lineTo(bubbleX + bubbleW / 2 - tailSize, bubbleY + bubbleH);
    ctx.lineTo(bubbleX + cornerR, bubbleY + bubbleH);
    ctx.arcTo(bubbleX, bubbleY + bubbleH, bubbleX, bubbleY + bubbleH - cornerR, cornerR);
    ctx.lineTo(bubbleX, bubbleY + cornerR);
    ctx.arcTo(bubbleX, bubbleY, bubbleX + cornerR, bubbleY, cornerR);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Text inside bubble (dark)
    ctx.fillStyle = '#222';
    ctx.fillText(it.text, tx, ty);
  } else {
    // Player hit text — floating red text with outline
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2.5;
    ctx.strokeText(it.text, tx, ty);
    ctx.fillStyle = '#ff4444';
    ctx.fillText(it.text, tx, ty);
  }

  ctx.restore();
}

function drawDustParticle(d) {
  const dx = d.x - camX;
  const alpha = d.life / 0.35;
  ctx.fillStyle = `rgba(180,160,120,${alpha * 0.6})`;
  ctx.beginPath();
  ctx.arc(dx, d.y, d.size * alpha, 0, 6.28);
  ctx.fill();
}

function drawDeathAnim(da, now) {
  const dx = da.x - camX;
  if (dx < -40 || dx > VW + 40) return;

  const squish = da.squish;
  if (squish <= 0) return;

  ctx.save();
  ctx.globalAlpha = squish;
  ctx.translate(dx, da.y + da.h * (1 - squish));
  ctx.scale(1 + (1 - squish) * 0.8, squish);

  // Draw the squishing character
  const charData = { name: da.name, color: da.color, skin: da.skin, hair: da.hair, cls: da.cls };
  drawCharSprite(ctx, -da.w/2, 0, da.w, da.h, charData, now, {
    facing: 1, bob: 0, isEnemy: true, invTimer: 0, powerUp: null
  });

  // Dizzy stars
  ctx.fillStyle = '#ffdd00';
  const starPhase = now * 0.01;
  for (let i = 0; i < 3; i++) {
    const sx = Math.cos(starPhase + i * 2.09) * 12;
    const sy = Math.sin(starPhase + i * 2.09) * 5 - 8;
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('★', sx, sy);
  }

  ctx.restore();
}

function drawScorePopup(sp) {
  const sx = sp.x - camX;
  const alpha = Math.min(sp.timer / 0.3, 1);

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `bold ${Math.floor(8 * sp.scale)}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,.7)';
  ctx.fillText(sp.text, sx + 1, sp.y + 1);

  // Main text
  ctx.fillStyle = sp.color;
  ctx.fillText(sp.text, sx, sp.y);

  ctx.restore();
}

function drawStompCombo(now) {
  if (stompCombo < 2 || stompComboTimer <= 0) return;
  const alpha = Math.min(stompComboTimer, 1);
  const pulse = (Math.sin(now * 0.015) + 1) / 2;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `bold ${12 + Math.floor(pulse * 3)}px monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';

  // Background
  const text = `COMBO x${stompCombo}`;
  const tw = ctx.measureText(text).width;
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(VW - tw - 14, 8, tw + 10, 20);

  // Text
  ctx.fillStyle = stompCombo >= 4 ? '#ff3333' : stompCombo >= 3 ? '#ff8800' : '#ffdd00';
  ctx.fillText(text, VW - 8, 11);

  ctx.restore();
}

function drawMsg(now){
  if(!msgText||msgExpiry<now) return;
  ctx.font='bold 7px monospace';
  const lines=msgText.split('\n');
  const lh=12, pad=9;
  const mw=Math.max(...lines.map(l=>ctx.measureText(l).width))+pad*2;
  const mh=lines.length*lh+pad*1.5;
  const bx=VW/2-mw/2, by=VH-mh-8;
  ctx.fillStyle='rgba(0,0,0,.88)';
  ctx.fillRect(bx,by,mw,mh);
  ctx.strokeStyle='#f5c84266';
  ctx.lineWidth=1;
  ctx.strokeRect(bx,by,mw,mh);
  ctx.fillStyle='#f5c842';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  lines.forEach((l,i)=>ctx.fillText(l,VW/2,by+pad+i*lh+lh/2));
}

function showMsg(t,ms){
  msgText=t;
  msgExpiry=performance.now()+ms;
}

// ═══════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════
function draw(now){
  ctx.clearRect(0,0,VW,VH);

  // Apply screen shake
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  drawBG(now);
  PLATFORMS.forEach(p=>drawPlatform(p));
  coins.forEach(c=>drawCoin(c,now));
  PALM_TREES.forEach(pt => drawPalmTree(pt, now));
  dustParticles.forEach(d => drawDustParticle(d));
  sparkles.forEach(s => drawSparkle(s));
  drawFlag(now);
  deathAnims.forEach(da => drawDeathAnim(da, now));
  enemies.forEach(e=>drawEnemy(e,now));
  projectiles.forEach(proj => drawProjectile(proj, now));
  drawPlayer(now);
  scorePopups.forEach(sp => drawScorePopup(sp));
  insultTexts.forEach(it => drawInsultText(it, now));
  drawMsg(now);

  ctx.restore(); // end screen shake

  // HUD elements drawn outside screen shake
  drawStompCombo(now);

  const prog=Math.min((player.x+player.w)/LEVEL_W,1);
  ctx.fillStyle='rgba(0,0,0,.5)';
  ctx.fillRect(0,0,VW,3);
  ctx.fillStyle='#f5c842';
  ctx.fillRect(0,0,VW*prog,3);
}

// ═══════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════
function loop(now){
  if (paused) { requestAnimationFrame(loop); return; }
  const dt=Math.min((now-lastT)/1000,.05);
  lastT=now;
  update(dt,now);
  draw(now);
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════
//  PAUSE FUNCTIONS
// ═══════════════════════════════════════════════════
function togglePause() {
  if (document.getElementById('win').style.display === 'flex') return;
  if (document.getElementById('gameover').style.display === 'flex') return;
  paused = !paused;
  document.getElementById('pause').style.display = paused ? 'flex' : 'none';
  if (!paused) { lastT = performance.now(); }
}

function resumeGame() {
  paused = false;
  document.getElementById('pause').style.display = 'none';
  lastT = performance.now();
}

function fadeTransition(callback) {
  const el = document.getElementById('transition');
  el.style.opacity = '1';
  setTimeout(() => {
    callback();
    el.style.opacity = '0';
  }, 400);
}

// ═══════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{keys[e.key]=true; if(e.key===' ')e.preventDefault(); if(e.key==='Escape')togglePause();});
document.addEventListener('keyup',  e=>{keys[e.key]=false;});

function setupControls(){
  [['btn-left','left'],['btn-right','right']].forEach(([id,dir])=>{
    const el=document.getElementById(id);
    const on =e=>{e.preventDefault();mctrl[dir]=true; el.classList.add('on');};
    const off=e=>{e.preventDefault();mctrl[dir]=false;el.classList.remove('on');};
    el.addEventListener('touchstart',on,{passive:false});
    el.addEventListener('touchend',off,{passive:false});
    el.addEventListener('touchcancel',off,{passive:false});
    el.addEventListener('mousedown',on);
    el.addEventListener('mouseup',off);
    el.addEventListener('mouseleave',off);
  });
  const jb=document.getElementById('btn-jump');
  const jon =e=>{e.preventDefault();mctrl.jump=true; jb.classList.add('on');};
  const joff=e=>{e.preventDefault();mctrl.jump=false;jb.classList.remove('on');};
  jb.addEventListener('touchstart',jon,{passive:false});
  jb.addEventListener('touchend',joff,{passive:false});
  jb.addEventListener('touchcancel',joff,{passive:false});
  jb.addEventListener('mousedown',jon);
  jb.addEventListener('mouseup',joff);
  jb.addEventListener('mouseleave',joff);
}

function drawCharacterPreview(canvas, family) {
  const ctx = canvas.getContext('2d');
  canvas.width = 32;
  canvas.height = 44;
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, 0, 32, 44);

  const pw = 22, ph = 30;
  const x = 32/2 - pw/2;
  const y = 44/2 - ph/2;

  const charData = {
    name: family.name,
    color: family.color,
    skin: family.skin,
    hair: family.hair,
    cls: family.cls
  };

  drawCharSprite(ctx, x, y, pw, ph, charData, 0, {
    facing: 1,
    bob: 0,
    isEnemy: false,
    invTimer: 0,
    powerUp: null
  });
}

function goToCharSelect() {
  fadeTransition(() => {
    document.getElementById('title').style.display = 'none';
    document.getElementById('charselect').style.display = 'flex';
    buildCharSelect();
  });
}

function buildCharSelect() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';

  FAMILY.forEach((fam, idx) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.id = 'card-' + fam.name;

    const canvas = document.createElement('canvas');
    canvas.className = 'char-canvas';
    drawCharacterPreview(canvas, fam);

    const name = document.createElement('div');
    name.className = 'char-name';
    name.textContent = fam.name;

    card.appendChild(canvas);
    card.appendChild(name);

    card.addEventListener('click', () => {
      document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedChar = fam;
    });

    grid.appendChild(card);
  });

  selectedChar = FAMILY[0];
  document.getElementById('card-' + FAMILY[0].name).classList.add('selected');
}

// ═══════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════
function startGame(){
  if (!selectedChar) {
    alert('Please select a character!');
    return;
  }

  fadeTransition(() => {
    document.getElementById('charselect').style.display='none';
    document.getElementById('hud').style.display='flex';
    document.getElementById('game-wrap').style.display='flex';
    document.getElementById('controls').style.display='flex';
    resizeCanvas();
    initState();
    lastT=performance.now();
    showMsg('Jump on enemies to stomp them!\nCollect coins! Grab palm trees for power!',4500);
    bgMusic();
    requestAnimationFrame(loop);
  });
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
(function boot(){
  const bar=document.getElementById('lb');
  let p=0;
  const iv=setInterval(()=>{
    p+=Math.random()*18+8;
    bar.style.width=Math.min(p,95)+'%';
    if(p>=95){
      clearInterval(iv);
      bar.style.width='100%';
      setTimeout(()=>{
        document.getElementById('loading').style.display='none';
        document.getElementById('title').style.display='flex';
        setupControls();
      },300);
    }
  },100);
})();
</script>
