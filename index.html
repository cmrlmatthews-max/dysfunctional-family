//  INPUT
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{keys[e.key]=true; if(e.key===' ')e.preventDefault(); if(e.key==='Escape')togglePause();});
document.addEventListener('keyup',  e=>{keys[e.key]=false;});

function setupControls(){
  [['btn-left','left'],['btn-right','right']].forEach(([id,dir])=>{
    const el=document.getElementById(id);
    const on =e=>{e.preventDefault();mctrl[dir]=true; el.classList.add('on');};
    const off=e=>{e.preventDefault();mctrl[dir]=false;el.classList.remove('on');};
    el.addEventListener('touchstart',on,{passive:false});
    el.addEventListener('touchend',off,{passive:false});
    el.addEventListener('touchcancel',off,{passive:false});
    el.addEventListener('mousedown',on);
    el.addEventListener('mouseup',off);
    el.addEventListener('mouseleave',off);
  });
  const jb=document.getElementById('btn-jump');
  const jon =e=>{e.preventDefault();mctrl.jump=true; jb.classList.add('on');};
  const joff=e=>{e.preventDefault();mctrl.jump=false;jb.classList.remove('on');};
  jb.addEventListener('touchstart',jon,{passive:false});
  jb.addEventListener('touchend',joff,{passive:false});
  jb.addEventListener('touchcancel',joff,{passive:false});
  jb.addEventListener('mousedown',jon);
  jb.addEventListener('mouseup',joff);
  jb.addEventListener('mouseleave',joff);
}

function drawCharacterPreview(canvas, family) {
  const ctx = canvas.getContext('2d');
  canvas.width = 32;
  canvas.height = 44;
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, 0, 32, 44);

  const pw = 22, ph = 30;
  const x = 32/2 - pw/2;
  const y = 44/2 - ph/2;

  const charData = {
    name: family.name,
    color: family.color,
    skin: family.skin,
    hair: family.hair,
    cls: family.cls
  };

  drawCharSprite(ctx, x, y, pw, ph, charData, 0, {
    facing: 1,
    bob: 0,
    isEnemy: false,
    invTimer: 0,
    powerUp: null
  });
}

// ═══════════════════════════════════════════════════
//  ANIMATED TITLE SCREEN
// ═══════════════════════════════════════════════════
let titleCanvas, titleCtx, charSelectCanvas, charSelectCtx;
let titleAnimId = null;
let charSelectAnimId = null;
let menuStars = [];
let menuParticles = [];
let floatingChars = [];
let titlePulse = 0;
let playBtnHover = false;

const TITLE_W = 640, TITLE_H = 360;

function initTitleScreen() {
  titleCanvas = document.getElementById('title-canvas');
  titleCtx = titleCanvas.getContext('2d');
  titleCanvas.width = TITLE_W;
  titleCanvas.height = TITLE_H;

  // Create deep starfield (3 layers for parallax)
  menuStars = [];
  for (let i = 0; i < 200; i++) {
    menuStars.push({
      x: Math.random() * TITLE_W,
      y: Math.random() * TITLE_H,
      r: Math.random() * 1.8 + 0.3,
      speed: Math.random() * 0.3 + 0.05,
      twinkle: Math.random() * 6.28,
      layer: Math.floor(Math.random() * 3),
      bright: Math.random() < 0.1,
    });
  }

  // Floating family characters that drift across the screen
  floatingChars = FAMILY.map((f, i) => ({
    x: Math.random() * TITLE_W,
    y: TITLE_H * 0.55 + Math.random() * TITLE_H * 0.3,
    vx: (Math.random() - 0.5) * 20 + (i % 2 === 0 ? 8 : -8),
    bobPhase: Math.random() * 6.28,
    scale: 1.2 + Math.random() * 0.5,
    data: f,
    facing: i % 2 === 0 ? 1 : -1,
    alpha: 0.4 + Math.random() * 0.3,
  }));

  // Setup click handler for title canvas
  titleCanvas.addEventListener('click', handleTitleClick);
  titleCanvas.addEventListener('mousemove', handleTitleMouseMove);

  titleAnimId = requestAnimationFrame(titleLoop);
}

function getPlayButtonRect() {
  const bw = 160, bh = 36;
  const bx = TITLE_W / 2 - bw / 2;
  const by = TITLE_H * 0.72;
  return { x: bx, y: by, w: bw, h: bh };
}

function handleTitleMouseMove(e) {
  const rect = titleCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const btn = getPlayButtonRect();
  playBtnHover = mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;
  titleCanvas.style.cursor = playBtnHover ? 'pointer' : 'default';
}

function handleTitleClick(e) {
  const rect = titleCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const btn = getPlayButtonRect();
  if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
    goToCharSelect();
  }
}

function titleLoop(now) {
  titlePulse = now;
  const tc = titleCtx;

  // === BACKGROUND: Deep space gradient ===
  const bg = tc.createLinearGradient(0, 0, 0, TITLE_H);
  bg.addColorStop(0, '#050510');
  bg.addColorStop(0.4, '#0a0a2a');
  bg.addColorStop(0.7, '#0f0f35');
  bg.addColorStop(1, '#1a0a2a');
  tc.fillStyle = bg;
  tc.fillRect(0, 0, TITLE_W, TITLE_H);

  // === NEBULA GLOW (soft color blobs) ===
  const nebulaPhase = now * 0.0003;
  [{x:0.25, y:0.35, c:'80,40,120', r:120}, {x:0.7, y:0.25, c:'40,60,140', r:100}, {x:0.5, y:0.7, c:'120,60,30', r:90}].forEach(n => {
    const nx = TITLE_W * n.x + Math.sin(nebulaPhase + n.x * 5) * 30;
    const ny = TITLE_H * n.y + Math.cos(nebulaPhase * 0.7 + n.y * 3) * 20;
    const pulse = (Math.sin(now * 0.001 + n.x * 10) + 1) / 2;
    const grad = tc.createRadialGradient(nx, ny, 0, nx, ny, n.r + pulse * 30);
    grad.addColorStop(0, `rgba(${n.c},${0.06 + pulse * 0.04})`);
    grad.addColorStop(1, `rgba(${n.c},0)`);
    tc.fillStyle = grad;
    tc.fillRect(0, 0, TITLE_W, TITLE_H);
  });

  // === PARALLAX STARFIELD ===
  menuStars.forEach(s => {
    const layerSpeed = [0.3, 0.7, 1.2][s.layer];
    const layerSize = [0.6, 1.0, 1.5][s.layer];
    s.x -= s.speed * layerSpeed;
    if (s.x < -5) s.x = TITLE_W + 5;

    const tw = (Math.sin(now * 0.003 + s.twinkle) + 1) / 2;
    const alpha = 0.2 + tw * 0.6;
    const sz = s.r * layerSize;

    if (s.bright) {
      tc.fillStyle = `rgba(255,255,240,${alpha})`;
      tc.fillRect(s.x - sz * 2, s.y, sz * 4, 1);
      tc.fillRect(s.x, s.y - sz * 2, 1, sz * 4);
      tc.fillStyle = `rgba(255,255,200,${alpha * 0.5})`;
      tc.beginPath(); tc.arc(s.x, s.y, sz * 1.5, 0, 6.28); tc.fill();
    } else {
      tc.fillStyle = `rgba(255,255,240,${alpha})`;
      tc.beginPath(); tc.arc(s.x, s.y, sz, 0, 6.28); tc.fill();
    }
  });

  // === SHOOTING STARS (occasional) ===
  if (Math.random() < 0.003) {
    menuParticles.push({
      x: Math.random() * TITLE_W * 0.8 + TITLE_W * 0.1,
      y: Math.random() * TITLE_H * 0.4,
      vx: -200 - Math.random() * 150,
      vy: 80 + Math.random() * 60,
      life: 0.5 + Math.random() * 0.3,
      maxLife: 0.8,
      type: 'shooting',
    });
  }

  // === AMBIENT FLOATING PARTICLES ===
  if (Math.random() < 0.08) {
    const colors = ['255,200,50', '200,150,255', '100,200,255', '255,100,100'];
    menuParticles.push({
      x: Math.random() * TITLE_W,
      y: TITLE_H + 5,
      vx: (Math.random() - 0.5) * 15,
      vy: -20 - Math.random() * 30,
      life: 2 + Math.random() * 2,
      maxLife: 4,
      type: 'float',
      color: colors[Math.floor(Math.random() * colors.length)],
      size: Math.random() * 2 + 1,
    });
  }

  // Update & draw particles
  menuParticles = menuParticles.filter(p => {
    p.x += p.vx * 0.016;
    p.y += p.vy * 0.016;
    p.life -= 0.016;
    if (p.life <= 0) return false;

    const alpha = Math.min(p.life / (p.maxLife * 0.3), 1);
    if (p.type === 'shooting') {
      tc.strokeStyle = `rgba(255,255,200,${alpha * 0.8})`;
      tc.lineWidth = 1.5;
      tc.beginPath();
      tc.moveTo(p.x, p.y);
      tc.lineTo(p.x - p.vx * 0.04, p.y - p.vy * 0.04);
      tc.stroke();
      tc.fillStyle = `rgba(255,255,255,${alpha})`;
      tc.beginPath(); tc.arc(p.x, p.y, 1.5, 0, 6.28); tc.fill();
    } else {
      const wobble = Math.sin(now * 0.005 + p.x * 0.1) * 5;
      tc.fillStyle = `rgba(${p.color},${alpha * 0.5})`;
      tc.beginPath(); tc.arc(p.x + wobble, p.y, p.size * 2, 0, 6.28); tc.fill();
      tc.fillStyle = `rgba(${p.color},${alpha * 0.8})`;
      tc.beginPath(); tc.arc(p.x + wobble, p.y, p.size, 0, 6.28); tc.fill();
    }
    return true;
  });

  // === FLOATING FAMILY CHARACTERS ===
  floatingChars.forEach(fc => {
    fc.x += fc.vx * 0.016;
    fc.bobPhase += 0.02;
    if (fc.x > TITLE_W + 40) { fc.x = -30; fc.y = TITLE_H * 0.55 + Math.random() * TITLE_H * 0.3; }
    if (fc.x < -40) { fc.x = TITLE_W + 30; fc.y = TITLE_H * 0.55 + Math.random() * TITLE_H * 0.3; }

    const bob = Math.sin(fc.bobPhase) * 4;
    const pw = 22 * fc.scale;
    const ph = 30 * fc.scale;

    tc.save();
    tc.globalAlpha = fc.alpha;

    const glow = tc.createRadialGradient(fc.x, fc.y + ph/2 + bob, 0, fc.x, fc.y + ph/2 + bob, pw * 1.5);
    glow.addColorStop(0, `rgba(245,200,66,0.12)`);
    glow.addColorStop(1, `rgba(245,200,66,0)`);
    tc.fillStyle = glow;
    tc.beginPath(); tc.arc(fc.x, fc.y + ph/2 + bob, pw * 1.5, 0, 6.28); tc.fill();

    tc.save();
    tc.translate(fc.x - pw/2, fc.y + bob);
    tc.scale(fc.scale, fc.scale);
    tc.translate(-(fc.x - pw/2), -(fc.y + bob));
    drawCharSprite(tc, fc.x - pw/2, fc.y + bob, 22, 30, fc.data, now, {
      facing: fc.facing, bob: 0, isEnemy: false, invTimer: 0, powerUp: null
    });
    tc.restore();

    tc.font = 'bold 8px monospace';
    tc.textAlign = 'center';
    tc.fillStyle = `rgba(245,200,66,${fc.alpha})`;
    tc.fillText(fc.data.name, fc.x, fc.y + ph + bob + 12);

    tc.restore();
  });

  // === GROUND SILHOUETTE ===
  tc.fillStyle = '#0a0a12';
  tc.beginPath();
  tc.moveTo(0, TITLE_H);
  for (let gx = 0; gx <= TITLE_W; gx += 8) {
    const gh = Math.sin(gx * 0.02) * 8 + Math.sin(gx * 0.05 + 1) * 4 + 15;
    tc.lineTo(gx, TITLE_H - gh);
  }
  tc.lineTo(TITLE_W, TITLE_H);
  tc.closePath();
  tc.fill();

  // === TITLE TEXT: "DYSFUNCTIONAL FAMILY" ===
  const titleY = TITLE_H * 0.2;
  const pulse = (Math.sin(now * 0.003) + 1) / 2;
  const bigPulse = (Math.sin(now * 0.001) + 1) / 2;

  const titleGlow = tc.createRadialGradient(TITLE_W/2, titleY + 20, 10, TITLE_W/2, titleY + 20, 200);
  titleGlow.addColorStop(0, `rgba(245,200,66,${0.08 + bigPulse * 0.06})`);
  titleGlow.addColorStop(1, 'rgba(245,200,66,0)');
  tc.fillStyle = titleGlow;
  tc.fillRect(0, 0, TITLE_W, TITLE_H * 0.5);

  tc.textAlign = 'center';
  tc.textBaseline = 'middle';
  tc.font = 'bold 42px monospace';
  tc.fillStyle = '#2a1a00';
  tc.fillText('DYSFUNCTIONAL', TITLE_W/2 + 3, titleY + 3);
  tc.fillStyle = '#5a3a00';
  tc.fillText('DYSFUNCTIONAL', TITLE_W/2 + 2, titleY + 2);
  const grad1 = tc.createLinearGradient(0, titleY - 20, 0, titleY + 20);
  grad1.addColorStop(0, '#ffe066');
  grad1.addColorStop(0.5, '#f5c842');
  grad1.addColorStop(1, '#cc9900');
  tc.fillStyle = grad1;
  tc.fillText('DYSFUNCTIONAL', TITLE_W/2, titleY);
  tc.fillStyle = `rgba(255,255,200,${0.15 + pulse * 0.1})`;
  tc.fillText('DYSFUNCTIONAL', TITLE_W/2, titleY - 1);

  const famY = titleY + 50;
  tc.font = 'bold 52px monospace';
  tc.fillStyle = '#2a1a00';
  tc.fillText('FAMILY', TITLE_W/2 + 3, famY + 3);
  tc.fillStyle = '#5a3a00';
  tc.fillText('FAMILY', TITLE_W/2 + 2, famY + 2);
  const grad2 = tc.createLinearGradient(0, famY - 25, 0, famY + 25);
  grad2.addColorStop(0, '#ffe066');
  grad2.addColorStop(0.5, '#f5c842');
  grad2.addColorStop(1, '#cc9900');
  tc.fillStyle = grad2;
  tc.fillText('FAMILY', TITLE_W/2, famY);
  tc.fillStyle = `rgba(255,255,200,${0.15 + pulse * 0.1})`;
  tc.fillText('FAMILY', TITLE_W/2, famY - 1);

  const lineY = famY + 30;
  const lineW = 200 + pulse * 30;
  const lineGrad = tc.createLinearGradient(TITLE_W/2 - lineW/2, 0, TITLE_W/2 + lineW/2, 0);
  lineGrad.addColorStop(0, 'rgba(245,200,66,0)');
  lineGrad.addColorStop(0.3, 'rgba(245,200,66,0.6)');
  lineGrad.addColorStop(0.5, 'rgba(245,200,66,0.9)');
  lineGrad.addColorStop(0.7, 'rgba(245,200,66,0.6)');
  lineGrad.addColorStop(1, 'rgba(245,200,66,0)');
  tc.fillStyle = lineGrad;
  tc.fillRect(TITLE_W/2 - lineW/2, lineY, lineW, 2);

  tc.font = '10px monospace';
  tc.fillStyle = `rgba(200,200,200,${0.5 + pulse * 0.3})`;
  tc.fillText('A side-scrolling adventure! Stomp enemies! Collect coins!', TITLE_W/2, lineY + 18);

  // === PLAY BUTTON ===
  const btn = getPlayButtonRect();
  const btnPulse = (Math.sin(now * 0.005) + 1) / 2;
  const btnScale = playBtnHover ? 1.08 : 1.0;

  tc.save();
  tc.translate(btn.x + btn.w/2, btn.y + btn.h/2);
  tc.scale(btnScale, btnScale);
  tc.translate(-(btn.x + btn.w/2), -(btn.y + btn.h/2));

  const btnGlow = tc.createRadialGradient(btn.x + btn.w/2, btn.y + btn.h/2, 10, btn.x + btn.w/2, btn.y + btn.h/2, 80);
  btnGlow.addColorStop(0, `rgba(245,200,66,${playBtnHover ? 0.25 : 0.1 + btnPulse * 0.08})`);
  btnGlow.addColorStop(1, 'rgba(245,200,66,0)');
  tc.fillStyle = btnGlow;
  tc.beginPath(); tc.arc(btn.x + btn.w/2, btn.y + btn.h/2, 80, 0, 6.28); tc.fill();

  tc.fillStyle = '#4a2a00';
  tc.fillRect(btn.x + 3, btn.y + 3, btn.w, btn.h);

  const btnGrad = tc.createLinearGradient(0, btn.y, 0, btn.y + btn.h);
  btnGrad.addColorStop(0, playBtnHover ? '#ffe866' : '#f5c842');
  btnGrad.addColorStop(1, playBtnHover ? '#f5d042' : '#cc9900');
  tc.fillStyle = btnGrad;
  tc.fillRect(btn.x, btn.y, btn.w, btn.h);

  tc.fillStyle = 'rgba(255,255,255,0.2)';
  tc.fillRect(btn.x, btn.y, btn.w, btn.h / 3);

  tc.strokeStyle = '#7a4a00';
  tc.lineWidth = 2;
  tc.strokeRect(btn.x, btn.y, btn.w, btn.h);

  tc.font = 'bold 16px monospace';
  tc.textAlign = 'center';
  tc.textBaseline = 'middle';
  tc.fillStyle = '#1a0a00';
  tc.fillText('P L A Y', btn.x + btn.w/2, btn.y + btn.h/2 + 1);

  tc.restore();

  // === VERSION/CREDIT ===
  tc.font = '8px monospace';
  tc.textAlign = 'center';
  tc.fillStyle = 'rgba(150,150,150,0.4)';
  tc.fillText('v1.0 // ARROW KEYS + SPACE', TITLE_W/2, TITLE_H - 12);

  titleAnimId = requestAnimationFrame(titleLoop);
}

function stopTitleLoop() {
  if (titleAnimId) { cancelAnimationFrame(titleAnimId); titleAnimId = null; }
  if (titleCanvas) {
    titleCanvas.removeEventListener('click', handleTitleClick);
    titleCanvas.removeEventListener('mousemove', handleTitleMouseMove);
  }
}

// ═══════════════════════════════════════════════════
//  ANIMATED CHARACTER SELECT SCREEN
// ═══════════════════════════════════════════════════
let csSelectedIdx = 0;
let csHoverIdx = -1;
let csSparkles = [];
let csAnimId = null;

function initCharSelectScreen() {
  charSelectCanvas = document.getElementById('charselect-canvas');
  charSelectCtx = charSelectCanvas.getContext('2d');
  charSelectCanvas.width = TITLE_W;
  charSelectCanvas.height = TITLE_H;

  csSelectedIdx = 0;
  selectedChar = FAMILY[0];
  csSparkles = [];

  charSelectCanvas.addEventListener('click', handleCharSelectClick);
  charSelectCanvas.addEventListener('mousemove', handleCharSelectMouseMove);

  csAnimId = requestAnimationFrame(charSelectLoop);
}

function getCharCardRects() {
  const cards = [];
  const cols = 4, rows = 2;
  const cardW = 70, cardH = 70;
  const gapX = 16, gapY = 12;
  const totalW = cols * cardW + (cols - 1) * gapX;
  const totalH = rows * cardH + (rows - 1) * gapY;
  const startX = TITLE_W / 2 - totalW / 2;
  const startY = TITLE_H * 0.22;

  for (let i = 0; i < FAMILY.length; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    cards.push({
      x: startX + col * (cardW + gapX),
      y: startY + row * (cardH + gapY),
      w: cardW,
      h: cardH,
    });
  }
  return cards;
}

function getGoButtonRect() {
  const bw = 180, bh = 38;
  return { x: TITLE_W / 2 - bw / 2, y: TITLE_H * 0.78, w: bw, h: bh };
}

let csGoBtnHover = false;

function handleCharSelectMouseMove(e) {
  const rect = charSelectCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const cards = getCharCardRects();
  csHoverIdx = -1;
  for (let i = 0; i < cards.length; i++) {
    const c = cards[i];
    if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
      csHoverIdx = i;
      break;
    }
  }

  const goBtn = getGoButtonRect();
  csGoBtnHover = mx >= goBtn.x && mx <= goBtn.x + goBtn.w && my >= goBtn.y && my <= goBtn.y + goBtn.h;

  charSelectCanvas.style.cursor = (csHoverIdx >= 0 || csGoBtnHover) ? 'pointer' : 'default';
}

function handleCharSelectClick(e) {
  const rect = charSelectCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const cards = getCharCardRects();
  for (let i = 0; i < cards.length; i++) {
    const c = cards[i];
    if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
      csSelectedIdx = i;
      selectedChar = FAMILY[i];
      for (let j = 0; j < 20; j++) {
        const angle = Math.random() * 6.28;
        const speed = Math.random() * 80 + 30;
        csSparkles.push({
          x: c.x + c.w/2, y: c.y + c.h/2,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 0.5 + Math.random() * 0.3,
          color: FAMILY[i].color,
        });
      }
      return;
    }
  }

  const goBtn = getGoButtonRect();
  if (mx >= goBtn.x && mx <= goBtn.x + goBtn.w && my >= goBtn.y && my <= goBtn.y + goBtn.h) {
    startGame();
  }
}

function charSelectLoop(now) {
  const cc = charSelectCtx;

  const bg = cc.createLinearGradient(0, 0, 0, TITLE_H);
  bg.addColorStop(0, '#050515');
  bg.addColorStop(0.5, '#0a0a2e');
  bg.addColorStop(1, '#150a25');
  cc.fillStyle = bg;
  cc.fillRect(0, 0, TITLE_W, TITLE_H);

  menuStars.forEach(s => {
    const tw = (Math.sin(now * 0.003 + s.twinkle) + 1) / 2;
    cc.fillStyle = `rgba(255,255,240,${0.15 + tw * 0.3})`;
    cc.beginPath(); cc.arc(s.x, s.y, s.r * 0.7, 0, 6.28); cc.fill();
  });

  // === TITLE ===
  cc.textAlign = 'center';
  cc.textBaseline = 'middle';
  cc.font = 'bold 26px monospace';
  const headerPulse = (Math.sin(now * 0.003) + 1) / 2;
  cc.fillStyle = '#3a2000';
  cc.fillText('SELECT YOUR FIGHTER', TITLE_W/2 + 2, TITLE_H * 0.08 + 2);
  const hGrad = cc.createLinearGradient(0, TITLE_H * 0.05, 0, TITLE_H * 0.11);
  hGrad.addColorStop(0, '#ffe066');
  hGrad.addColorStop(1, '#cc9900');
  cc.fillStyle = hGrad;
  cc.fillText('SELECT YOUR FIGHTER', TITLE_W/2, TITLE_H * 0.08);
  cc.fillStyle = `rgba(255,255,200,${0.1 + headerPulse * 0.15})`;
  cc.fillText('SELECT YOUR FIGHTER', TITLE_W/2, TITLE_H * 0.08 - 1);

  const lw = 250 + headerPulse * 20;
  const lg = cc.createLinearGradient(TITLE_W/2 - lw/2, 0, TITLE_W/2 + lw/2, 0);
  lg.addColorStop(0, 'rgba(245,200,66,0)');
  lg.addColorStop(0.5, 'rgba(245,200,66,0.5)');
  lg.addColorStop(1, 'rgba(245,200,66,0)');
  cc.fillStyle = lg;
  cc.fillRect(TITLE_W/2 - lw/2, TITLE_H * 0.13, lw, 1.5);

  // === CHARACTER CARDS ===
  const cards = getCharCardRects();
  cards.forEach((card, i) => {
    const fam = FAMILY[i];
    const isSelected = i === csSelectedIdx;
    const isHover = i === csHoverIdx;

    if (isSelected) {
      const selGlow = cc.createRadialGradient(card.x + card.w/2, card.y + card.h/2, 5, card.x + card.w/2, card.y + card.h/2, card.w);
      selGlow.addColorStop(0, `rgba(255,220,0,0.15)`);
      selGlow.addColorStop(1, `rgba(255,220,0,0)`);
      cc.fillStyle = selGlow;
      cc.beginPath(); cc.arc(card.x + card.w/2, card.y + card.h/2, card.w, 0, 6.28); cc.fill();
    }

    cc.fillStyle = isSelected ? 'rgba(255,220,0,0.15)' : isHover ? 'rgba(100,100,150,0.25)' : 'rgba(40,40,60,0.5)';
    cc.fillRect(card.x, card.y, card.w, card.h);

    cc.strokeStyle = isSelected ? '#ffdd00' : isHover ? '#8888cc' : '#444466';
    cc.lineWidth = isSelected ? 3 : 1.5;
    cc.strokeRect(card.x, card.y, card.w, card.h);

    if (isSelected) {
      const blink = (Math.sin(now * 0.008) + 1) / 2;
      cc.strokeStyle = `rgba(255,220,0,${0.6 + blink * 0.4})`;
      cc.lineWidth = 2;
      const cs = 8;
      cc.beginPath(); cc.moveTo(card.x-2, card.y+cs); cc.lineTo(card.x-2, card.y-2); cc.lineTo(card.x+cs, card.y-2); cc.stroke();
      cc.beginPath(); cc.moveTo(card.x+card.w-cs, card.y-2); cc.lineTo(card.x+card.w+2, card.y-2); cc.lineTo(card.x+card.w+2, card.y+cs); cc.stroke();
      cc.beginPath(); cc.moveTo(card.x-2, card.y+card.h-cs); cc.lineTo(card.x-2, card.y+card.h+2); cc.lineTo(card.x+cs, card.y+card.h+2); cc.stroke();
      cc.beginPath(); cc.moveTo(card.x+card.w-cs, card.y+card.h+2); cc.lineTo(card.x+card.w+2, card.y+card.h+2); cc.lineTo(card.x+card.w+2, card.y+card.h-cs); cc.stroke();
    }

    const sprW = 22, sprH = 30;
    const sprX = card.x + card.w/2 - sprW/2;
    const sprY = card.y + 8;
    const bob = Math.sin(now * 0.003 + i * 1.2) * 1.5;

    drawCharSprite(cc, sprX, sprY + bob, sprW, sprH, fam, now, {
      facing: 1, bob: 0, isEnemy: false, invTimer: 0, powerUp: null
    });

    cc.font = 'bold 8px monospace';
    cc.textAlign = 'center';
    cc.textBaseline = 'top';
    cc.fillStyle = isSelected ? '#ffdd00' : '#aaaacc';
    cc.fillText(fam.name, card.x + card.w/2, card.y + card.h - 16);

    cc.font = '6px monospace';
    cc.fillStyle = isSelected ? 'rgba(255,220,0,0.6)' : 'rgba(150,150,180,0.5)';
    cc.fillText(fam.cls.toUpperCase(), card.x + card.w/2, card.y + card.h - 6);
  });

  csSparkles = csSparkles.filter(s => {
    s.x += s.vx * 0.016;
    s.y += s.vy * 0.016;
    s.vy += 120 * 0.016;
    s.life -= 0.016;
    if (s.life <= 0) return false;
    const alpha = s.life * 2;
    cc.fillStyle = s.color;
    cc.globalAlpha = Math.min(alpha, 1);
    cc.beginPath(); cc.arc(s.x, s.y, 2, 0, 6.28); cc.fill();
    cc.fillStyle = '#fff';
    cc.globalAlpha = Math.min(alpha, 1) * 0.5;
    cc.beginPath(); cc.arc(s.x, s.y, 0.8, 0, 6.28); cc.fill();
    cc.globalAlpha = 1;
    return true;
  });

  // === GO BUTTON ===
  const goBtn = getGoButtonRect();
  const goPulse = (Math.sin(now * 0.005) + 1) / 2;
  const goScale = csGoBtnHover ? 1.06 : 1.0;

  cc.save();
  cc.translate(goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2);
  cc.scale(goScale, goScale);
  cc.translate(-(goBtn.x + goBtn.w/2), -(goBtn.y + goBtn.h/2));

  const goGlow = cc.createRadialGradient(goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2, 10, goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2, 100);
  goGlow.addColorStop(0, `rgba(245,200,66,${csGoBtnHover ? 0.2 : 0.06 + goPulse * 0.06})`);
  goGlow.addColorStop(1, 'rgba(245,200,66,0)');
  cc.fillStyle = goGlow;
  cc.beginPath(); cc.arc(goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2, 100, 0, 6.28); cc.fill();

  cc.fillStyle = '#4a2a00';
  cc.fillRect(goBtn.x + 3, goBtn.y + 3, goBtn.w, goBtn.h);

  const goBtnGrad = cc.createLinearGradient(0, goBtn.y, 0, goBtn.y + goBtn.h);
  goBtnGrad.addColorStop(0, csGoBtnHover ? '#ffe866' : '#f5c842');
  goBtnGrad.addColorStop(1, csGoBtnHover ? '#f5d042' : '#cc9900');
  cc.fillStyle = goBtnGrad;
  cc.fillRect(goBtn.x, goBtn.y, goBtn.w, goBtn.h);

  cc.fillStyle = 'rgba(255,255,255,0.2)';
  cc.fillRect(goBtn.x, goBtn.y, goBtn.w, goBtn.h / 3);

  cc.strokeStyle = '#7a4a00';
  cc.lineWidth = 2;
  cc.strokeRect(goBtn.x, goBtn.y, goBtn.w, goBtn.h);

  cc.font = 'bold 16px monospace';
  cc.textAlign = 'center';
  cc.textBaseline = 'middle';
  cc.fillStyle = '#1a0a00';
  cc.fillText("L E T ' S   G O !", goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2 + 1);

  cc.restore();

  cc.font = '7px monospace';
  cc.textAlign = 'center';
  cc.fillStyle = 'rgba(150,150,150,0.35)';
  cc.fillText('CLICK A CHARACTER TO SELECT // THEN HIT GO', TITLE_W/2, TITLE_H - 10);

  csAnimId = requestAnimationFrame(charSelectLoop);
}

function stopCharSelectLoop() {
  if (csAnimId) { cancelAnimationFrame(csAnimId); csAnimId = null; }
  if (charSelectCanvas) {
    charSelectCanvas.removeEventListener('click', handleCharSelectClick);
    charSelectCanvas.removeEventListener('mousemove', handleCharSelectMouseMove);
  }
}

function goToCharSelect() {
  fadeTransition(() => {
    stopTitleLoop();
    document.getElementById('title').style.display = 'none';
    document.getElementById('charselect').style.display = 'flex';
    initCharSelectScreen();
  });
}

// ═══════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════
function startGame(){
  if (!selectedChar) {
    alert('Please select a character!');
    return;
  }

  fadeTransition(() => {
    stopCharSelectLoop();
    document.getElementById('charselect').style.display='none';
    document.getElementById('hud').style.display='flex';
    document.getElementById('game-wrap').style.display='flex';
    document.getElementById('controls').style.display='flex';
    resizeCanvas();
    initState();
    lastT=performance.now();
    showMsg('Jump on enemies to stomp them!\nCollect coins! Grab palm trees for power!',4500);
    bgMusic();
    requestAnimationFrame(loop);
  });
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
(function boot(){
  const bar=document.getElementById('lb');
  let p=0;
  const iv=setInterval(()=>{
    p+=Math.random()*18+8;
    bar.style.width=Math.min(p,95)+'%';
    if(p>=95){
      clearInterval(iv);
      bar.style.width='100%';
      setTimeout(()=>{
        document.getElementById('loading').style.display='none';
        document.getElementById('title').style.display='flex';
        initTitleScreen();
        setupControls();
      },300);
    }
  },100);
})();
</script>
