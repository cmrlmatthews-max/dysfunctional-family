  const baseGrad = ctx.createLinearGradient(fx - 14, GROUND_Y - 4, fx + 14, GROUND_Y - 4);
  baseGrad.addColorStop(0, '#7a6a5a');
  baseGrad.addColorStop(0.5, '#8a7a6a');
  baseGrad.addColorStop(1, '#6a5a4a');
  ctx.fillStyle = baseGrad;
  ctx.fillRect(fx - 14, GROUND_Y - 3, 28, 6);

  // Base shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.fillRect(fx - 14, GROUND_Y + 2, 28, 2);

  // Draw celebration particles with soft glow
  celebrationParticles.forEach(p => {
    const alpha = p.life / 1.5;
    // Particle glow
    const pGlow = ctx.createRadialGradient(p.x - camX, p.y, 0.5, p.x - camX, p.y, 4);
    pGlow.addColorStop(0, `${p.color.slice(0, -1)}, ${alpha * 0.6})`);
    pGlow.addColorStop(1, `${p.color.slice(0, -1)}, 0)`);
    ctx.fillStyle = pGlow;
    ctx.beginPath();
    ctx.arc(p.x - camX, p.y, 4, 0, 6.28);
    ctx.fill();

    // Particle core
    ctx.fillStyle = `${p.color.slice(0, -1)}, ${alpha * 0.9})`;
    ctx.fillRect(p.x - camX - 2, p.y - 2, 4, 4);
  });
}

function drawCheckpoints(now) {
  CHECKPOINTS.forEach((cp, idx) => {
    const cx = cp.x - camX;
    const cy = cp.y - 20;

    if (cx < -20 || cx > VW + 20) return;

    const isReached = checkpointsReached[idx];
    const glowAmount = isReached ? (Math.sin(now * 0.008) + 1) / 2 : 0;

    // Wooden pole with gradient
    const poleGrad = ctx.createLinearGradient(cx - 1.5, cy, cx + 1.5, cy + 20);
    if (isReached) {
      poleGrad.addColorStop(0, '#d4b55a');
      poleGrad.addColorStop(0.5, '#b89f40');
      poleGrad.addColorStop(1, '#9a8030');
    } else {
      poleGrad.addColorStop(0, '#8a8a8a');
      poleGrad.addColorStop(0.5, '#6a6a6a');
      poleGrad.addColorStop(1, '#4a4a4a');
    }
    ctx.fillStyle = poleGrad;
    ctx.fillRect(cx - 1.5, cy, 3, 20);

    // Pole highlight
    ctx.fillStyle = 'rgba(255, 255, 200, 0.2)';
    ctx.fillRect(cx - 0.8, cy, 1, 20);

    // Flag with dynamic gradient
    let flagGrad = ctx.createLinearGradient(cx + 2, cy + 2, cx + 14, cy + 10);
    if (isReached) {
      flagGrad.addColorStop(0, '#ffd700');
      flagGrad.addColorStop(0.5, '#f5c842');
      flagGrad.addColorStop(1, '#e8b840');
    } else {
      flagGrad.addColorStop(0, '#aaaaaa');
      flagGrad.addColorStop(0.5, '#999999');
      flagGrad.addColorStop(1, '#777777');
    }
    ctx.fillStyle = flagGrad;

    // Rounded flag shape
    ctx.beginPath();
    ctx.moveTo(cx + 2, cy + 2);
    ctx.lineTo(cx + 12, cy + 2);
    ctx.quadraticCurveTo(cx + 14, cy + 6, cx + 12, cy + 10);
    ctx.lineTo(cx + 2, cy + 10);
    ctx.closePath();
    ctx.fill();

    // Flag shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fill();

    // Checkmark or inactive pattern
    if (isReached) {
      // Active glow aura
      if (glowAmount > 0) {
        const checkGlow = ctx.createRadialGradient(cx + 8, cy + 6, 2, cx + 8, cy + 6, 10 + glowAmount * 3);
        checkGlow.addColorStop(0, `rgba(255, 215, 0, ${glowAmount * 0.4})`);
        checkGlow.addColorStop(0.6, `rgba(255, 215, 0, ${glowAmount * 0.15})`);
        checkGlow.addColorStop(1, 'rgba(255, 215, 0, 0)');
        ctx.fillStyle = checkGlow;
        ctx.beginPath();
        ctx.arc(cx + 8, cy + 6, 10 + glowAmount * 3, 0, 6.28);
        ctx.fill();
      }

      // Checkmark with soft shadow
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(cx + 4, cy + 7);
      ctx.lineTo(cx + 6.5, cy + 9);
      ctx.lineTo(cx + 12, cy + 4);
      ctx.stroke();

      // Checkmark highlight
      ctx.strokeStyle = '#22dd22';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(cx + 4, cy + 7);
      ctx.lineTo(cx + 6.5, cy + 9);
      ctx.lineTo(cx + 12, cy + 4);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else {
      // Inactive pattern - subtle X or question mark
      ctx.strokeStyle = 'rgba(100, 100, 100, 0.4)';
      ctx.lineWidth = 1;
      ctx.lineCap = 'round';

      // Draw an X pattern
      ctx.beginPath();
      ctx.moveTo(cx + 4, cy + 3);
      ctx.lineTo(cx + 10, cy + 9);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + 10, cy + 3);
      ctx.lineTo(cx + 4, cy + 9);
      ctx.stroke();
    }

    // Base platform
    const baseGrad = ctx.createLinearGradient(cx - 4, GROUND_Y - 3, cx + 6, GROUND_Y + 3);
    if (isReached) {
      baseGrad.addColorStop(0, '#c4a04a');
      baseGrad.addColorStop(0.5, '#aa8830');
      baseGrad.addColorStop(1, '#8a6a20');
    } else {
      baseGrad.addColorStop(0, '#7a7a7a');
      baseGrad.addColorStop(0.5, '#5a5a5a');
      baseGrad.addColorStop(1, '#3a3a3a');
    }
    ctx.fillStyle = baseGrad;
    ctx.fillRect(cx - 4, GROUND_Y - 3, 10, 6);

    // Base highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.fillRect(cx - 4, GROUND_Y - 3, 10, 1.5);

    // Base shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
    ctx.fillRect(cx - 4, GROUND_Y + 2, 10, 1);
  });
}

function drawInsultText(it, now) {
  if (!it.text) return;
  const tx = it.x - camX;
  const ty = it.y;

  const alpha = it.timer < 0.3 ? it.timer / 0.3 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;

  const fontSize = it.isFromEnemy ? 8 : 7;
  ctx.font = `bold ${fontSize}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Measure text for bubble sizing
  const textWidth = ctx.measureText(it.text).width;
  const padX = 8, padY = 6;
  const bubbleW = textWidth + padX * 2;
  const bubbleH = fontSize + padY * 2;
  const bubbleX = tx - bubbleW / 2;
  const bubbleY = ty - bubbleH / 2;
  const tailSize = 5;
  const cornerR = 5;

  if (it.isFromEnemy) {
    // Painterly speech bubble with gradient
    const bubbleGrad = ctx.createLinearGradient(bubbleX, bubbleY, bubbleX, bubbleY + bubbleH);
    bubbleGrad.addColorStop(0, '#fffaff');
    bubbleGrad.addColorStop(1, '#f5f0f5');
    ctx.fillStyle = bubbleGrad;
    ctx.strokeStyle = 'rgba(50,50,50,0.5)';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Rounded rectangle
    ctx.beginPath();
    ctx.moveTo(bubbleX + cornerR, bubbleY);
    ctx.lineTo(bubbleX + bubbleW - cornerR, bubbleY);
    ctx.arcTo(bubbleX + bubbleW, bubbleY, bubbleX + bubbleW, bubbleY + cornerR, cornerR);
    ctx.lineTo(bubbleX + bubbleW, bubbleY + bubbleH - cornerR);
    ctx.arcTo(bubbleX + bubbleW, bubbleY + bubbleH, bubbleX + bubbleW - cornerR, bubbleY + bubbleH, cornerR);
    ctx.lineTo(bubbleX + bubbleW / 2 + tailSize, bubbleY + bubbleH);
    // Tail pointing down toward NPC
    ctx.lineTo(bubbleX + bubbleW / 2, bubbleY + bubbleH + tailSize);
    ctx.lineTo(bubbleX + bubbleW / 2 - tailSize, bubbleY + bubbleH);
    ctx.lineTo(bubbleX + cornerR, bubbleY + bubbleH);
    ctx.arcTo(bubbleX, bubbleY + bubbleH, bubbleX, bubbleY + bubbleH - cornerR, cornerR);
    ctx.lineTo(bubbleX, bubbleY + cornerR);
    ctx.arcTo(bubbleX, bubbleY, bubbleX + cornerR, bubbleY, cornerR);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Soft shadow inside bubble edges
    ctx.fillStyle = 'rgba(100,100,100,0.05)';
    ctx.fillRect(bubbleX, bubbleY, bubbleW, 1);

    // Text inside bubble (dark with soft shadow)
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillText(it.text, tx + 0.5, ty + 0.5);
    ctx.fillStyle = '#333';
    ctx.fillText(it.text, tx, ty);
  } else {
    // Player hit text — floating red text with gradient glow and outline
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeText(it.text, tx, ty);

    // Gradient text fill
    const textGrad = ctx.createLinearGradient(tx - textWidth/2, ty - 4, tx - textWidth/2, ty + 4);
    textGrad.addColorStop(0, '#ff6666');
    textGrad.addColorStop(0.5, '#ff3333');
    textGrad.addColorStop(1, '#dd0000');
    ctx.fillStyle = textGrad;
    ctx.fillText(it.text, tx, ty);
  }

  ctx.restore();
}

function drawMagnetArcs(now) {
  if (player.powerUp !== 'magnet') return;
  const px = player.x + player.w/2 - camX;
  const py = player.y + player.h/2;
  coins.forEach(c => {
    if (c.collected) return;
    const cx = c.x - camX;
    const cy = c.y;
    const dist = Math.hypot(px - cx, py - cy);
    if (dist > 80) return;
    const alpha = (1 - dist / 80) * 0.6;
    const pulse = (Math.sin(now * 0.01 + c.x * 0.01) + 1) / 2;
    const mx = (cx + px) / 2 + Math.sin(now * 0.008 + c.x) * 14;
    const my = (cy + py) / 2;

    // Painterly arc with gradient and glow
    ctx.save();
    ctx.lineWidth = 0.8 + pulse * 1.2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Outer glow stroke
    ctx.strokeStyle = `rgba(255,200,0,${alpha * 0.2})`;
    ctx.lineWidth = 2.5 + pulse * 1.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.quadraticCurveTo(mx, my, px, py);
    ctx.stroke();

    // Main arc with gradient
    const arcGrad = ctx.createLinearGradient(cx, cy, px, py);
    arcGrad.addColorStop(0, `rgba(255,240,0,${alpha * 0.4})`);
    arcGrad.addColorStop(0.5, `rgba(255,221,0,${alpha * (0.5 + pulse * 0.4)})`);
    arcGrad.addColorStop(1, `rgba(255,200,0,${alpha * 0.3})`);
    ctx.strokeStyle = arcGrad;
    ctx.lineWidth = 1.2 + pulse * 0.8;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.quadraticCurveTo(mx, my, px, py);
    ctx.stroke();

    ctx.restore();
  });
}

function drawDustParticle(d) {
  const dx = d.x - camX;
  const lifeProgress = d.life / 0.35;
  const alpha = lifeProgress * 0.7;

  ctx.save();

  // Soft dust particle with radial gradient (gaussian-style falloff)
  const dustGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, d.size * 1.2);
  dustGrad.addColorStop(0, `rgba(200,180,140,${alpha})`);
  dustGrad.addColorStop(0.5, `rgba(180,160,120,${alpha * 0.6})`);
  dustGrad.addColorStop(1, `rgba(150,130,90,0)`);

  ctx.fillStyle = dustGrad;
  ctx.translate(dx, d.y);
  ctx.beginPath();
  ctx.arc(0, 0, d.size * (0.8 + lifeProgress * 0.5), 0, 6.28);
  ctx.fill();

  ctx.restore();
}

function drawDeathAnim(da, now) {
  const dx = da.x - camX;
  if (dx < -40 || dx > VW + 40) return;

  const squish = da.squish;
  if (squish <= 0) return;

  ctx.save();
  ctx.globalAlpha = squish;
  ctx.translate(dx, da.y + da.h * (1 - squish));
  ctx.scale(1 + (1 - squish) * 0.8, squish);

  // Draw the squishing character
  const charData = { name: da.name, color: da.color, skin: da.skin, hair: da.hair, cls: da.cls };
  drawCharSprite(ctx, -da.w/2, 0, da.w, da.h, charData, now, {
    facing: 1, bob: 0, isEnemy: true, invTimer: 0, powerUp: null
  });

  // Dizzy stars with soft glow
  const starPhase = now * 0.01;
  for (let i = 0; i < 3; i++) {
    const sx = Math.cos(starPhase + i * 2.09) * 12;
    const sy = Math.sin(starPhase + i * 2.09) * 5 - 8;

    // Star glow
    const starGlow = ctx.createRadialGradient(sx, sy, 1, sx, sy, 8);
    starGlow.addColorStop(0, 'rgba(255,221,0,0.4)');
    starGlow.addColorStop(1, 'rgba(255,180,0,0)');
    ctx.fillStyle = starGlow;
    ctx.beginPath();
    ctx.arc(sx, sy, 8, 0, 6.28);
    ctx.fill();

    // Star itself with gradient
    const starGrad = ctx.createRadialGradient(sx-1, sy-1, 0.5, sx, sy, 3);
    starGrad.addColorStop(0, '#ffff88');
    starGrad.addColorStop(1, '#ffdd00');
    ctx.fillStyle = starGrad;
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', sx, sy);
  }

  ctx.restore();
}

function drawScorePopup(sp) {
  const sx = sp.x - camX;
  const alpha = Math.min(sp.timer / 0.3, 1);

  ctx.save();
  ctx.globalAlpha = alpha;
  const fontSize = Math.floor(8 * sp.scale);
  ctx.font = `bold ${fontSize}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Soft shadow/glow outline
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeText(sp.text, sx, sp.y);

  // Gradient text fill
  const textGrad = ctx.createLinearGradient(sx - 20, sp.y - fontSize/2, sx + 20, sp.y + fontSize/2);
  // Use the base color and create a gradient version
  const baseColor = sp.color || '#ffff00';
  textGrad.addColorStop(0, baseColor);
  textGrad.addColorStop(0.5, baseColor + 'ee');
  textGrad.addColorStop(1, baseColor);

  ctx.fillStyle = textGrad;
  ctx.fillText(sp.text, sx, sp.y);

  ctx.restore();
}

function drawHealthBar(now) {
  const startX = 6;
  const startY = 8;
  const heartSize = 12;
  const heartGap = 4;
  const numHearts = Math.floor(player.maxHp / 2); // Each heart = 2 HP
  const totalW = numHearts * (heartSize + heartGap) + 8;

  // Painterly background panel with gradient
  const panelGrad = ctx.createLinearGradient(startX - 3, startY - 3, startX - 3, startY - 3 + heartSize + 10);
  panelGrad.addColorStop(0, 'rgba(0,0,0,0.65)');
  panelGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = panelGrad;
  ctx.fillRect(startX - 3, startY - 3, totalW, heartSize + 10);

  // Soft border with gradient
  ctx.strokeStyle = 'rgba(245,200,66,0.3)';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeRect(startX - 3, startY - 3, totalW, heartSize + 10);

  // Inner highlight edge
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.strokeRect(startX - 2, startY - 2, totalW - 2, heartSize + 8);

  for (let i = 0; i < numHearts; i++) {
    const hx = startX + i * (heartSize + heartGap);
    const hy = startY;
    // Each heart represents 2 HP
    const heartHP = Math.max(0, Math.min(2, player.hp - i * 2));
    // heartHP: 2 = full, 1 = half, 0 = empty
    const isLastHP = player.hp <= 1 && heartHP > 0;

    // Low-health pulse for last remaining heart
    let scale = 1;
    if (isLastHP) {
      scale = 1 + Math.sin(now * 0.012) * 0.15;
    }

    // Damage flash — recently lost HP from this heart
    const justLost = heartHP < 2 && heartHP >= 0 && i === Math.floor(player.hp / 2) && player.invTimer > 0.5;

    ctx.save();
    const cx = hx + heartSize / 2;
    const cy = hy + heartSize / 2;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);

    if (heartHP === 2) {
      // Full heart glow when low
      if (isLastHP) {
        const glowAlpha = 0.15 + (Math.sin(now * 0.012) + 1) / 2 * 0.15;
        ctx.fillStyle = `rgba(255,50,50,${glowAlpha})`;
        ctx.beginPath(); ctx.arc(cx, cy, heartSize * 0.9, 0, 6.28); ctx.fill();
      }
      // Full heart
      drawPixelHeart(ctx, hx, hy, heartSize, '#ff3344', '#ff6677', '#cc1122');
    } else if (heartHP === 1) {
      // Half heart: draw empty base, then fill left half
      drawPixelHeart(ctx, hx, hy, heartSize, '#333', '#444', '#222');
      // Clip to left half and draw filled heart over it
      ctx.save();
      ctx.beginPath();
      ctx.rect(hx, hy - 2, heartSize / 2, heartSize + 4);
      ctx.clip();
      if (isLastHP) {
        const glowAlpha = 0.15 + (Math.sin(now * 0.012) + 1) / 2 * 0.15;
        ctx.fillStyle = `rgba(255,50,50,${glowAlpha})`;
        ctx.beginPath(); ctx.arc(cx, cy, heartSize * 0.9, 0, 6.28); ctx.fill();
      }
      drawPixelHeart(ctx, hx, hy, heartSize, '#ff3344', '#ff6677', '#cc1122');
      ctx.restore();
    } else if (justLost) {
      // Flashing empty heart (just lost)
      const flash = Math.sin(now * 0.02) > 0;
      if (flash) {
        drawPixelHeart(ctx, hx, hy, heartSize, '#ff333388', '#ff667744', '#cc112244');
      } else {
        drawPixelHeart(ctx, hx, hy, heartSize, '#333', '#444', '#222');
      }
    } else {
      // Empty heart
      drawPixelHeart(ctx, hx, hy, heartSize, '#333', '#444', '#222');
    }

    ctx.restore();
  }

  // Power-up indicator next to hearts
  if (player.powerUp) {
    const puX = startX + player.maxHp * (heartSize + heartGap) + 6;
    const puY = startY;
    const puColors = { shield: '#ffdd00', speed: '#4488ff', magnet: '#cc44ff' };
    const puNames = { shield: 'SHIELD', speed: 'SPEED', magnet: 'MAGNET' };
    const timeLeft = Math.max(0, player.powerUpTimer);
    const blinking = timeLeft < 2 && Math.sin(now * 0.015) > 0;

    if (!blinking || timeLeft >= 2) {
      ctx.fillStyle = 'rgba(0,0,0,.55)';
      const label = puNames[player.powerUp] || '';
      ctx.font = 'bold 7px monospace';
      const tw = ctx.measureText(label).width;
      ctx.fillRect(puX - 2, puY - 2, tw + 22, heartSize + 6);

      // Icon dot
      ctx.fillStyle = puColors[player.powerUp] || '#fff';
      ctx.beginPath(); ctx.arc(puX + 5, puY + heartSize / 2, 4, 0, 6.28); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(puX + 5, puY + heartSize / 2 - 1, 1.5, 0, 6.28); ctx.fill();

      // Label
      ctx.fillStyle = puColors[player.powerUp] || '#fff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, puX + 12, puY + heartSize / 2 + 1);

      // Timer bar
      const maxTime = player.powerUp === 'shield' ? 5 : player.powerUp === 'speed' ? 6 : 8;
      const barW = tw + 18;
      const barPct = timeLeft / maxTime;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(puX - 1, puY + heartSize + 1, barW, 2);
      ctx.fillStyle = puColors[player.powerUp] || '#fff';
      ctx.fillRect(puX - 1, puY + heartSize + 1, barW * barPct, 2);
    }
  }
}

function drawPixelHeart(ctx, x, y, size, mainColor, highlightColor, shadowColor) {
  // Painterly smooth gradient heart instead of pixel art
  const cx = x + size / 2;
  const cy = y + size / 2;
  const s = size / 12;

  ctx.save();
  ctx.translate(cx, cy);

  // Draw smooth heart shape with bezier curves
  ctx.beginPath();
  // Top left bump
  ctx.bezierCurveTo(-size*0.35, -size*0.2, -size*0.25, size*0.1, -size*0.05, size*0.15);
  // Left side
  ctx.lineTo(-size*0.15, size*0.35);
  // Bottom point
  ctx.bezierCurveTo(0, size*0.45, 0, size*0.45, 0, size*0.45);
  // Right side
  ctx.lineTo(size*0.15, size*0.35);
  // Top right bump
  ctx.bezierCurveTo(size*0.25, size*0.1, size*0.35, -size*0.2, size*0.05, -size*0.15);
  // Back to center top
  ctx.bezierCurveTo(size*0.15, -size*0.3, -size*0.15, -size*0.3, -size*0.35, -size*0.2);
  ctx.closePath();

  // Main heart gradient
  const heartGrad = ctx.createRadialGradient(-size*0.1, -size*0.15, 1, 0, 0, size*0.35);
  heartGrad.addColorStop(0, highlightColor);
  heartGrad.addColorStop(0.5, mainColor);
  heartGrad.addColorStop(1, shadowColor);
  ctx.fillStyle = heartGrad;
  ctx.fill();

  // Soft inner glow
  const glowGrad = ctx.createRadialGradient(-size*0.1, -size*0.15, 0, -size*0.1, -size*0.15, size*0.2);
  glowGrad.addColorStop(0, 'rgba(255,255,255,0.3)');
  glowGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glowGrad;
  ctx.fill();

  // Soft outline
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 0.6;
  ctx.stroke();

  ctx.restore();
}

function drawAbilityCooldown(now) {
  if (player.abilityTimer <= 0) return;

  const cooldownMax = player.charCls === 'inspector' || player.charCls === 'planner' ? 5 : 3;
  const progress = Math.max(0, 1 - player.abilityTimer / cooldownMax);

  const x = 200;
  const y = 12;
  const size = 16;

  ctx.save();

  // Painterly background panel with gradient
  const bgGrad = ctx.createLinearGradient(x - 2, y - 2, x - 2, y + size + 2);
  bgGrad.addColorStop(0, 'rgba(0,0,0,0.65)');
  bgGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(x - 2, y - 2, size + 4, size + 4);

  // Soft rounded border
  ctx.strokeStyle = 'rgba(100,200,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeRect(x - 2, y - 2, size + 4, size + 4);

  // Cooldown arc with glow
  ctx.translate(x + size/2, y + size/2);

  // Arc glow
  ctx.strokeStyle = `rgba(100,180,255,${0.3 * progress})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, 0, size/2 - 1, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * progress);
  ctx.stroke();

  // Main arc
  const arcGrad = ctx.createLinearGradient(-size/2, -size/2, size/2, size/2);
  arcGrad.addColorStop(0, '#7ddbff');
  arcGrad.addColorStop(1, '#4db8ff');
  ctx.strokeStyle = arcGrad;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, size/2 - 2, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * progress);
  ctx.stroke();

  // Icon with gradient
  const iconGrad = ctx.createRadialGradient(-2, -2, 1, 0, 0, 8);
  iconGrad.addColorStop(0, '#aaddff');
  iconGrad.addColorStop(1, '#4db8ff');
  ctx.fillStyle = iconGrad;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('E', 0, 0);

  ctx.restore();

  if (progress < 1) {
    const timeLeft = Math.ceil(player.abilityTimer);
    ctx.fillStyle = '#7ddbff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    // Soft shadow for readability
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillText(timeLeft, x + size/2 + 0.5, y + size + 2.5);
    ctx.fillStyle = '#7ddbff';
    ctx.fillText(timeLeft, x + size/2, y + size + 2);
  }
}

function drawStompCombo(now) {
  if (stompCombo < 2 || stompComboTimer <= 0) return;
  const alpha = Math.min(stompComboTimer, 1);
  const pulse = (Math.sin(now * 0.015) + 1) / 2;

  ctx.save();
  ctx.globalAlpha = alpha;
  const fontSize = 12 + Math.floor(pulse * 3);
  ctx.font = `bold ${fontSize}px monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';

  const text = `COMBO x${stompCombo}`;
  const tw = ctx.measureText(text).width;

  // Painterly background with gradient
  const comboGrad = ctx.createLinearGradient(VW - tw - 14, 8, VW - tw - 14, 28);
  comboGrad.addColorStop(0, 'rgba(0,0,0,0.75)');
  comboGrad.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = comboGrad;
  ctx.fillRect(VW - tw - 14, 8, tw + 10, 20);

  // Decorative border
  const borderColor = stompCombo >= 4 ? 'rgba(255,50,50,0.5)' : stompCombo >= 3 ? 'rgba(255,136,0,0.5)' : 'rgba(255,221,0,0.5)';
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeRect(VW - tw - 14, 8, tw + 10, 20);

  // Gradient text
  const textColor = stompCombo >= 4 ? '#ff3333' : stompCombo >= 3 ? '#ff8800' : '#ffdd00';
  const textGrad = ctx.createLinearGradient(VW - tw - 14, 8, VW - tw - 14, 28);
  textGrad.addColorStop(0, textColor);
  textGrad.addColorStop(1, textColor + 'dd');
  ctx.fillStyle = textGrad;
  ctx.fillText(text, VW - 8, 11);

  ctx.restore();
}

function drawScore(now) {
  const elapsed = (now - gameStartTime) / 1000;
  const mm = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const ss = Math.floor(elapsed % 60).toString().padStart(2, '0');
  const scoreText = `SCORE: ${score}  ${mm}:${ss}`;
  const panelPadding = 8;
  const panelY = 8;

  ctx.save();
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  const panelWidth = ctx.measureText(scoreText).width + panelPadding * 2;
  const panelX = VW - panelWidth - 4;

  // Painterly panel with gradient
  const scoreGrad = ctx.createLinearGradient(panelX, panelY, panelX, panelY + 16);
  scoreGrad.addColorStop(0, 'rgba(0,0,0,0.75)');
  scoreGrad.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = scoreGrad;
  ctx.fillRect(panelX, panelY, panelWidth, 16);

  // Soft decorative border
  ctx.strokeStyle = 'rgba(245,200,66,0.4)';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeRect(panelX, panelY, panelWidth, 16);

  // Inner highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.strokeRect(panelX + 1, panelY + 1, panelWidth - 2, 14);

  // Gradient text
  const textGrad = ctx.createLinearGradient(panelX, panelY, panelX, panelY + 16);
  textGrad.addColorStop(0, '#ffdd77');
  textGrad.addColorStop(1, '#f5c842');
  ctx.fillStyle = textGrad;
  ctx.fillText(scoreText, panelX + panelPadding, panelY + 4);

  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  PLAYER PROJECTILE DRAWING
// ═══════════════════════════════════════════════════
function drawPlayerProjectile(proj, now) {
  const x = proj.x - camX;
  if (x < -50 || x > VW + 50) return;
  const y = proj.y;

  if (proj.type === 'blueprint') {
    // Rolled-up blueprint scroll
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(proj.rotation || 0);

    // Soft glow
    const bpGlow = ctx.createRadialGradient(0, 0, 1, 0, 0, 10);
    bpGlow.addColorStop(0, 'rgba(120,180,255,0.25)');
    bpGlow.addColorStop(1, 'rgba(60,120,220,0)');
    ctx.fillStyle = bpGlow;
    ctx.beginPath(); ctx.arc(0, 0, 10, 0, 6.28); ctx.fill();

    // Scroll tube (blueprint-blue outer paper)
    const tubeGrad = ctx.createLinearGradient(0, -4, 0, 4);
    tubeGrad.addColorStop(0, '#4a7ad0');
    tubeGrad.addColorStop(0.5, '#2e55aa');
    tubeGrad.addColorStop(1, '#1b3a80');
    ctx.fillStyle = tubeGrad;
    ctx.fillRect(-7, -3, 14, 6);

    // End caps (rolled paper edges)
    ctx.fillStyle = '#e8eeff';
    ctx.beginPath(); ctx.arc(-7, 0, 3, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc( 7, 0, 3, 0, 6.28); ctx.fill();

    // Paper-line detail on caps
    ctx.strokeStyle = '#aab8dd';
    ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.arc(-7, 0, 2, 0, 6.28); ctx.stroke();
    ctx.beginPath(); ctx.arc( 7, 0, 2, 0, 6.28); ctx.stroke();

    // Tie/ribbon across the middle
    ctx.fillStyle = '#ffcc33';
    ctx.fillRect(-1, -4, 2, 8);

    ctx.restore();
  } else if (proj.type === 'arrow') {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(proj.vx < 0 ? Math.PI : 0);

    // Arrow glow
    const arrowGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 6);
    arrowGlow.addColorStop(0, 'rgba(255,221,68,0.3)');
    arrowGlow.addColorStop(1, 'rgba(255,200,0,0)');
    ctx.fillStyle = arrowGlow;
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, 6.28);
    ctx.fill();

    // Arrow shaft with gradient
    const shaftGrad = ctx.createLinearGradient(-8, -1, -8, 1);
    shaftGrad.addColorStop(0, '#ffee77');
    shaftGrad.addColorStop(0.5, '#ffdd44');
    shaftGrad.addColorStop(1, '#ffcc00');
    ctx.fillStyle = shaftGrad;
    ctx.fillRect(-8, -1, 8, 2);

    // Arrow head with gradient
    const headGrad = ctx.createLinearGradient(-3, -2, 0, 0);
    headGrad.addColorStop(0, '#ffdd44');
    headGrad.addColorStop(1, '#ffaa00');
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-3, -2);
    ctx.lineTo(-3, 2);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  } else if (proj.type === 'shuriken') {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(proj.rotation || 0);

    // Shuriken glow
    const shurikenGlow = ctx.createRadialGradient(0, 0, 1, 0, 0, 7);
    shurikenGlow.addColorStop(0, 'rgba(255,100,100,0.3)');
    shurikenGlow.addColorStop(1, 'rgba(255,50,50,0)');
    ctx.fillStyle = shurikenGlow;
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, 6.28);
    ctx.fill();

    // Shuriken blades with gradient
    const bladeGrad = ctx.createLinearGradient(0, -2, 5, 0);
    bladeGrad.addColorStop(0, '#ff6666');
    bladeGrad.addColorStop(1, '#dd0000');
    ctx.fillStyle = bladeGrad;
    for (let i = 0; i < 4; i++) {
      ctx.rotate(Math.PI / 2);
      ctx.fillRect(0, -1, 5, 2);
    }
    ctx.restore();
  } else if (proj.type === 'orb') {
    const glow = Math.sin(now * 0.01) * 0.3 + 0.7;

    // Orb outer glow
    const orbGlowGrad = ctx.createRadialGradient(x-2, y-2, 2, x, y, 8);
    orbGlowGrad.addColorStop(0, `rgba(120,170,255,${0.4 + glow*0.3})`);
    orbGlowGrad.addColorStop(1, `rgba(80,120,255,0)`);
    ctx.fillStyle = orbGlowGrad;
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, 6.28);
    ctx.fill();

    // Orb body with gradient
    const orbGrad = ctx.createRadialGradient(x-2, y-2, 1, x, y, 6);
    orbGrad.addColorStop(0, '#aabbff');
    orbGrad.addColorStop(0.6, '#7890ff');
    orbGrad.addColorStop(1, '#4470dd');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, 6.28);
    ctx.fill();

    // Orb core
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, 6.28);
    ctx.fill();
  } else if (proj.type === 'slash') {
    ctx.save();
    const slashAlpha = 1 - (1 - proj.life / 0.2);
    ctx.globalAlpha = slashAlpha;

    // Slash glow
    const slashGlowGrad = ctx.createRadialGradient(x, y, 8, x, y, 18);
    slashGlowGrad.addColorStop(0, 'rgba(255,170,68,0.3)');
    slashGlowGrad.addColorStop(1, 'rgba(255,140,20,0)');
    ctx.strokeStyle = slashGlowGrad;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(x, y, 15, -Math.PI / 4, Math.PI / 4);
    ctx.stroke();

    // Main slash
    ctx.strokeStyle = '#ffaa44';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.arc(x, y, 15, -Math.PI / 4, Math.PI / 4);
    ctx.stroke();

    ctx.restore();
  } else if (proj.type === 'afterimage') {
    ctx.save();
    ctx.globalAlpha = (proj.alpha || 0.4) * 0.7;

    // Afterimage glow
    const afterGlow = ctx.createRadialGradient(x, y, 2, x, y, 12);
    afterGlow.addColorStop(0, 'rgba(170,170,255,0.3)');
    afterGlow.addColorStop(1, 'rgba(100,100,255,0)');
    ctx.fillStyle = afterGlow;
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, 6.28);
    ctx.fill();

    // Afterimage body
    ctx.fillStyle = '#aaaaff';
    ctx.fillRect(x - 8, y - 10, 16, 16);

    ctx.restore();
  } else if (proj.type === 'shockwave') {
    ctx.save();
    const shockAlpha = 1 - (1 - proj.life / 0.3);
    ctx.globalAlpha = shockAlpha;

    // Shockwave glow
    ctx.strokeStyle = `rgba(136,255,68,${0.3})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, proj.radius, 0, 6.28);
    ctx.stroke();

    // Main shockwave
    ctx.strokeStyle = '#88ff44';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(x, y, proj.radius, 0, 6.28);
    ctx.stroke();

    ctx.restore();
  } else if (proj.type === 'shield_bash') {
    ctx.save();

    // Shield glow
    const shieldGlow = ctx.createRadialGradient(x-2, y-2, 4, x, y, 14);
    shieldGlow.addColorStop(0, 'rgba(255,221,68,0.4)');
    shieldGlow.addColorStop(1, 'rgba(255,180,0,0)');
    ctx.fillStyle = shieldGlow;
    ctx.beginPath();
    ctx.arc(x, y, 14, 0, 6.28);
    ctx.fill();

    // Shield body
    const shieldGrad = ctx.createRadialGradient(x-2, y-2, 2, x, y, 12);
    shieldGrad.addColorStop(0, '#ffee77');
    shieldGrad.addColorStop(0.6, '#ffdd44');
    shieldGrad.addColorStop(1, '#ffaa00');
    ctx.fillStyle = shieldGrad;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, 6.28);
    ctx.fill();

    ctx.restore();
  }
}

function drawHealthPickup(hp, now) {
  const x = hp.x - camX;
  const y = hp.y;
  if (x < -20 || x > VW + 20) return;

  const pulse = Math.sin(now * 0.008 + (hp.glow || 0)) * 0.2 + 0.8;
  const wobble = Math.sin(now * 0.006 + (hp.glow || 0)) * 2;

  ctx.save();
  ctx.globalAlpha = hp.life / 8;
  ctx.translate(x + wobble, y);
  ctx.scale(pulse, pulse);

  // Outer glow with gradient
  const pickupGlowGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 12);
  pickupGlowGrad.addColorStop(0, 'rgba(255,150,150,0.4)');
  pickupGlowGrad.addColorStop(0.5, 'rgba(255,100,100,0.2)');
  pickupGlowGrad.addColorStop(1, 'rgba(255,80,80,0)');
  ctx.fillStyle = pickupGlowGrad;
  ctx.beginPath();
  ctx.arc(0, 0, 12, 0, 6.28);
  ctx.fill();

  // Heart with enhanced gradient
  drawPixelHeart(ctx, -4, -4, 8, '#ff3344', '#ff7788', '#cc1122');

  // Shine highlight
  const shineGrad = ctx.createRadialGradient(-2, -3, 0.5, 0, 0, 4);
  shineGrad.addColorStop(0, 'rgba(255,200,200,0.5)');
  shineGrad.addColorStop(1, 'rgba(255,150,150,0)');
  ctx.fillStyle = shineGrad;
  ctx.beginPath();
  ctx.arc(-1, -2, 4, 0, 6.28);
  ctx.fill();

  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  WATER DRAWING
// ═══════════════════════════════════════════════════
function drawWaterPool(pool, now) {
  const rx = pool.x - camX;
  if (rx + pool.w < 0 || rx > VW) return;
  const topY = pool.y - pool.depth; // top surface = GROUND_Y level
  const botY = pool.y;              // bottom = VH

  ctx.save();

  // Printer ink body with translucent gradient
  const waterGrad = ctx.createLinearGradient(0, topY, 0, botY);
  waterGrad.addColorStop(0, 'rgba(10,40,50,0.65)');
  waterGrad.addColorStop(0.3, 'rgba(5,25,35,0.75)');
  waterGrad.addColorStop(0.6, 'rgba(0,15,25,0.85)');
  waterGrad.addColorStop(1, 'rgba(0,5,15,0.95)');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(rx, topY, pool.w, pool.depth);

  // Soft caustic light patterns (darker ink patterns)
  ctx.globalAlpha = 0.15;
  for (let lx = 0; lx < pool.w; lx += 20) {
    const causticX = rx + lx + Math.sin(now * 0.003 + lx * 0.05) * 8;
    const causticGrad = ctx.createRadialGradient(causticX, topY + pool.depth/3, 2, causticX, topY + pool.depth/3, 15);
    causticGrad.addColorStop(0, 'rgba(0,100,120,0.4)');
    causticGrad.addColorStop(1, 'rgba(0,100,120,0)');
    ctx.fillStyle = causticGrad;
    ctx.beginPath();
    ctx.arc(causticX, topY + pool.depth/3, 15, 0, 6.28);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Animated wave surface at the top with painterly curves
  ctx.beginPath();
  ctx.moveTo(rx, topY + 10);
  for (let wx = 0; wx <= pool.w; wx += 2) {
    const waveH = Math.sin(now * 0.004 + (pool.x + wx) * 0.08) * 2.5
                + Math.sin(now * 0.007 + (pool.x + wx) * 0.12) * 1.5;
    ctx.lineTo(rx + wx, topY + waveH);
  }
  ctx.lineTo(rx + pool.w, topY + 10);
  ctx.closePath();

  // Ink surface with gradient
  const surfaceGrad = ctx.createLinearGradient(0, topY, 0, topY + 5);
  surfaceGrad.addColorStop(0, 'rgba(0,60,80,0.6)');
  surfaceGrad.addColorStop(1, 'rgba(10,40,50,0.3)');
  ctx.fillStyle = surfaceGrad;
  ctx.fill();

  // Surface highlight shimmer with soft falloff
  for (let wx = 4; wx < pool.w - 4; wx += 12) {
    const waveH = Math.sin(now * 0.004 + (pool.x + wx) * 0.08) * 2.5;
    const shimmer = (Math.sin(now * 0.006 + wx * 0.3) + 1) / 2;

    const shimmerGrad = ctx.createRadialGradient(rx + wx, topY + waveH, 1, rx + wx, topY + waveH, 5);
    shimmerGrad.addColorStop(0, `rgba(60,140,160,${0.5 + shimmer * 0.4})`);
    shimmerGrad.addColorStop(1, 'rgba(30,100,130,0)');
    ctx.fillStyle = shimmerGrad;
    ctx.beginPath();
    ctx.arc(rx + wx, topY + waveH, 5, 0, 6.28);
    ctx.fill();
  }

  // Soft ink foam at edges with gradient
  const foamL = Math.sin(now * 0.005) * 1.5;
  const foamGradL = ctx.createLinearGradient(rx, topY + foamL, rx + 5, topY + foamL);
  foamGradL.addColorStop(0, 'rgba(80,140,160,0.5)');
  foamGradL.addColorStop(1, 'rgba(50,110,140,0.1)');
  ctx.fillStyle = foamGradL;
  ctx.fillRect(rx, topY + foamL, 3, 5);

  const foamGradR = ctx.createLinearGradient(rx + pool.w - 5, topY + foamL, rx + pool.w, topY + foamL);
  foamGradR.addColorStop(0, 'rgba(50,110,140,0.1)');
  foamGradR.addColorStop(1, 'rgba(80,140,160,0.5)');
  ctx.fillStyle = foamGradR;
  ctx.fillRect(rx + pool.w - 3, topY + foamL, 3, 5);

  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  LAVA DRAWING
// ═══════════════════════════════════════════════════
function drawLavaPool(pool, now) {
  const rx = pool.x - camX;
  if (rx + pool.w < 0 || rx > VW) return;
  const topY = pool.y - pool.depth; // top surface = GROUND_Y level
  const botY = pool.y;              // bottom = VH

  ctx.save();

  // Hot coffee body with multi-layered gradient
  const lavaGrad = ctx.createLinearGradient(0, topY, 0, botY);
  lavaGrad.addColorStop(0, 'rgba(120,70,30,0.9)');
  lavaGrad.addColorStop(0.25, 'rgba(100,55,20,0.95)');
  lavaGrad.addColorStop(0.5, 'rgba(80,40,10,0.95)');
  lavaGrad.addColorStop(0.75, 'rgba(60,30,5,0.95)');
  lavaGrad.addColorStop(1, 'rgba(40,20,0,1)');
  ctx.fillStyle = lavaGrad;
  ctx.fillRect(rx, topY, pool.w, pool.depth);

  // Slow-moving lava surface waves with painterly fill
  ctx.beginPath();
  ctx.moveTo(rx, topY + 10);
  for (let lx = 0; lx <= pool.w; lx += 2) {
    const waveH = Math.sin(now * 0.002 + (pool.x + lx) * 0.06) * 3
                + Math.sin(now * 0.003 + (pool.x + lx) * 0.1) * 1.5;
    ctx.lineTo(rx + lx, topY + waveH);
  }
  ctx.lineTo(rx + pool.w, topY + 10);
  ctx.closePath();

  // Surface gradient with cream/tan core
  const lavaTopGrad = ctx.createLinearGradient(0, topY - 2, 0, topY + 8);
  lavaTopGrad.addColorStop(0, 'rgba(180,130,70,0.7)');
  lavaTopGrad.addColorStop(0.5, 'rgba(160,110,60,0.6)');
  lavaTopGrad.addColorStop(1, 'rgba(140,90,40,0.4)');
  ctx.fillStyle = lavaTopGrad;
  ctx.fill();

  // Bright animated hotspots with soft glow
  for (let lx = 6; lx < pool.w - 6; lx += 14) {
    const phase = now * 0.001 + lx * 0.2;
    const brightness = (Math.sin(phase) + 1) / 2;
    const waveH = Math.sin(now * 0.002 + (pool.x + lx) * 0.06) * 3;

    // Hotspot glow (cream colored)
    const hotGlow = ctx.createRadialGradient(rx + lx, topY + pool.depth/2 + waveH, 1, rx + lx, topY + pool.depth/2 + waveH, 6);
    hotGlow.addColorStop(0, `rgba(220,190,130,${0.4 + brightness * 0.4})`);
    hotGlow.addColorStop(1, `rgba(180,150,90,${0.1 + brightness * 0.2})`);
    ctx.fillStyle = hotGlow;
    ctx.beginPath();
    ctx.arc(rx + lx, topY + pool.depth/2 + waveH, 6, 0, 6.28);
    ctx.fill();

    // Hotspot core (lighter cream)
    const hotCore = ctx.createRadialGradient(rx + lx, topY + pool.depth/2 + waveH, 0.5, rx + lx, topY + pool.depth/2 + waveH, 4);
    hotCore.addColorStop(0, `rgba(240,210,160,${0.5 + brightness * 0.5})`);
    hotCore.addColorStop(1, `rgba(210,180,130,${0.2 + brightness * 0.3})`);
    ctx.fillStyle = hotCore;
    ctx.beginPath();
    ctx.arc(rx + lx, topY + pool.depth/2 + waveH, 4, 0, 6.28);
    ctx.fill();
  }

  // Warm coffee steam shimmer rising above the surface
  const glowGrad = ctx.createLinearGradient(0, topY - 25, 0, topY);
  glowGrad.addColorStop(0, 'rgba(180,120,60,0)');
  glowGrad.addColorStop(0.3, 'rgba(190,140,80,0.08)');
  glowGrad.addColorStop(0.7, 'rgba(200,150,100,0.15)');
  glowGrad.addColorStop(1, 'rgba(180,120,60,0.1)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(rx - 4, topY - 25, pool.w + 8, 25);

  ctx.restore();
}

function drawLavaBubble(b) {
  const bx = b.x - camX;
  const alpha = b.life > 0.3 ? 1 : b.life / 0.3;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Coffee bubble glow
  const bubbleGlow = ctx.createRadialGradient(bx, b.y, 1, bx, b.y, b.size + 3);
  bubbleGlow.addColorStop(0, 'rgba(210,160,100,0.4)');
  bubbleGlow.addColorStop(1, 'rgba(170,120,60,0)');
  ctx.fillStyle = bubbleGlow;
  ctx.beginPath();
  ctx.arc(bx, b.y, b.size + 3, 0, 6.28);
  ctx.fill();

  // Main coffee bubble with gradient
  const bubbleGrad = ctx.createRadialGradient(bx - 1, b.y - 1, 0.5, bx, b.y, b.size);
  bubbleGrad.addColorStop(0, 'rgba(220,180,130,0.9)');
  bubbleGrad.addColorStop(0.6, 'rgba(180,140,90,0.8)');
  bubbleGrad.addColorStop(1, 'rgba(140,100,60,0.6)');
  ctx.fillStyle = bubbleGrad;
  ctx.beginPath();
  ctx.arc(bx, b.y, b.size, 0, 6.28);
  ctx.fill();

  // Highlight reflection
  const highlightGrad = ctx.createRadialGradient(bx - b.size * 0.3, b.y - b.size * 0.3, 0, bx - b.size * 0.3, b.y - b.size * 0.3, b.size * 0.6);
  highlightGrad.addColorStop(0, 'rgba(255,255,200,0.6)');
  highlightGrad.addColorStop(1, 'rgba(255,240,150,0)');
  ctx.fillStyle = highlightGrad;
  ctx.beginPath();
  ctx.arc(bx - b.size * 0.3, b.y - b.size * 0.3, b.size * 0.6, 0, 6.28);
  ctx.fill();

  ctx.restore();
}

function drawHeatShimmer(s) {
  const sx = s.x - camX;
  const alpha = s.life > 0.5 ? (1 - (s.life - 0.5) / 0.5) * 0.3 : (s.life / 0.5) * 0.3;
  const wobble = Math.sin(s.life * 12 + s.x) * 3;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Coffee steam shimmer glow with painterly gradient
  const shimmerGlow = ctx.createRadialGradient(sx + wobble, s.y, 1, sx + wobble, s.y, s.size * 1.5);
  shimmerGlow.addColorStop(0, 'rgba(200,150,100,0.5)');
  shimmerGlow.addColorStop(0.5, 'rgba(170,120,70,0.2)');
  shimmerGlow.addColorStop(1, 'rgba(140,90,40,0)');
  ctx.fillStyle = shimmerGlow;
  ctx.beginPath();
  ctx.arc(sx + wobble, s.y, s.size * 1.5, 0, 6.28);
  ctx.fill();

  // Core coffee steam shimmer
  const shimmerCore = ctx.createRadialGradient(sx + wobble - 1, s.y - 1, 0, sx + wobble, s.y, s.size);
  shimmerCore.addColorStop(0, 'rgba(220,170,120,0.5)');
  shimmerCore.addColorStop(1, 'rgba(170,120,70,0)');
  ctx.fillStyle = shimmerCore;
  ctx.beginPath();
  ctx.arc(sx + wobble, s.y, s.size, 0, 6.28);
  ctx.fill();

  ctx.restore();
}

function drawWaterSplash(sp) {
  const sx = sp.x - camX;
  const alpha = sp.life / sp.maxLife;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Outer splash glow with gradient
  const splashGlow = ctx.createRadialGradient(sx, sp.y, sp.size * 0.3, sx, sp.y, sp.size * (1.2 - alpha * 0.5));
  splashGlow.addColorStop(0, `rgba(150,200,255,${0.5})`);
  splashGlow.addColorStop(0.5, `rgba(120,180,255,${0.2})`);
  splashGlow.addColorStop(1, `rgba(100,160,255,0)`);
  ctx.fillStyle = splashGlow;
  ctx.beginPath();
  ctx.arc(sx, sp.y, sp.size * (1.2 - alpha * 0.5), 0, 6.28);
  ctx.fill();

  // Main splash with gradient
  const splashGrad = ctx.createRadialGradient(sx, sp.y - sp.size * 0.2, 0.5, sx, sp.y, sp.size);
  splashGrad.addColorStop(0, 'rgba(200,240,255,0.7)');
  splashGrad.addColorStop(0.6, 'rgba(150,200,255,0.5)');
  splashGrad.addColorStop(1, 'rgba(100,160,255,0)');
  ctx.fillStyle = splashGrad;
  ctx.beginPath();
  ctx.arc(sx, sp.y, sp.size * (1 - alpha * 0.5), 0, 6.28);
  ctx.fill();

  // Inner bright core
  const splashCore = ctx.createRadialGradient(sx, sp.y, 0, sx, sp.y, sp.size * 0.5);
  splashCore.addColorStop(0, 'rgba(230,248,255,0.6)');
  splashCore.addColorStop(1, 'rgba(200,230,255,0)');
  ctx.fillStyle = splashCore;
  ctx.beginPath();
  ctx.arc(sx, sp.y, sp.size * 0.4, 0, 6.28);
  ctx.fill();

  ctx.restore();
}

function drawMsg(now){
  if(!msgText||msgExpiry<now) return;
  ctx.font='bold 7px monospace';
  const lines=msgText.split('\n');
  const lh=12, pad=9;
  const mw=Math.max(...lines.map(l=>ctx.measureText(l).width))+pad*2;
  const mh=lines.length*lh+pad*1.5;
  const bx=VW/2-mw/2, by=VH-mh-8;
  ctx.fillStyle='rgba(0,0,0,.88)';
  ctx.fillRect(bx,by,mw,mh);
  ctx.strokeStyle='#f5c84266';
  ctx.lineWidth=1;
  ctx.strokeRect(bx,by,mw,mh);
  ctx.fillStyle='#f5c842';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  lines.forEach((l,i)=>ctx.fillText(l,VW/2,by+pad+i*lh+lh/2));
}

function showMsg(t,ms){
  msgText=t;
  msgExpiry=performance.now()+ms;
}

// ═══════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════
function draw(now){
  ctx.clearRect(0,0,VW,VH);

  // Apply screen shake + camera punch
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y + camPunch.y);

  drawBG(now);
  PLATFORMS.forEach(p=>drawPlatform(p));
  WATER_POOLS.forEach(wp => drawWaterPool(wp, now));
  LAVA_POOLS.forEach(lp => drawLavaPool(lp, now));
  lavaBubbles.forEach(b => drawLavaBubble(b));
  heatShimmers.forEach(s => drawHeatShimmer(s));
  waterSplashes.forEach(sp => drawWaterSplash(sp));
  coins.forEach(c=>drawCoin(c,now));
  drawMagnetArcs(now);
  PALM_TREES.forEach(pt => drawPalmTree(pt, now));
  dustParticles.forEach(d => drawDustParticle(d));
  sparkles.forEach(s => drawSparkle(s));
  drawCheckpoints(now);
  drawFlag(now);
  deathAnims.forEach(da => drawDeathAnim(da, now));
  enemies.forEach(e=>drawEnemy(e,now));
  drawBoss(now);
  projectiles.forEach(proj => drawProjectile(proj, now));
  playerProjectiles.forEach(proj => drawPlayerProjectile(proj, now));
  healthPickups.forEach(hp => drawHealthPickup(hp, now));
  drawPlayer(now);
  scorePopups.forEach(sp => drawScorePopup(sp));
  insultTexts.forEach(it => drawInsultText(it, now));
  drawMsg(now);

  ctx.restore(); // end screen shake

  // HUD elements drawn outside screen shake
  drawHealthBar(now);
  drawAbilityCooldown(now);
  drawStompCombo(now);
  drawScore(now);

  // Red screen flash overlay
  if (redFlash.timer > 0) {
    const flashAlpha = redFlash.intensity * (redFlash.timer / 0.35);
    ctx.fillStyle = `rgba(200,0,0,${flashAlpha})`;
    ctx.fillRect(0, 0, VW, VH);
    // Vignette-style edge glow for extra impact
    const vigGrad = ctx.createRadialGradient(VW/2, VH/2, VW*0.2, VW/2, VH/2, VW*0.6);
    vigGrad.addColorStop(0, 'rgba(200,0,0,0)');
    vigGrad.addColorStop(1, `rgba(180,0,0,${flashAlpha * 0.6})`);
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, VW, VH);
  }

  // Low-HP pulsing vignette
  if (player.hp <= 2 && player.hp > 0) {
    const pulse = (Math.sin(now * 0.008) + 1) / 2;
    const vig = ctx.createRadialGradient(VW/2, VH/2, VW*0.15, VW/2, VH/2, VW*0.65);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, `rgba(180,0,0,${0.08 + pulse * 0.12})`);
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, VW, VH);
  }

  const prog=Math.min((player.x+player.w)/LEVEL_W,1);
  ctx.fillStyle='rgba(0,0,0,.5)';
  ctx.fillRect(0,0,VW,3);
  ctx.fillStyle='#f5c842';
  ctx.fillRect(0,0,VW*prog,3);
}

function drawPauseOverlay(now){
  draw(now);
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(0,0,VW,VH);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 16px monospace';
  ctx.fillStyle='#000'; ctx.fillText('PAUSED',VW/2+2,VH/2-10+2);
  ctx.fillStyle='#f5c842'; ctx.fillText('PAUSED',VW/2,VH/2-10);
  ctx.font='bold 7px monospace';
  ctx.fillStyle='#aaa'; ctx.fillText('PRESS ESC TO RESUME',VW/2,VH/2+10);
}

// ═══════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════
function loop(now){
  if (paused) { requestAnimationFrame(loop); return; }
  const dt=Math.min((now-lastT)/1000,.05);
  lastT=now;
  update(dt,now); draw(now);
  requestAnimationFrame(loop);
}

function togglePause() {
  if (document.getElementById('win').style.display === 'flex') return;
  if (document.getElementById('gameover').style.display === 'flex') return;
  paused = !paused;
  document.getElementById('pause').style.display = paused ? 'flex' : 'none';
  if (!paused) { lastT = performance.now(); }
}

function resumeGame() {
  paused = false;
  document.getElementById('pause').style.display = 'none';
  lastT = performance.now();
}

// ═══════════════════════════════════════════════════
//  STATS & RESULTS SCREENS
// ═══════════════════════════════════════════════════
function getGameStats() {
  const now = performance.now();
  const elapsed = (now - gameStartTime) / 1000;
  const minutes = Math.floor(elapsed / 60);
  const seconds = Math.floor(elapsed % 60);
  const timePlayed = `${minutes}:${seconds.toString().padStart(2, '0')}`;

  const coinPercentage = totalCoins > 0 ? (coinsCollected / totalCoins) : 0;
  let grade = 'D';
  if (bossDefeated) {
    if (coinPercentage >= 1.0 && score > 3000) {
      grade = 'S';
    } else if (coinPercentage >= 0.75) {
      grade = 'A';
    } else if (coinPercentage >= 0.5) {
      grade = 'B';
    } else {
      grade = 'C';
    }
  }

  return {
    score: score,
    coinsCollected: coinsCollected,
    totalCoins: totalCoins,
    enemiesStomped: enemiesStomped,
    totalEnemies: OFFICE.length - 1,
    timePlayed: timePlayed,
    bossDefeated: bossDefeated,
    grade: grade
  };
}

function showWinStats() {
  const stats = getGameStats();
  const elapsed = (performance.now() - gameStartTime) / 1000;
  const timeBonus = Math.max(0, Math.floor(5000 - elapsed * 8));
  score += timeBonus;
  saveHighScore(score);
  const hs = loadHighScore();
  const isNew = score >= hs;
  const el = document.getElementById('win-stats');
  el.innerHTML = `
    <div style="margin:12px 0;font-size:clamp(8px,2vw,11px);color:#ccc;line-height:2.2;">
      SCORE: <span style="color:#f5c842">${score}</span><br>
      ${timeBonus > 0 ? `TIME BONUS: <span style="color:#44ff88">+${timeBonus}</span><br>` : ''}
      COINS: <span style="color:#f5c842">${stats.coinsCollected} / ${stats.totalCoins}</span><br>
      ENEMIES STOMPED: <span style="color:#f5c842">${stats.enemiesStomped} / ${stats.totalEnemies}</span><br>
      TIME: <span style="color:#f5c842">${stats.timePlayed}</span><br>
      BEST: <span style="color:${isNew?'#ffdd00':'#aaa'}">${hs}${isNew?' ★ NEW!':''}</span><br>
      <span style="font-size:clamp(14px,3vw,20px);color:${stats.grade==='S'?'#ffdd00':stats.grade==='A'?'#44ff44':'#ccc'}">
        GRADE: ${stats.grade}
      </span>
    </div>`;
}

function showGameOverStats() {
  const stats = getGameStats();
  saveHighScore(stats.score);
  const hs = loadHighScore();
  const el = document.getElementById('gameover-stats');
  el.innerHTML = `
    <div style="margin:12px 0;font-size:clamp(8px,2vw,11px);color:#ccc;line-height:2.2;">
      SCORE: <span style="color:#f5c842">${stats.score}</span><br>
      BEST: <span style="color:#aaa">${hs}</span><br>
      COINS: <span style="color:#f5c842">${stats.coinsCollected} / ${stats.totalCoins}</span><br>
      ENEMIES STOMPED: <span style="color:#f5c842">${stats.enemiesStomped} / ${stats.totalEnemies}</span><br>
      TIME: <span style="color:#f5c842">${stats.timePlayed}</span><br>
      <span style="font-size:clamp(12px,2.5vw,16px);color:#ff6666;">
        Better luck next time!
      </span>
    </div>`;
}

function restartGame() {
  paused = false;
  document.getElementById('pause').style.display = 'none';
  document.getElementById('win').style.display = 'none';
  document.getElementById('gameover').style.display = 'none';
  initState();
  lastT = performance.now();
}

function toggleMute() {
  musicMuted = !musicMuted;
  const btn = document.getElementById('mute-btn');
  if (musicMuted) {
    if (typeof stopMusic === 'function') stopMusic();
    btn.textContent = '🔇 MUSIC: OFF';
  } else {
    bgMusic();
    btn.textContent = '🔊 MUSIC: ON';

function fadeTransition(callback) {
  const el = document.getElementById('transition');
  el.style.opacity = '1';
  setTimeout(() => {
    callback();
    el.style.opacity = '0';
  }, 400);
}

function setupControls(){
  [['btn-left','left'],['btn-right','right']].forEach(([id,dir])=>{

    const on =e=>{e.preventDefault();mctrl[dir]=true; el.classList.add('on');};

    el.addEventListener('touchstart',on,{passive:false});
    el.addEventListener('touchend',off,{passive:false});
    el.addEventListener('touchcancel',off,{passive:false});
    el.addEventListener('mousedown',on);
    el.addEventListener('mouseup',off);
    el.addEventListener('mouseleave',off);
  });
  const jb=document.getElementById('btn-jump');
  const jon =e=>{e.preventDefault();mctrl.jump=true; jb.classList.add('on');};
  const joff=e=>{e.preventDefault();mctrl.jump=false;jb.classList.remove('on');};
  jb.addEventListener('touchstart',jon,{passive:false});
  jb.addEventListener('touchend',joff,{passive:false});
  jb.addEventListener('touchcancel',joff,{passive:false});
  jb.addEventListener('mousedown',jon);
  jb.addEventListener('mouseup',joff);
  jb.addEventListener('mouseleave',joff);
  const ab=document.getElementById('btn-ability');
  const aon =e=>{e.preventDefault();mctrl.ability=true; ab.classList.add('on');};
  const aoff=e=>{e.preventDefault();mctrl.ability=false;ab.classList.remove('on');};
  ab.addEventListener('touchstart',aon,{passive:false});
  ab.addEventListener('touchend',aoff,{passive:false});
  ab.addEventListener('touchcancel',aoff,{passive:false});
  ab.addEventListener('mousedown',aon);
  ab.addEventListener('mouseup',aoff);

function haptic(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function setupSwipe() {
  let sx = 0, sy = 0;
  const gc = document.getElementById('gc');
  gc.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, { passive: true });
  gc.addEventListener('touchmove', e => {
    if (e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - sx;
    if (Math.abs(dx) > 25) {
      mctrl.left  = dx < 0;
      mctrl.right = dx > 0;
    }
  }, { passive: true });
  gc.addEventListener('touchend', e => {
    const touch = e.changedTouches[0];
    const dx = touch.clientX - sx;
    const dy = touch.clientY - sy;
    if (dy < -30 && Math.abs(dx) < 60) {
      mctrl.jump = true;
      setTimeout(() => { mctrl.jump = false; }, 120);
    }
    mctrl.left = false;
    mctrl.right = false;
  }, { passive: true });
}

function drawCharacterPreview(canvas, family) {
  const ctx = canvas.getContext('2d');
  canvas.width = 32;
  canvas.height = 44;
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, 0, 32, 44);

  const pw = 22, ph = 30;
  const x = 32/2 - pw/2;
  const y = 44/2 - ph/2;

  const charData = {
    name: family.name,
    color: family.color,
    skin: family.skin,
    hair: family.hair,
    cls: family.cls
  };

  drawCharSprite(ctx, x, y, pw, ph, charData, 0, {
    facing: 1,
    bob: 0,
    isEnemy: false,
    invTimer: 0,
    powerUp: null
  });
}

// ═══════════════════════════════════════════════════
//  ANIMATED TITLE SCREEN
// ═══════════════════════════════════════════════════
let titleCanvas, titleCtx, charSelectCanvas, charSelectCtx;
let titleAnimId = null;
let charSelectAnimId = null;
let menuStars = [];
let menuParticles = [];
let floatingChars = [];
let titlePulse = 0;
let playBtnHover = false;

const TITLE_W = 640, TITLE_H = 360;

function initTitleScreen() {
  titleCanvas = document.getElementById('title-canvas');
  titleCtx = titleCanvas.getContext('2d');
  titleCanvas.width = TITLE_W;
  titleCanvas.height = TITLE_H;

  // Create deep starfield (3 layers for parallax)
  menuStars = [];
  for (let i = 0; i < 200; i++) {
    menuStars.push({
      x: Math.random() * TITLE_W,
      y: Math.random() * TITLE_H,
      r: Math.random() * 1.8 + 0.3,
      speed: Math.random() * 0.3 + 0.05,
      twinkle: Math.random() * 6.28,
      layer: Math.floor(Math.random() * 3),
      bright: Math.random() < 0.1,
    });
  }

  // Floating family characters that drift across the screen
  floatingChars = OFFICE.map((f, i) => ({
    x: Math.random() * TITLE_W,
    y: TITLE_H * 0.55 + Math.random() * TITLE_H * 0.3,
    vx: (Math.random() - 0.5) * 20 + (i % 2 === 0 ? 8 : -8),
    bobPhase: Math.random() * 6.28,
    scale: 1.2 + Math.random() * 0.5,
    data: f,
    facing: i % 2 === 0 ? 1 : -1,
    alpha: 0.4 + Math.random() * 0.3,
  }));

  // Setup click handler for title canvas
  titleCanvas.addEventListener('click', handleTitleClick);
  titleCanvas.addEventListener('mousemove', handleTitleMouseMove);

  titleAnimId = requestAnimationFrame(titleLoop);
}

function getPlayButtonRect() {
  const bw = 160, bh = 36;
  const bx = TITLE_W / 2 - bw / 2;
  const by = TITLE_H * 0.72;
  return { x: bx, y: by, w: bw, h: bh };
}

function handleTitleMouseMove(e) {
  const rect = titleCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const btn = getPlayButtonRect();
  playBtnHover = mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;
  titleCanvas.style.cursor = playBtnHover ? 'pointer' : 'default';
}

function handleTitleClick(e) {
  const rect = titleCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const btn = getPlayButtonRect();
  if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
    // Skip char select — player is always the intern architect
    selectedChar = INTERN;
    fadeTransition(() => {
      stopTitleLoop();
      document.getElementById('title').style.display = 'none';
      startGame();
    });
  }
}

function titleLoop(now) {
  titlePulse = now;
  const tc = titleCtx;

  // === BACKGROUND: Dark blue-gray office-at-night gradient ===
  const bg = tc.createLinearGradient(0, 0, 0, TITLE_H);
  bg.addColorStop(0, '#0a0f1a');
  bg.addColorStop(0.25, '#1a2535');
  bg.addColorStop(0.5, '#2a3545');
  bg.addColorStop(0.75, '#1a2535');
  bg.addColorStop(1, '#1a2030');
  tc.fillStyle = bg;
  tc.fillRect(0, 0, TITLE_W, TITLE_H);

  // Background lights intentionally removed from the start menu for a calmer screen.
  // (Former fluorescent ceiling lights and lit-window skyline lived here.)

  // === PAPER AIRPLANE PARTICLES (occasional) ===
  if (Math.random() < 0.003) {
    menuParticles.push({
      x: Math.random() * TITLE_W * 0.8 + TITLE_W * 0.1,
      y: Math.random() * TITLE_H * 0.4,
      vx: -200 - Math.random() * 150,
      vy: 80 + Math.random() * 60,
      life: 0.5 + Math.random() * 0.3,
      maxLife: 0.8,
      type: 'paperplane',
      rotation: Math.random() * 6.28,
    });
  }

  // === STICKY-NOTE PARTICLES (drifting office supplies) ===
  if (Math.random() < 0.08) {
    const colors = ['255,255,180', '255,200,150', '200,220,255', '200,255,180'];
    const hexColors = ['#ffff99', '#ffc899', '#c8dcff', '#c8ffb3'];
    const colorIdx = Math.floor(Math.random() * colors.length);
    menuParticles.push({
      x: Math.random() * TITLE_W,
      y: TITLE_H + 5,
      vx: (Math.random() - 0.5) * 15,
      vy: -20 - Math.random() * 30,
      life: 2 + Math.random() * 2,
      maxLife: 4,
      type: 'stickynote',
      color: colors[colorIdx],
      hexColor: hexColors[colorIdx],
      size: 8 + Math.random() * 4,
      rotation: Math.random() * 0.3 - 0.15,
    });
  }

  // Update & draw particles
  menuParticles = menuParticles.filter(p => {
    p.x += p.vx * 0.016;
    p.y += p.vy * 0.016;
    p.life -= 0.016;
    if (p.life <= 0) return false;

    const alpha = Math.min(p.life / (p.maxLife * 0.3), 1);
    if (p.type === 'paperplane') {
      // Paper airplane particle (small triangles)
      tc.save();
      tc.translate(p.x, p.y);
      tc.rotate(p.rotation + p.vx * 0.001);
      tc.fillStyle = `rgba(240,240,240,${alpha * 0.8})`;
      tc.beginPath();
      tc.moveTo(0, -4);
      tc.lineTo(-3, 4);
      tc.lineTo(3, 4);
      tc.closePath();
      tc.fill();
      tc.restore();
    } else if (p.type === 'stickynote') {
      // Sticky note particle (small colored rectangles)
      tc.save();
      tc.translate(p.x, p.y);
      tc.rotate(p.rotation + Math.sin(now * 0.003 + p.x * 0.01) * 0.05);

      // Glow effect
      const noteGlow = tc.createRadialGradient(0, 0, 0, 0, 0, p.size * 1.5);
      noteGlow.addColorStop(0, `rgba(${p.color},${alpha * 0.5})`);
      noteGlow.addColorStop(1, `rgba(${p.color},0)`);
      tc.fillStyle = noteGlow;
      tc.beginPath(); tc.arc(0, 0, p.size * 1.5, 0, 6.28); tc.fill();

      // Main note rectangle
      tc.fillStyle = p.hexColor;
      tc.globalAlpha = alpha * 0.9;
      tc.fillRect(-p.size/2, -p.size/2, p.size, p.size);

      // Subtle shadow line (crease)
      tc.globalAlpha = alpha * 0.3;
      tc.fillStyle = 'rgba(0,0,0,1)';
      tc.fillRect(-p.size/2, -p.size/2 + 2, p.size, 1);

      tc.restore();
    }
    return true;
  });
  if (menuParticles.length > 80) menuParticles = menuParticles.slice(-80);

  // === FLOATING FAMILY CHARACTERS ===
  floatingChars.forEach(fc => {
    fc.x += fc.vx * 0.016;
    fc.bobPhase += 0.02;
    if (fc.x > TITLE_W + 40) { fc.x = -30; fc.y = TITLE_H * 0.55 + Math.random() * TITLE_H * 0.3; }
    if (fc.x < -40) { fc.x = TITLE_W + 30; fc.y = TITLE_H * 0.55 + Math.random() * TITLE_H * 0.3; }

    const bob = Math.sin(fc.bobPhase) * 4;
    const pw = 22 * fc.scale;
    const ph = 30 * fc.scale;

    tc.save();
    tc.globalAlpha = fc.alpha;

    // Painterly soft glow with multiple layers
    const glowOuter = tc.createRadialGradient(fc.x, fc.y + ph/2 + bob, 0, fc.x, fc.y + ph/2 + bob, pw * 2.5);
    glowOuter.addColorStop(0, `rgba(245,200,66,0.08)`);
    glowOuter.addColorStop(1, `rgba(245,200,66,0)`);
    tc.fillStyle = glowOuter;
    tc.beginPath(); tc.arc(fc.x, fc.y + ph/2 + bob, pw * 2.5, 0, 6.28); tc.fill();

    const glowInner = tc.createRadialGradient(fc.x, fc.y + ph/2 + bob, 0, fc.x, fc.y + ph/2 + bob, pw * 1.3);
    glowInner.addColorStop(0, `rgba(245,200,66,0.15)`);
    glowInner.addColorStop(1, `rgba(245,200,66,0)`);
    tc.fillStyle = glowInner;
    tc.beginPath(); tc.arc(fc.x, fc.y + ph/2 + bob, pw * 1.3, 0, 6.28); tc.fill();

    tc.save();
    tc.translate(fc.x - pw/2, fc.y + bob);
    tc.scale(fc.scale, fc.scale);
    tc.translate(-(fc.x - pw/2), -(fc.y + bob));
    drawCharSprite(tc, fc.x - pw/2, fc.y + bob, 22, 30, fc.data, now, {
      facing: fc.facing, bob: 0, isEnemy: false, invTimer: 0, powerUp: null
    });
    tc.restore();

    tc.font = 'bold 9px monospace';
    tc.textAlign = 'center';
    tc.fillStyle = `rgba(245,200,66,${fc.alpha * 0.9})`;
    // Soft text shadow for painterly effect
    tc.globalAlpha = fc.alpha * 0.5;
    tc.fillStyle = 'rgba(0,0,0,0.6)';
    tc.fillText(fc.data.name, fc.x + 1, fc.y + ph + bob + 13);
    tc.globalAlpha = fc.alpha;
    tc.fillStyle = `rgba(245,200,66,${fc.alpha * 0.9})`;
    tc.fillText(fc.data.name, fc.x, fc.y + ph + bob + 12);

    tc.restore();
  });

  // === GROUND SILHOUETTE (painterly waves) ===
  const groundGrad = tc.createLinearGradient(0, TITLE_H - 50, 0, TITLE_H);
  groundGrad.addColorStop(0, 'rgba(15,10,20,0.2)');
  groundGrad.addColorStop(1, 'rgba(0,0,0,0.8)');
  tc.fillStyle = groundGrad;
  tc.beginPath();
  tc.moveTo(0, TITLE_H);
  for (let gx = 0; gx <= TITLE_W; gx += 6) {
    const gh = Math.sin(gx * 0.025) * 10 + Math.sin(gx * 0.05 + now * 0.0005) * 6 + 20;
    tc.lineTo(gx, TITLE_H - gh);
  }
  tc.lineTo(TITLE_W, TITLE_H);
  tc.closePath();
  tc.fill();

  // === TITLE TEXT: "PERFORMANCE REVIEW" (painterly style) ===
  const titleY = TITLE_H * 0.2;
  const pulse = (Math.sin(now * 0.003) + 1) / 2;
  const bigPulse = (Math.sin(now * 0.001) + 1) / 2;

  // Large outer glow for title
  const titleGlow = tc.createRadialGradient(TITLE_W/2, titleY + 20, 30, TITLE_W/2, titleY + 20, 280);

  grad1.addColorStop(0.3, '#ffe066');
  grad1.addColorStop(0.5, '#f5c842');

  grad1.addColorStop(1, '#cc8800');

  const grad2 = tc.createLinearGradient(0, famY - 30, 0, famY + 30);
  grad2.addColorStop(0, '#ffee99');
  grad2.addColorStop(0.3, '#ffe066');
  grad2.addColorStop(0.5, '#f5c842');
  grad2.addColorStop(0.7, '#e8a832');
  grad2.addColorStop(1, '#cc8800');
  tc.fillStyle = grad2;
  tc.fillText('REVIEW', TITLE_W/2, famY);

  tc.fillStyle = `rgba(255,255,220,${0.2 + pulse * 0.12})`;
  tc.fillText('REVIEW', TITLE_W/2, famY - 1);

  const lineY = famY + 35;
  const lineW = 240 + pulse * 40;
  const lineGrad = tc.createLinearGradient(TITLE_W/2 - lineW/2, 0, TITLE_W/2 + lineW/2, 0);
  lineGrad.addColorStop(0, 'rgba(245,200,66,0)');
  lineGrad.addColorStop(0.2, 'rgba(255,220,100,0.5)');
  lineGrad.addColorStop(0.5, 'rgba(245,200,66,1)');
  lineGrad.addColorStop(0.8, 'rgba(255,220,100,0.5)');
  lineGrad.addColorStop(1, 'rgba(245,200,66,0)');
  tc.fillStyle = lineGrad;
  tc.fillRect(TITLE_W/2 - lineW/2, lineY, lineW, 3);

  // Soft glow above line
  const lineGlowGrad = tc.createLinearGradient(0, lineY - 10, 0, lineY + 10);
  lineGlowGrad.addColorStop(0, 'rgba(245,200,66,0)');
  lineGlowGrad.addColorStop(0.5, `rgba(245,200,66,${0.08 + pulse * 0.05})`);
  lineGlowGrad.addColorStop(1, 'rgba(245,200,66,0)');
  tc.fillStyle = lineGlowGrad;
  tc.fillRect(TITLE_W/2 - lineW/2, lineY - 10, lineW, 20);

  tc.font = '11px monospace';
  tc.fillStyle = `rgba(200,210,220,${0.6 + pulse * 0.3})`;
  tc.fillText('A side-scrolling adventure! Stomp enemies! Collect coins!', TITLE_W/2, lineY + 22);

  // === PLAY BUTTON (painterly rounded style) ===
  const btn = getPlayButtonRect();
  const btnPulse = (Math.sin(now * 0.005) + 1) / 2;
  const btnScale = playBtnHover ? 1.1 : 1.0;

  tc.save();
  tc.translate(btn.x + btn.w/2, btn.y + btn.h/2);
  tc.scale(btnScale, btnScale);
  tc.translate(-(btn.x + btn.w/2), -(btn.y + btn.h/2));

  // Large soft outer glow
  const btnGlowOuter = tc.createRadialGradient(btn.x + btn.w/2, btn.y + btn.h/2, 20, btn.x + btn.w/2, btn.y + btn.h/2, 120);
  btnGlowOuter.addColorStop(0, `rgba(255,220,100,${playBtnHover ? 0.2 : 0.08 + btnPulse * 0.08})`);
  btnGlowOuter.addColorStop(0.6, `rgba(245,200,66,${playBtnHover ? 0.1 : 0.03})`);
  btnGlowOuter.addColorStop(1, 'rgba(245,200,66,0)');
  tc.fillStyle = btnGlowOuter;
  tc.beginPath(); tc.arc(btn.x + btn.w/2, btn.y + btn.h/2, 120, 0, 6.28); tc.fill();

  // Rounded button background (shadow)
  tc.fillStyle = 'rgba(0,0,0,0.4)';
  tc.beginPath();
  tc.moveTo(btn.x + 8, btn.y + 4);
  tc.lineTo(btn.x + btn.w - 8, btn.y + 4);
  tc.quadraticCurveTo(btn.x + btn.w + 3, btn.y + 4, btn.x + btn.w + 3, btn.y + btn.h/2);
  tc.quadraticCurveTo(btn.x + btn.w + 3, btn.y + btn.h, btn.x + btn.w - 8, btn.y + btn.h + 2);
  tc.lineTo(btn.x + 8, btn.y + btn.h + 2);
  tc.quadraticCurveTo(btn.x - 3, btn.y + btn.h, btn.x - 3, btn.y + btn.h/2);
  tc.quadraticCurveTo(btn.x - 3, btn.y + 4, btn.x + 8, btn.y + 4);
  tc.fill();

  // Main button with rounded corners
  const btnGrad = tc.createLinearGradient(0, btn.y, 0, btn.y + btn.h);
  btnGrad.addColorStop(0, playBtnHover ? '#fff299' : '#ffef99');
  btnGrad.addColorStop(0.5, playBtnHover ? '#ffe066' : '#f5c842');
  btnGrad.addColorStop(1, playBtnHover ? '#e8a832' : '#d4b234');
  tc.fillStyle = btnGrad;
  tc.beginPath();
  tc.moveTo(btn.x + 8, btn.y);
  tc.lineTo(btn.x + btn.w - 8, btn.y);
  tc.quadraticCurveTo(btn.x + btn.w, btn.y, btn.x + btn.w, btn.y + btn.h/2);
  tc.quadraticCurveTo(btn.x + btn.w, btn.y + btn.h, btn.x + btn.w - 8, btn.y + btn.h);
  tc.lineTo(btn.x + 8, btn.y + btn.h);
  tc.quadraticCurveTo(btn.x, btn.y + btn.h, btn.x, btn.y + btn.h/2);
  tc.quadraticCurveTo(btn.x, btn.y, btn.x + 8, btn.y);
  tc.fill();

  // Highlight on top for depth
  tc.fillStyle = 'rgba(255,255,255,0.3)';
  tc.beginPath();
  tc.moveTo(btn.x + 8, btn.y + 1);
  tc.lineTo(btn.x + btn.w - 8, btn.y + 1);
  tc.quadraticCurveTo(btn.x + btn.w - 1, btn.y + 1, btn.x + btn.w - 1, btn.y + btn.h/3);
  tc.lineTo(btn.x + 1, btn.y + btn.h/3);
  tc.quadraticCurveTo(btn.x + 1, btn.y + 1, btn.x + 8, btn.y + 1);
  tc.fill();

  // Soft border
  tc.strokeStyle = playBtnHover ? 'rgba(180,100,0,0.6)' : 'rgba(150,90,0,0.4)';
  tc.lineWidth = 2.5;
  tc.lineCap = 'round';
  tc.lineJoin = 'round';
  tc.beginPath();
  tc.moveTo(btn.x + 8, btn.y);
  tc.lineTo(btn.x + btn.w - 8, btn.y);
  tc.quadraticCurveTo(btn.x + btn.w, btn.y, btn.x + btn.w, btn.y + btn.h/2);
  tc.quadraticCurveTo(btn.x + btn.w, btn.y + btn.h, btn.x + btn.w - 8, btn.y + btn.h);
  tc.lineTo(btn.x + 8, btn.y + btn.h);
  tc.quadraticCurveTo(btn.x, btn.y + btn.h, btn.x, btn.y + btn.h/2);
  tc.quadraticCurveTo(btn.x, btn.y, btn.x + 8, btn.y);
  tc.stroke();

  tc.font = 'bold 18px monospace';
  tc.textAlign = 'center';
  tc.textBaseline = 'middle';

  // Text shadow
  tc.fillStyle = 'rgba(0,0,0,0.4)';
  tc.fillText('P L A Y', btn.x + btn.w/2 + 1.5, btn.y + btn.h/2 + 1.5);

  // Main text with subtle gradient
  const textGrad = tc.createLinearGradient(btn.x, btn.y, btn.x, btn.y + btn.h);
  textGrad.addColorStop(0, '#4a2a00');
  textGrad.addColorStop(1, '#2a1600');
  tc.fillStyle = textGrad;
  tc.fillText('P L A Y', btn.x + btn.w/2, btn.y + btn.h/2);

  tc.restore();

  // === VERSION/CREDIT ===
  tc.font = '8px monospace';
  tc.textAlign = 'center';
  tc.fillStyle = 'rgba(150,150,150,0.35)';
  tc.fillText('v1.0 // ARROW KEYS + SPACE', TITLE_W/2, TITLE_H - 12);

  titleAnimId = requestAnimationFrame(titleLoop);
}

function stopTitleLoop() {
  if (titleAnimId) { cancelAnimationFrame(titleAnimId); titleAnimId = null; }
  if (titleCanvas) {
    titleCanvas.removeEventListener('click', handleTitleClick);
    titleCanvas.removeEventListener('mousemove', handleTitleMouseMove);
  }
}
