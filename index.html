function drawEnemy(enemy, now){
  const sx = enemy.x - camX;
  if(sx < -40 || sx > VW + 40) return;

  const pw = enemy.w, ph = enemy.h;
  const foot = enemy.y;
  const ty = foot - ph;
  const bob = Math.sin(now * 0.003 + enemy.bobPhi) * 0.8;
  const b = bob;
  const isRight = enemy.facing > 0;

  // Handle flash timer for damaged warriors
  if (enemy.flashTimer) {
    enemy.flashTimer -= 0.016;  // Rough dt estimate for drawing
  }
  let flashAlpha = 0;
  if (enemy.flashTimer && enemy.flashTimer > 0) {
    flashAlpha = (enemy.flashTimer / 0.2) * 0.4;
  }

  // Draw character sprite
  const charData = {
    name: enemy.name,
    color: enemy.color,
    skin: enemy.skin,
    hair: enemy.hair,
    cls: enemy.cls
  };

  drawCharSprite(ctx, sx - pw/2, ty, pw, ph, charData, now, {
    facing: isRight ? 1 : -1,
    bob: b,
    isEnemy: true,
    frame: enemy.frame,
  });

  // Draw white flash overlay for damaged warriors
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(sx - pw/2, ty, pw, ph);
  }

  ctx.font='bold 6px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(0,0,0,.65)';
  ctx.fillText(enemy.name, sx+1, ty+b+1);
  ctx.fillStyle='#cc3333';
  ctx.fillText(enemy.name, sx, ty+b);

  // Show HP for warrior tanks
  if (enemy.behavior === 'tank' && enemy.hp) {
    ctx.fillStyle = enemy.hp === 2 ? '#ffdd00' : '#ff4444';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`HP:${enemy.hp}`, sx, ty + b - 14);
  }

  ctx.fillStyle='#cc3333';
  ctx.font='bold 10px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.fillText('!', sx, ty+b-8);
}

function drawPlayer(now){
  const p=player;
  const sx=p.x-camX;
  const pw=p.w, ph=p.h;
  const y=p.y;
  const isRight = p.vx>=0;
  const bob = p.onGround && Math.abs(p.vx) > 10
    ? Math.sin(now * 0.018) * 1.5   // walking bob
    : p.onGround
      ? Math.sin(now * 0.002) * 0.4 // idle breathe
      : 0;
  const b=bob;
  const isInvincible = p.invTimer > 0;
  const flashOn = Math.sin(now * 0.02) > 0;

  if (isInvincible && !flashOn) {
    ctx.globalAlpha = 0.5;
  }

  if (p.powerUp === 'shield') {
    ctx.fillStyle = '#ffdd0044';
    ctx.beginPath();
    ctx.arc(sx+pw/2, y+ph/2+b, pw*1.5, 0, 6.28);
    ctx.fill();
    ctx.strokeStyle = '#ffdd00';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Apply squash/stretch
  ctx.save();
  const sqCx = sx + pw/2;
  const sqCy = y + ph;
  ctx.translate(sqCx, sqCy);
  ctx.scale(playerSquash.sx, playerSquash.sy);
  ctx.translate(-sqCx, -sqCy);

  // Speed trail effect
  if (p.powerUp === 'speed' && Math.abs(p.vx) > 80) {
    const dir = p.vx > 0 ? -1 : 1;
    for (let i = 1; i <= 3; i++) {
      ctx.globalAlpha = 0.15 / i;
      const trailData = {
        name: p.charName, color: p.charColor,
        skin: p.charSkin, hair: p.charHair, cls: p.charCls
      };
      drawCharSprite(ctx, sx - pw/2 + dir * i * 8, y, pw, ph, trailData, now, {
        facing: isRight ? 1 : -1, bob: b, isEnemy: false, invTimer: 0, powerUp: null
      });
    }
    ctx.globalAlpha = isInvincible && !flashOn ? 0.5 : 1;
  }

  // Draw character sprite using shared function
  const charData = {
    name: p.charName,
    color: p.charColor,
    skin: p.charSkin,
    hair: p.charHair,
    cls: p.charCls
  };

  drawCharSprite(ctx, sx - pw/2, y, pw, ph, charData, now, {
    facing: isRight ? 1 : -1,
    walking: p.onGround && Math.abs(p.vx) > 10,
    jumping: !p.onGround,
    frame: p.frame,
    bob: b,
    isEnemy: false,
    invTimer: p.invTimer,
    powerUp: p.powerUp
  });

  ctx.globalAlpha = 1;
  ctx.restore(); // end squash/stretch

  ctx.font='bold 6px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.fillText(p.charName,sx+pw/2+1,y+b+1);
  ctx.fillStyle='#fff';
  ctx.fillText(p.charName,sx+pw/2,y+b);
}

function drawBoss(now) {
  if (!boss || boss.y < -100) return;

  const sx = boss.x - camX;
  const sy = boss.y;

  if (sx < -100 || sx > VW + 100) return;

  // Draw boss health bar above
  const hpBarWidth = 60;
  const hpBarHeight = 4;
  const hpBarX = sx - hpBarWidth / 2;
  const hpBarY = sy - boss.h - 15;

  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(hpBarX - 1, hpBarY - 1, hpBarWidth + 2, hpBarHeight + 2);
  ctx.fillStyle = '#ff2222';
  ctx.fillRect(hpBarX, hpBarY, hpBarWidth * Math.max(0, boss.hp / boss.maxHp), hpBarHeight);
  ctx.strokeStyle = '#ffff00';
  ctx.lineWidth = 1;
  ctx.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);

  // Draw boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('CHARLA', sx, hpBarY - 2);

  // Flash white when invulnerable
  const isFlashing = boss.invTimer > 0;
  const flashOn = Math.floor(boss.invTimer * 20) % 2 === 0;
  ctx.globalAlpha = isFlashing && !flashOn ? 0.5 : 1;

  // Draw dragon body (purple/red)
  const bodyColor = isFlashing && flashOn ? '#ffffff' : '#663399';

  // Main body (oval)
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(sx, sy - 15, 35, 25, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(sx + 30, sy - 20, 18, 16, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Neck bulge
  ctx.beginPath();
  ctx.ellipse(sx + 15, sy - 18, 12, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (glowing)
  const eyeColor = isFlashing && flashOn ? '#ffff00' : '#ffcc00';
  ctx.fillStyle = eyeColor;
  ctx.beginPath();
  ctx.arc(sx + 36, sy - 24, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(sx + 36, sy - 24, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();

  // Second eye
  ctx.fillStyle = eyeColor;
  ctx.beginPath();
  ctx.arc(sx + 38, sy - 12, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(sx + 38, sy - 12, 2, 0, Math.PI * 2);
  ctx.fill();

  // Wings (flapping motion)
  const wingAngle = Math.sin(now / 300) * 0.3;
  ctx.fillStyle = '#885599';

  // Left wing
  ctx.save();
  ctx.translate(sx - 5, sy - 10);
  ctx.rotate(-0.5 + wingAngle);
  ctx.beginPath();
  ctx.ellipse(0, 0, 20, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Right wing
  ctx.save();
  ctx.translate(sx + 5, sy - 10);
  ctx.rotate(0.5 - wingAngle);
  ctx.beginPath();
  ctx.ellipse(0, 0, 20, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Spiky tail
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx - 35, sy);
  const tailPoints = 4;
  for (let i = 1; i <= tailPoints; i++) {
    const tx = sx - 35 - i * 8;
    const ty = sy + Math.sin(now / 400 + i) * 6 + (i % 2) * 8;
    ctx.lineTo(tx, ty);
  }
  ctx.stroke();

  // Tail spikes
  ctx.fillStyle = bodyColor;
  for (let i = 1; i <= tailPoints; i++) {
    const tx = sx - 35 - i * 8;
    const ty = sy + Math.sin(now / 400 + i) * 6 + (i % 2) * 8;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx - 4, ty - 6);
    ctx.lineTo(tx - 2, ty);
    ctx.closePath();
    ctx.fill();
  }

  // Telegraph visuals
  if (boss.telegraphing) {
    // Pulsing warning aura
    const pulseIntensity = Math.abs(Math.sin(now / 200));
    ctx.fillStyle = `rgba(255, 0, 0, ${0.3 * pulseIntensity})`;
    ctx.beginPath();
    ctx.arc(sx, sy - 15, 55 + pulseIntensity * 10, 0, Math.PI * 2);
    ctx.fill();

    // Bright eye glow
    const brightEyeColor = '#ffff00';
    ctx.fillStyle = brightEyeColor;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(sx + 36, sy - 24, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx + 38, sy - 12, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Attack-specific telegraph visuals
    if (boss.telegraphType === 'divebomb') {
      // Tilt downward for dive
      ctx.save();
      ctx.translate(sx, sy - 15);
      ctx.rotate(0.3);
      ctx.translate(-sx, -(sy - 15));
      ctx.fillStyle = '#ff4444';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.ellipse(sx, sy - 15, 40, 30, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else if (boss.telegraphType === 'firebreath') {
      // Orange glow at mouth for fire breath
      ctx.fillStyle = '#ff8833';
      ctx.globalAlpha = 0.6 + pulseIntensity * 0.3;
      ctx.beginPath();
      ctx.ellipse(sx + 38, sy - 18, 12, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Exclamation marks above boss
    ctx.fillStyle = '#ffff00';
    ctx.globalAlpha = 0.8;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    const exclamationX = sx - 15;
    const exclamationY = sy - boss.h - 25 - Math.sin(now / 300) * 5;
    ctx.fillText('!', exclamationX, exclamationY);
    ctx.fillText('!', sx, exclamationY);
    ctx.fillText('!', sx + 15, exclamationY);
    ctx.globalAlpha = 1;
  }

  ctx.globalAlpha = 1;
}

function drawFlag(now){
  const fx=FLAG.x-camX, fy=FLAG.y;
  if(fx<-20||fx>VW+20) return;

  // Pole
  ctx.fillStyle='#aaa';
  ctx.fillRect(fx-2,fy,4,GROUND_Y-fy);

  // Waving flag with segments
  const wave=Math.sin(now*.008)*4;
  const segmentCount = 5;
  ctx.fillStyle='#f5c842';
  for (let i = 0; i < segmentCount; i++) {
    const t = i / segmentCount;
    const nextT = (i + 1) / segmentCount;
    const y1 = fy + t * 20 + Math.sin(now * 0.008 + t * 2) * 2;
    const y2 = fy + nextT * 20 + Math.sin(now * 0.008 + nextT * 2) * 2;
    const x2 = fx + 2 + (26 * t) + wave * t;
    const x3 = fx + 2 + (26 * nextT) + wave * nextT;
    ctx.beginPath();
    ctx.moveTo(fx+2, y1);
    ctx.lineTo(x2, y1);
    ctx.lineTo(x3, y2);
    ctx.lineTo(fx+2, y2);
    ctx.closePath();
    ctx.fill();
  }

  ctx.fillStyle='#aa7700';
  ctx.font='bold 8px monospace';
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.fillText('★',fx+5,fy+10+wave/2);

  // Base
  ctx.fillStyle='#888';
  ctx.fillRect(fx-6,GROUND_Y-4,16,8);

  // Draw celebration particles
  celebrationParticles.forEach(p => {
    const alpha = p.life / 1.5;
    ctx.fillStyle = `${p.color.slice(0, -1)},${alpha * 0.8})`;
    ctx.fillRect(p.x - camX - 2, p.y - 2, 4, 4);
  });
}

function drawCheckpoints(now) {
  CHECKPOINTS.forEach((cp, idx) => {
    const cx = cp.x - camX;
    const cy = cp.y - 20;

    if (cx < -20 || cx > VW + 20) return;

    const isReached = checkpointsReached[idx];
    const glowAmount = isReached ? (Math.sin(now * 0.008) + 1) / 2 : 0;

    // Pole
    ctx.fillStyle = isReached ? '#daa500' : '#666';
    ctx.fillRect(cx - 1.5, cy, 3, 20);

    // Flag
    ctx.fillStyle = isReached ? '#ffd700' : '#888';
    ctx.fillRect(cx + 2, cy + 2, 12, 8);

    // Checkmark or flag pattern
    if (isReached) {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.beginPath();
      // Checkmark
      ctx.moveTo(cx + 4, cy + 7);
      ctx.lineTo(cx + 6.5, cy + 9);
      ctx.lineTo(cx + 12, cy + 4);
      ctx.stroke();

      // Glow when active
      if (glowAmount > 0) {
        ctx.fillStyle = `rgba(255,215,0,${glowAmount * 0.3})`;
        ctx.beginPath();
        ctx.arc(cx + 8, cy + 6, 8 + glowAmount * 2, 0, 6.28);
        ctx.fill();
      }
    } else {
      // Inactive flag pattern
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx + 2, cy + 2, 12, 8);
    }

    // Base
    ctx.fillStyle = isReached ? '#aa8800' : '#555';
    ctx.fillRect(cx - 4, GROUND_Y - 3, 10, 6);
  });
}

function drawInsultText(it, now) {
  if (!it.text) return;
  const tx = it.x - camX;
  const ty = it.y;

  const alpha = it.timer < 0.3 ? it.timer / 0.3 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;

  const fontSize = it.isFromEnemy ? 8 : 7;
  ctx.font = `bold ${fontSize}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Measure text for bubble sizing
  const textWidth = ctx.measureText(it.text).width;
  const padX = 8, padY = 6;
  const bubbleW = textWidth + padX * 2;
  const bubbleH = fontSize + padY * 2;
  const bubbleX = tx - bubbleW / 2;
  const bubbleY = ty - bubbleH / 2;
  const tailSize = 5;
  const cornerR = 5;

  if (it.isFromEnemy) {
    // White speech bubble with rounded corners
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;

    // Rounded rectangle
    ctx.beginPath();
    ctx.moveTo(bubbleX + cornerR, bubbleY);
    ctx.lineTo(bubbleX + bubbleW - cornerR, bubbleY);
    ctx.arcTo(bubbleX + bubbleW, bubbleY, bubbleX + bubbleW, bubbleY + cornerR, cornerR);
    ctx.lineTo(bubbleX + bubbleW, bubbleY + bubbleH - cornerR);
    ctx.arcTo(bubbleX + bubbleW, bubbleY + bubbleH, bubbleX + bubbleW - cornerR, bubbleY + bubbleH, cornerR);
    ctx.lineTo(bubbleX + bubbleW / 2 + tailSize, bubbleY + bubbleH);
    // Tail pointing down toward NPC
    ctx.lineTo(bubbleX + bubbleW / 2, bubbleY + bubbleH + tailSize);
    ctx.lineTo(bubbleX + bubbleW / 2 - tailSize, bubbleY + bubbleH);
    ctx.lineTo(bubbleX + cornerR, bubbleY + bubbleH);
    ctx.arcTo(bubbleX, bubbleY + bubbleH, bubbleX, bubbleY + bubbleH - cornerR, cornerR);
    ctx.lineTo(bubbleX, bubbleY + cornerR);
    ctx.arcTo(bubbleX, bubbleY, bubbleX + cornerR, bubbleY, cornerR);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Text inside bubble (dark)
    ctx.fillStyle = '#222';
    ctx.fillText(it.text, tx, ty);
  } else {
    // Player hit text — floating red text with outline
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2.5;
    ctx.strokeText(it.text, tx, ty);
    ctx.fillStyle = '#ff4444';
    ctx.fillText(it.text, tx, ty);
  }

  ctx.restore();
}

function drawMagnetArcs(now) {
  if (player.powerUp !== 'magnet') return;
  const px = player.x + player.w/2 - camX;
  const py = player.y + player.h/2;
  coins.forEach(c => {
    if (c.collected) return;
    const cx = c.x - camX;
    const cy = c.y;
    const dist = Math.hypot(px - cx, py - cy);
    if (dist > 80) return;
    const alpha = (1 - dist / 80) * 0.5;
    const pulse = (Math.sin(now * 0.01 + c.x * 0.01) + 1) / 2;
    const mx = (cx + px) / 2 + Math.sin(now * 0.008 + c.x) * 14;
    const my = (cy + py) / 2;
    ctx.strokeStyle = `rgba(255,221,0,${alpha * (0.3 + pulse * 0.4)})`;
    ctx.lineWidth = 0.5 + pulse * 0.8;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.quadraticCurveTo(mx, my, px, py);
    ctx.stroke();
  });
}

function drawDustParticle(d) {
  const dx = d.x - camX;
  const alpha = d.life / 0.35;
  ctx.fillStyle = `rgba(180,160,120,${alpha * 0.6})`;
  ctx.beginPath();
  ctx.arc(dx, d.y, d.size * alpha, 0, 6.28);
  ctx.fill();
}

function drawDeathAnim(da, now) {
  const dx = da.x - camX;
  if (dx < -40 || dx > VW + 40) return;

  const squish = da.squish;
  if (squish <= 0) return;

  ctx.save();
  ctx.globalAlpha = squish;
  ctx.translate(dx, da.y + da.h * (1 - squish));
  ctx.scale(1 + (1 - squish) * 0.8, squish);

  // Draw the squishing character
  const charData = { name: da.name, color: da.color, skin: da.skin, hair: da.hair, cls: da.cls };
  drawCharSprite(ctx, -da.w/2, 0, da.w, da.h, charData, now, {
    facing: 1, bob: 0, isEnemy: true, invTimer: 0, powerUp: null
  });

  // Dizzy stars
  ctx.fillStyle = '#ffdd00';
  const starPhase = now * 0.01;
  for (let i = 0; i < 3; i++) {
    const sx = Math.cos(starPhase + i * 2.09) * 12;
    const sy = Math.sin(starPhase + i * 2.09) * 5 - 8;
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('★', sx, sy);
  }

  ctx.restore();
}

function drawScorePopup(sp) {
  const sx = sp.x - camX;
  const alpha = Math.min(sp.timer / 0.3, 1);

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `bold ${Math.floor(8 * sp.scale)}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,.7)';
  ctx.fillText(sp.text, sx + 1, sp.y + 1);

  // Main text
  ctx.fillStyle = sp.color;
  ctx.fillText(sp.text, sx, sp.y);

  ctx.restore();
}

function drawHealthBar(now) {
  const startX = 6;
  const startY = 8;
  const heartSize = 12;
  const heartGap = 4;
  const numHearts = Math.floor(player.maxHp / 2); // Each heart = 2 HP
  const totalW = numHearts * (heartSize + heartGap) + 8;

  // Background panel
  ctx.fillStyle = 'rgba(0,0,0,.55)';
  ctx.fillRect(startX - 3, startY - 3, totalW, heartSize + 10);
  ctx.strokeStyle = 'rgba(245,200,66,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(startX - 3, startY - 3, totalW, heartSize + 10);

  for (let i = 0; i < numHearts; i++) {
    const hx = startX + i * (heartSize + heartGap);
    const hy = startY;
    // Each heart represents 2 HP
    const heartHP = Math.max(0, Math.min(2, player.hp - i * 2));
    // heartHP: 2 = full, 1 = half, 0 = empty
    const isLastHP = player.hp <= 1 && heartHP > 0;

    // Low-health pulse for last remaining heart
    let scale = 1;
    if (isLastHP) {
      scale = 1 + Math.sin(now * 0.012) * 0.15;
    }

    // Damage flash — recently lost HP from this heart
    const justLost = heartHP < 2 && heartHP >= 0 && i === Math.floor(player.hp / 2) && player.invTimer > 0.5;

    ctx.save();
    const cx = hx + heartSize / 2;
    const cy = hy + heartSize / 2;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);

    if (heartHP === 2) {
      // Full heart glow when low
      if (isLastHP) {
        const glowAlpha = 0.15 + (Math.sin(now * 0.012) + 1) / 2 * 0.15;
        ctx.fillStyle = `rgba(255,50,50,${glowAlpha})`;
        ctx.beginPath(); ctx.arc(cx, cy, heartSize * 0.9, 0, 6.28); ctx.fill();
      }
      // Full heart
      drawPixelHeart(ctx, hx, hy, heartSize, '#ff3344', '#ff6677', '#cc1122');
    } else if (heartHP === 1) {
      // Half heart: draw empty base, then fill left half
      drawPixelHeart(ctx, hx, hy, heartSize, '#333', '#444', '#222');
      // Clip to left half and draw filled heart over it
      ctx.save();
      ctx.beginPath();
      ctx.rect(hx, hy - 2, heartSize / 2, heartSize + 4);
      ctx.clip();
      if (isLastHP) {
        const glowAlpha = 0.15 + (Math.sin(now * 0.012) + 1) / 2 * 0.15;
        ctx.fillStyle = `rgba(255,50,50,${glowAlpha})`;
        ctx.beginPath(); ctx.arc(cx, cy, heartSize * 0.9, 0, 6.28); ctx.fill();
      }
      drawPixelHeart(ctx, hx, hy, heartSize, '#ff3344', '#ff6677', '#cc1122');
      ctx.restore();
    } else if (justLost) {
      // Flashing empty heart (just lost)
      const flash = Math.sin(now * 0.02) > 0;
      if (flash) {
        drawPixelHeart(ctx, hx, hy, heartSize, '#ff333388', '#ff667744', '#cc112244');
      } else {
        drawPixelHeart(ctx, hx, hy, heartSize, '#333', '#444', '#222');
      }
    } else {
      // Empty heart
      drawPixelHeart(ctx, hx, hy, heartSize, '#333', '#444', '#222');
    }

    ctx.restore();
  }

  // Power-up indicator next to hearts
  if (player.powerUp) {
    const puX = startX + player.maxHp * (heartSize + heartGap) + 6;
    const puY = startY;
    const puColors = { shield: '#ffdd00', speed: '#4488ff', magnet: '#cc44ff' };
    const puNames = { shield: 'SHIELD', speed: 'SPEED', magnet: 'MAGNET' };
    const timeLeft = Math.max(0, player.powerUpTimer);
    const blinking = timeLeft < 2 && Math.sin(now * 0.015) > 0;

    if (!blinking || timeLeft >= 2) {
      ctx.fillStyle = 'rgba(0,0,0,.55)';
      const label = puNames[player.powerUp] || '';
      ctx.font = 'bold 7px monospace';
      const tw = ctx.measureText(label).width;
      ctx.fillRect(puX - 2, puY - 2, tw + 22, heartSize + 6);

      // Icon dot
      ctx.fillStyle = puColors[player.powerUp] || '#fff';
      ctx.beginPath(); ctx.arc(puX + 5, puY + heartSize / 2, 4, 0, 6.28); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(puX + 5, puY + heartSize / 2 - 1, 1.5, 0, 6.28); ctx.fill();

      // Label
      ctx.fillStyle = puColors[player.powerUp] || '#fff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, puX + 12, puY + heartSize / 2 + 1);

      // Timer bar
      const maxTime = player.powerUp === 'shield' ? 5 : player.powerUp === 'speed' ? 6 : 8;
      const barW = tw + 18;
      const barPct = timeLeft / maxTime;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(puX - 1, puY + heartSize + 1, barW, 2);
      ctx.fillStyle = puColors[player.powerUp] || '#fff';
      ctx.fillRect(puX - 1, puY + heartSize + 1, barW * barPct, 2);
    }
  }
}

function drawPixelHeart(ctx, x, y, size, mainColor, highlightColor, shadowColor) {
  const s = size / 12; // scale factor based on 12px base

  // Heart shape using pixel blocks
  // Row 0: two bumps
  ctx.fillStyle = mainColor;
  ctx.fillRect(x + s*2, y, s*2, s);        // left bump top-left
  ctx.fillRect(x + s*8, y, s*2, s);        // right bump top-left

  // Row 1: wider bumps
  ctx.fillRect(x + s*1, y + s*1, s*4, s);  // left bump
  ctx.fillRect(x + s*7, y + s*1, s*4, s);  // right bump

  // Row 2: full width top
  ctx.fillRect(x + s*0, y + s*2, s*12, s);

  // Row 3-4: full width body
  ctx.fillRect(x + s*0, y + s*3, s*12, s);
  ctx.fillRect(x + s*1, y + s*4, s*10, s);

  // Row 5-6: narrowing
  ctx.fillRect(x + s*2, y + s*5, s*8, s);
  ctx.fillRect(x + s*3, y + s*6, s*6, s);

  // Row 7-8: point
  ctx.fillRect(x + s*4, y + s*7, s*4, s);
  ctx.fillRect(x + s*5, y + s*8, s*2, s);

  // Highlight (top-left of each bump)
  ctx.fillStyle = highlightColor;
  ctx.fillRect(x + s*2, y + s*1, s*1, s*1);
  ctx.fillRect(x + s*8, y + s*1, s*1, s*1);
  ctx.fillRect(x + s*1, y + s*2, s*2, s*1);
  ctx.fillRect(x + s*7, y + s*2, s*2, s*1);

  // Shadow (bottom edges)
  ctx.fillStyle = shadowColor;
  ctx.fillRect(x + s*5, y + s*8, s*2, s);
  ctx.fillRect(x + s*4, y + s*7, s*1, s);
  ctx.fillRect(x + s*9, y + s*7, s*1, s*1);
  ctx.fillRect(x + s*3, y + s*6, s*1, s);
  ctx.fillRect(x + s*8, y + s*6, s*1, s);

  // Outline
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(x + s*2, y);
  ctx.lineTo(x + s*4, y);
  ctx.lineTo(x + s*4, y + s*1);
  ctx.lineTo(x + s*5, y + s*1);
  ctx.lineTo(x + s*5, y);
  ctx.lineTo(x + s*7, y);
  ctx.lineTo(x + s*7, y + s*1);
  ctx.lineTo(x + s*8, y + s*1);
  ctx.lineTo(x + s*8, y);
  ctx.lineTo(x + s*10, y);
  ctx.lineTo(x + s*10, y + s*1);
  ctx.lineTo(x + s*11, y + s*1);
  ctx.lineTo(x + s*11, y + s*2);
  ctx.lineTo(x + s*12, y + s*2);
  ctx.lineTo(x + s*12, y + s*4);
  ctx.lineTo(x + s*11, y + s*4);
  ctx.lineTo(x + s*11, y + s*5);
  ctx.lineTo(x + s*10, y + s*5);
  ctx.lineTo(x + s*10, y + s*6);
  ctx.lineTo(x + s*9, y + s*6);
  ctx.lineTo(x + s*9, y + s*7);
  ctx.lineTo(x + s*7, y + s*7);
  ctx.lineTo(x + s*7, y + s*8);
  ctx.lineTo(x + s*5, y + s*8);
  ctx.lineTo(x + s*5, y + s*9);
  ctx.lineTo(x + s*5, y + s*8);
  ctx.lineTo(x + s*5, y + s*7);
  ctx.lineTo(x + s*3, y + s*7);
  ctx.lineTo(x + s*3, y + s*6);
  ctx.lineTo(x + s*2, y + s*6);
  ctx.lineTo(x + s*2, y + s*5);
  ctx.lineTo(x + s*1, y + s*5);
  ctx.lineTo(x + s*1, y + s*4);
  ctx.lineTo(x + s*0, y + s*4);
  ctx.lineTo(x + s*0, y + s*2);
  ctx.lineTo(x + s*1, y + s*2);
  ctx.lineTo(x + s*1, y + s*1);
  ctx.lineTo(x + s*2, y + s*1);
  ctx.closePath();
  ctx.stroke();
}

function drawAbilityCooldown(now) {
  if (player.abilityTimer <= 0) return;

  const cooldownMax = player.charCls === 'warrior' || player.charCls === 'mage' ? 5 : 3;
  const progress = Math.max(0, 1 - player.abilityTimer / cooldownMax);

  const x = 200;
  const y = 12;
  const size = 16;

  // Background
  ctx.fillStyle = 'rgba(0,0,0,.55)';
  ctx.fillRect(x - 2, y - 2, size + 4, size + 4);
  ctx.strokeStyle = 'rgba(100,200,255,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x - 2, y - 2, size + 4, size + 4);

  // Cooldown arc
  ctx.save();
  ctx.translate(x + size/2, y + size/2);
  ctx.strokeStyle = '#64c8ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, size/2 - 2, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * progress);
  ctx.stroke();
  ctx.restore();

  // Icon
  ctx.fillStyle = '#64c8ff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('E', x + size/2, y + size/2);

  if (progress < 1) {
    const timeLeft = Math.ceil(player.abilityTimer);
    ctx.fillStyle = '#64c8ff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(timeLeft, x + size/2, y + size + 2);
  }
}

function drawStompCombo(now) {
  if (stompCombo < 2 || stompComboTimer <= 0) return;
  const alpha = Math.min(stompComboTimer, 1);
  const pulse = (Math.sin(now * 0.015) + 1) / 2;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `bold ${12 + Math.floor(pulse * 3)}px monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';

  // Background
  const text = `COMBO x${stompCombo}`;
  const tw = ctx.measureText(text).width;
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(VW - tw - 14, 8, tw + 10, 20);

  // Text
  ctx.fillStyle = stompCombo >= 4 ? '#ff3333' : stompCombo >= 3 ? '#ff8800' : '#ffdd00';
  ctx.fillText(text, VW - 8, 11);

  ctx.restore();
}

function drawScore(now) {
  const elapsed = (now - gameStartTime) / 1000;
  const mm = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const ss = Math.floor(elapsed % 60).toString().padStart(2, '0');
  const scoreText = `SCORE: ${score}  ${mm}:${ss}`;
  const panelPadding = 8;
  const panelY = 8;

  ctx.save();
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  const panelWidth = ctx.measureText(scoreText).width + panelPadding * 2;
  const panelX = VW - panelWidth - 4;

  ctx.fillStyle = 'rgba(0,0,0,.65)';
  ctx.fillRect(panelX, panelY, panelWidth, 16);
  ctx.strokeStyle = 'rgba(245,200,66,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(panelX, panelY, panelWidth, 16);

  ctx.fillStyle = '#f5c842';
  ctx.fillText(scoreText, panelX + panelPadding, panelY + 4);

  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  PLAYER PROJECTILE DRAWING
// ═══════════════════════════════════════════════════
function drawPlayerProjectile(proj, now) {
  const x = proj.x - camX;
  if (x < -50 || x > VW + 50) return;
  const y = proj.y;

  if (proj.type === 'arrow') {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(proj.vx < 0 ? Math.PI : 0);
    // Arrow shaft
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(-8, -1, 8, 2);
    // Arrow head
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-3, -2);
    ctx.lineTo(-3, 2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  } else if (proj.type === 'shuriken') {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(proj.rotation || 0);
    ctx.fillStyle = '#ff4444';
    for (let i = 0; i < 4; i++) {
      ctx.rotate(Math.PI / 2);
      ctx.fillRect(0, -1, 5, 2);
    }
    ctx.restore();
  } else if (proj.type === 'orb') {
    const glow = Math.sin(now * 0.01) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(100, 150, 255, ${0.3 + glow * 0.3})`;
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, 6.28);
    ctx.fill();
    ctx.fillStyle = '#64a8ff';
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, 6.28);
    ctx.fill();
  } else if (proj.type === 'slash') {
    ctx.save();
    ctx.strokeStyle = '#ffaa44';
    ctx.lineWidth = 3;
    ctx.globalAlpha = 1 - (1 - proj.life / 0.2);
    ctx.beginPath();
    ctx.arc(x, y, 15, -Math.PI / 4, Math.PI / 4);
    ctx.stroke();
    ctx.restore();
  } else if (proj.type === 'afterimage') {
    ctx.save();
    ctx.globalAlpha = proj.alpha || 0.4;
    ctx.fillStyle = '#aaaaff';
    ctx.fillRect(x - 8, y - 10, 16, 16);
    ctx.restore();
  } else if (proj.type === 'shockwave') {
    ctx.save();
    ctx.strokeStyle = '#88ff44';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 1 - (1 - proj.life / 0.3);
    ctx.beginPath();
    ctx.arc(x, y, proj.radius, 0, 6.28);
    ctx.stroke();
    ctx.restore();
  } else if (proj.type === 'shield_bash') {
    ctx.save();
    ctx.fillStyle = '#ffdd44';
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, 6.28);
    ctx.fill();
    ctx.restore();
  }
}

function drawHealthPickup(hp, now) {
  const x = hp.x - camX;
  const y = hp.y;
  if (x < -20 || x > VW + 20) return;

  const pulse = Math.sin(now * 0.008 + (hp.glow || 0)) * 0.2 + 0.8;
  const wobble = Math.sin(now * 0.006 + (hp.glow || 0)) * 2;

  ctx.save();
  ctx.globalAlpha = hp.life / 8;
  ctx.translate(x + wobble, y);
  ctx.scale(pulse, pulse);

  // Glow
  ctx.fillStyle = 'rgba(255, 100, 100, 0.3)';
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, 6.28);
  ctx.fill();

  // Heart
  drawPixelHeart(ctx, -4, -4, 8, '#ff3344', '#ff6677', '#cc1122');

  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  WATER DRAWING
// ═══════════════════════════════════════════════════
function drawWaterPool(pool, now) {
  const rx = pool.x - camX;
  if (rx + pool.w < 0 || rx > VW) return;
  const topY = pool.y - pool.depth; // top surface = GROUND_Y level
  const botY = pool.y;              // bottom = VH

  // Dark water body fills the gap
  const waterGrad = ctx.createLinearGradient(0, topY, 0, botY);
  waterGrad.addColorStop(0, 'rgba(20,60,120,0.7)');
  waterGrad.addColorStop(0.5, 'rgba(15,45,100,0.85)');
  waterGrad.addColorStop(1, 'rgba(10,25,60,0.95)');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(rx, topY, pool.w, pool.depth);

  // Animated wave surface at the top
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(rx, topY + 10);
  for (let wx = 0; wx <= pool.w; wx += 2) {
    const waveH = Math.sin(now * 0.004 + (pool.x + wx) * 0.08) * 2.5
                + Math.sin(now * 0.007 + (pool.x + wx) * 0.12) * 1.5;
    ctx.lineTo(rx + wx, topY + waveH);
  }
  ctx.lineTo(rx + pool.w, topY + 10);
  ctx.closePath();
  ctx.fillStyle = 'rgba(30,100,200,0.5)';
  ctx.fill();

  // Surface highlight shimmer
  for (let wx = 4; wx < pool.w - 4; wx += 12) {
    const waveH = Math.sin(now * 0.004 + (pool.x + wx) * 0.08) * 2.5;
    const shimmer = (Math.sin(now * 0.006 + wx * 0.3) + 1) / 2;
    ctx.fillStyle = `rgba(120,180,255,${0.3 + shimmer * 0.4})`;
    ctx.fillRect(rx + wx, topY + waveH - 1, 6, 1.5);
  }

  // Subtle foam at edges where water meets land
  ctx.fillStyle = 'rgba(180,220,255,0.35)';
  const foamL = Math.sin(now * 0.005) * 1.5;
  ctx.fillRect(rx, topY + foamL, 3, 5);
  ctx.fillRect(rx + pool.w - 3, topY + foamL, 3, 5);

  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  LAVA DRAWING
// ═══════════════════════════════════════════════════
function drawLavaPool(pool, now) {
  const rx = pool.x - camX;
  if (rx + pool.w < 0 || rx > VW) return;
  const topY = pool.y - pool.depth; // top surface = GROUND_Y level
  const botY = pool.y;              // bottom = VH

  // Lava body with glowing gradient fills the gap
  const lavaGrad = ctx.createLinearGradient(0, topY, 0, botY);
  lavaGrad.addColorStop(0, 'rgba(255,120,20,0.9)');
  lavaGrad.addColorStop(0.4, 'rgba(220,60,10,0.95)');
  lavaGrad.addColorStop(0.8, 'rgba(180,30,5,0.95)');
  lavaGrad.addColorStop(1, 'rgba(120,15,0,1)');
  ctx.fillStyle = lavaGrad;
  ctx.fillRect(rx, topY, pool.w, pool.depth);

  // Slow-moving lava surface waves at the top
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(rx, topY + 10);
  for (let lx = 0; lx <= pool.w; lx += 2) {
    const waveH = Math.sin(now * 0.002 + (pool.x + lx) * 0.06) * 3
                + Math.sin(now * 0.003 + (pool.x + lx) * 0.1) * 1.5;
    ctx.lineTo(rx + lx, topY + waveH);
  }
  ctx.lineTo(rx + pool.w, topY + 10);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,160,40,0.6)';
  ctx.fill();

  // Bright hotspots (moving) in the middle of the pool
  for (let lx = 6; lx < pool.w - 6; lx += 14) {
    const phase = now * 0.001 + lx * 0.2;
    const brightness = (Math.sin(phase) + 1) / 2;
    const waveH = Math.sin(now * 0.002 + (pool.x + lx) * 0.06) * 3;
    ctx.fillStyle = `rgba(255,220,80,${0.2 + brightness * 0.5})`;
    ctx.beginPath();
    ctx.arc(rx + lx, topY + pool.depth/2 + waveH, 3 + brightness * 2, 0, 6.28);
    ctx.fill();
  }

  // Glow above lava (heat haze) rising above the surface
  const glowGrad = ctx.createLinearGradient(0, topY - 20, 0, topY);
  glowGrad.addColorStop(0, 'rgba(255,80,0,0)');
  glowGrad.addColorStop(1, 'rgba(255,100,20,0.15)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(rx - 4, topY - 20, pool.w + 8, 20);

  ctx.restore();
}

function drawLavaBubble(b) {
  const bx = b.x - camX;
  const alpha = b.life > 0.3 ? 1 : b.life / 0.3;
  ctx.fillStyle = `rgba(255,200,60,${alpha * 0.8})`;
  ctx.beginPath();
  ctx.arc(bx, b.y, b.size, 0, 6.28);
  ctx.fill();
  ctx.fillStyle = `rgba(255,240,150,${alpha * 0.5})`;
  ctx.beginPath();
  ctx.arc(bx, b.y - b.size * 0.3, b.size * 0.4, 0, 6.28);
  ctx.fill();
}

function drawHeatShimmer(s) {
  const sx = s.x - camX;
  const alpha = s.life > 0.5 ? (1 - (s.life - 0.5) / 0.5) * 0.3 : (s.life / 0.5) * 0.3;
  const wobble = Math.sin(s.life * 12 + s.x) * 3;
  ctx.fillStyle = `rgba(255,150,50,${alpha})`;
  ctx.beginPath();
  ctx.arc(sx + wobble, s.y, s.size, 0, 6.28);
  ctx.fill();
}

function drawWaterSplash(sp) {
  const sx = sp.x - camX;
  const alpha = sp.life / sp.maxLife;
  ctx.fillStyle = `rgba(100,180,255,${alpha * 0.7})`;
  ctx.beginPath();
  ctx.arc(sx, sp.y, sp.size * (1 - alpha * 0.5), 0, 6.28);
  ctx.fill();
  ctx.fillStyle = `rgba(200,230,255,${alpha * 0.4})`;
  ctx.beginPath();
  ctx.arc(sx, sp.y, sp.size * 0.4, 0, 6.28);
  ctx.fill();
}

function drawMsg(now){
  if(!msgText||msgExpiry<now) return;
  ctx.font='bold 7px monospace';
  const lines=msgText.split('\n');
  const lh=12, pad=9;
  const mw=Math.max(...lines.map(l=>ctx.measureText(l).width))+pad*2;
  const mh=lines.length*lh+pad*1.5;
  const bx=VW/2-mw/2, by=VH-mh-8;
  ctx.fillStyle='rgba(0,0,0,.88)';
  ctx.fillRect(bx,by,mw,mh);
  ctx.strokeStyle='#f5c84266';
  ctx.lineWidth=1;
  ctx.strokeRect(bx,by,mw,mh);
  ctx.fillStyle='#f5c842';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  lines.forEach((l,i)=>ctx.fillText(l,VW/2,by+pad+i*lh+lh/2));
}

function showMsg(t,ms){
  msgText=t;
  msgExpiry=performance.now()+ms;
}

// ═══════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════
function draw(now){
  ctx.clearRect(0,0,VW,VH);

  // Apply screen shake
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  drawBG(now);
  PLATFORMS.forEach(p=>drawPlatform(p));
  WATER_POOLS.forEach(wp => drawWaterPool(wp, now));
  LAVA_POOLS.forEach(lp => drawLavaPool(lp, now));
  lavaBubbles.forEach(b => drawLavaBubble(b));
  heatShimmers.forEach(s => drawHeatShimmer(s));
  waterSplashes.forEach(sp => drawWaterSplash(sp));
  coins.forEach(c=>drawCoin(c,now));
  drawMagnetArcs(now);
  PALM_TREES.forEach(pt => drawPalmTree(pt, now));
  dustParticles.forEach(d => drawDustParticle(d));
  sparkles.forEach(s => drawSparkle(s));
  drawCheckpoints(now);
  drawFlag(now);
  deathAnims.forEach(da => drawDeathAnim(da, now));
  enemies.forEach(e=>drawEnemy(e,now));
  drawBoss(now);
  projectiles.forEach(proj => drawProjectile(proj, now));
  playerProjectiles.forEach(proj => drawPlayerProjectile(proj, now));
  healthPickups.forEach(hp => drawHealthPickup(hp, now));
  drawPlayer(now);
  scorePopups.forEach(sp => drawScorePopup(sp));
  insultTexts.forEach(it => drawInsultText(it, now));
  drawMsg(now);

  ctx.restore(); // end screen shake

  // HUD elements drawn outside screen shake
  drawHealthBar(now);
  drawAbilityCooldown(now);
  drawStompCombo(now);
  drawScore(now);

  // Red screen flash overlay
  if (redFlash.timer > 0) {
    const flashAlpha = redFlash.intensity * (redFlash.timer / 0.35);
    ctx.fillStyle = `rgba(200,0,0,${flashAlpha})`;
    ctx.fillRect(0, 0, VW, VH);
    // Vignette-style edge glow for extra impact
    const vigGrad = ctx.createRadialGradient(VW/2, VH/2, VW*0.2, VW/2, VH/2, VW*0.6);
    vigGrad.addColorStop(0, 'rgba(200,0,0,0)');
    vigGrad.addColorStop(1, `rgba(180,0,0,${flashAlpha * 0.6})`);
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, VW, VH);
  }

  // Low-HP pulsing vignette
  if (player.hp <= 2 && player.hp > 0) {
    const pulse = (Math.sin(now * 0.008) + 1) / 2;
    const vig = ctx.createRadialGradient(VW/2, VH/2, VW*0.15, VW/2, VH/2, VW*0.65);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, `rgba(180,0,0,${0.08 + pulse * 0.12})`);
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, VW, VH);
  }

  const prog=Math.min((player.x+player.w)/LEVEL_W,1);
  ctx.fillStyle='rgba(0,0,0,.5)';
  ctx.fillRect(0,0,VW,3);
  ctx.fillStyle='#f5c842';
  ctx.fillRect(0,0,VW*prog,3);
}

function drawPauseOverlay(now){
  draw(now);
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(0,0,VW,VH);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 16px monospace';
  ctx.fillStyle='#000'; ctx.fillText('PAUSED',VW/2+2,VH/2-10+2);
  ctx.fillStyle='#f5c842'; ctx.fillText('PAUSED',VW/2,VH/2-10);
  ctx.font='bold 7px monospace';
  ctx.fillStyle='#aaa'; ctx.fillText('PRESS ESC TO RESUME',VW/2,VH/2+10);
}

function togglePause(){
  isPaused=!isPaused;
}

// ═══════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════
function loop(now){
  if (paused) { requestAnimationFrame(loop); return; }
  const dt=Math.min((now-lastT)/1000,.05);
  lastT=now;
  if(!isPaused){ update(dt,now); draw(now); }
  else { drawPauseOverlay(now); }
  requestAnimationFrame(loop);
}

function getGameStats() {
  const now = performance.now();
  const elapsed = (now - gameStartTime) / 1000;
  const minutes = Math.floor(elapsed / 60);
  const seconds = Math.floor(elapsed % 60);
  const timePlayed = `${minutes}:${seconds.toString().padStart(2, '0')}`;

  const coinPercentage = totalCoins > 0 ? (coinsCollected / totalCoins) : 0;
  let grade = 'D';
  if (bossDefeated) {
    if (coinPercentage >= 1.0 && score > 3000) {
      grade = 'S';
    } else if (coinPercentage >= 0.75) {
      grade = 'A';
    } else if (coinPercentage >= 0.5) {
      grade = 'B';
    } else {
      grade = 'C';
    }
  }

  return {
    score: score,
    coinsCollected: coinsCollected,
    totalCoins: totalCoins,
    enemiesStomped: enemiesStomped,
    totalEnemies: FAMILY.length - 1,
    timePlayed: timePlayed,
    bossDefeated: bossDefeated,
    grade: grade
  };
}

function showWinStats() {
  const stats = getGameStats();
  const elapsed = (performance.now() - gameStartTime) / 1000;
  const timeBonus = Math.max(0, Math.floor(5000 - elapsed * 8));
  score += timeBonus;
  saveHighScore(score);
  const hs = loadHighScore();
  const isNew = score >= hs;
  const el = document.getElementById('win-stats');
  el.innerHTML = `
    <div style="margin:12px 0;font-size:clamp(8px,2vw,11px);color:#ccc;line-height:2.2;">
      SCORE: <span style="color:#f5c842">${score}</span><br>
      ${timeBonus > 0 ? `TIME BONUS: <span style="color:#44ff88">+${timeBonus}</span><br>` : ''}
      COINS: <span style="color:#f5c842">${stats.coinsCollected} / ${stats.totalCoins}</span><br>
      ENEMIES STOMPED: <span style="color:#f5c842">${stats.enemiesStomped} / ${stats.totalEnemies}</span><br>
      TIME: <span style="color:#f5c842">${stats.timePlayed}</span><br>
      BEST: <span style="color:${isNew?'#ffdd00':'#aaa'}">${hs}${isNew?' ★ NEW!':''}</span><br>
      <span style="font-size:clamp(14px,3vw,20px);color:${stats.grade==='S'?'#ffdd00':stats.grade==='A'?'#44ff44':'#ccc'}">
        GRADE: ${stats.grade}
      </span>
    </div>`;
}

function showGameOverStats() {
  const stats = getGameStats();
  saveHighScore(stats.score);
  const hs = loadHighScore();
  const el = document.getElementById('gameover-stats');
  el.innerHTML = `
    <div style="margin:12px 0;font-size:clamp(8px,2vw,11px);color:#ccc;line-height:2.2;">
      SCORE: <span style="color:#f5c842">${stats.score}</span><br>
      BEST: <span style="color:#aaa">${hs}</span><br>
      COINS: <span style="color:#f5c842">${stats.coinsCollected} / ${stats.totalCoins}</span><br>
      ENEMIES STOMPED: <span style="color:#f5c842">${stats.enemiesStomped} / ${stats.totalEnemies}</span><br>
      TIME: <span style="color:#f5c842">${stats.timePlayed}</span><br>
      <span style="font-size:clamp(12px,2.5vw,16px);color:#ff6666;">
        Better luck next time!
      </span>
    </div>`;
}

function haptic(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function setupSwipe() {
  let sx = 0, sy = 0;
  const gc = document.getElementById('gc');
  gc.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, { passive: true });
  gc.addEventListener('touchmove', e => {
    if (e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - sx;
    if (Math.abs(dx) > 25) {
      mctrl.left  = dx < 0;
      mctrl.right = dx > 0;
    }
  }, { passive: true });
  gc.addEventListener('touchend', e => {
    const touch = e.changedTouches[0];
    const dx = touch.clientX - sx;
    const dy = touch.clientY - sy;
    if (dy < -30 && Math.abs(dx) < 60) {
      mctrl.jump = true;
      setTimeout(() => { mctrl.jump = false; }, 120);
    }
    mctrl.left = false;
    mctrl.right = false;
  }, { passive: true });
}

function drawCharacterPreview(canvas, family) {
  const ctx = canvas.getContext('2d');
  canvas.width = 32;
  canvas.height = 44;
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, 0, 32, 44);

  const pw = 22, ph = 30;
  const x = 32/2 - pw/2;
  const y = 44/2 - ph/2;

  const charData = {
    name: family.name,
    color: family.color,
    skin: family.skin,
    hair: family.hair,
    cls: family.cls
  };

  drawCharSprite(ctx, x, y, pw, ph, charData, 0, {
    facing: 1,
    bob: 0,
    isEnemy: false,
    invTimer: 0,
    powerUp: null
  });
}

// ═══════════════════════════════════════════════════
//  ANIMATED TITLE SCREEN
// ═══════════════════════════════════════════════════
let titleCanvas, titleCtx, charSelectCanvas, charSelectCtx;
let titleAnimId = null;
let charSelectAnimId = null;
let menuStars = [];
let menuParticles = [];
let floatingChars = [];
let titlePulse = 0;
let playBtnHover = false;

const TITLE_W = 640, TITLE_H = 360;

function initTitleScreen() {
  titleCanvas = document.getElementById('title-canvas');
  titleCtx = titleCanvas.getContext('2d');
  titleCanvas.width = TITLE_W;
  titleCanvas.height = TITLE_H;

  // Create deep starfield (3 layers for parallax)
  menuStars = [];
  for (let i = 0; i < 200; i++) {
    menuStars.push({
      x: Math.random() * TITLE_W,
      y: Math.random() * TITLE_H,
      r: Math.random() * 1.8 + 0.3,
      speed: Math.random() * 0.3 + 0.05,
      twinkle: Math.random() * 6.28,
      layer: Math.floor(Math.random() * 3),
      bright: Math.random() < 0.1,
    });
  }

  // Floating family characters that drift across the screen
  floatingChars = FAMILY.map((f, i) => ({
    x: Math.random() * TITLE_W,
    y: TITLE_H * 0.55 + Math.random() * TITLE_H * 0.3,
    vx: (Math.random() - 0.5) * 20 + (i % 2 === 0 ? 8 : -8),
    bobPhase: Math.random() * 6.28,
    scale: 1.2 + Math.random() * 0.5,
    data: f,
    facing: i % 2 === 0 ? 1 : -1,
    alpha: 0.4 + Math.random() * 0.3,
  }));

  // Setup click handler for title canvas
  titleCanvas.addEventListener('click', handleTitleClick);
  titleCanvas.addEventListener('mousemove', handleTitleMouseMove);

  titleAnimId = requestAnimationFrame(titleLoop);
}

function getPlayButtonRect() {
  const bw = 160, bh = 36;
  const bx = TITLE_W / 2 - bw / 2;
  const by = TITLE_H * 0.72;
  return { x: bx, y: by, w: bw, h: bh };
}

function handleTitleMouseMove(e) {
  const rect = titleCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const btn = getPlayButtonRect();
  playBtnHover = mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;
  titleCanvas.style.cursor = playBtnHover ? 'pointer' : 'default';
}

function handleTitleClick(e) {
  const rect = titleCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const btn = getPlayButtonRect();
  if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
    goToCharSelect();
  }
}

function titleLoop(now) {
  titlePulse = now;
  const tc = titleCtx;

  // === BACKGROUND: Deep space gradient ===
  const bg = tc.createLinearGradient(0, 0, 0, TITLE_H);
  bg.addColorStop(0, '#050510');
  bg.addColorStop(0.4, '#0a0a2a');
  bg.addColorStop(0.7, '#0f0f35');
  bg.addColorStop(1, '#1a0a2a');
  tc.fillStyle = bg;
  tc.fillRect(0, 0, TITLE_W, TITLE_H);

  // === NEBULA GLOW (soft color blobs) ===
  const nebulaPhase = now * 0.0003;
  [{x:0.25, y:0.35, c:'80,40,120', r:120}, {x:0.7, y:0.25, c:'40,60,140', r:100}, {x:0.5, y:0.7, c:'120,60,30', r:90}].forEach(n => {
    const nx = TITLE_W * n.x + Math.sin(nebulaPhase + n.x * 5) * 30;
    const ny = TITLE_H * n.y + Math.cos(nebulaPhase * 0.7 + n.y * 3) * 20;
    const pulse = (Math.sin(now * 0.001 + n.x * 10) + 1) / 2;
    const grad = tc.createRadialGradient(nx, ny, 0, nx, ny, n.r + pulse * 30);
    grad.addColorStop(0, `rgba(${n.c},${0.06 + pulse * 0.04})`);
    grad.addColorStop(1, `rgba(${n.c},0)`);
    tc.fillStyle = grad;
    tc.fillRect(0, 0, TITLE_W, TITLE_H);
  });

  // === PARALLAX STARFIELD ===
  menuStars.forEach(s => {
    const layerSpeed = [0.3, 0.7, 1.2][s.layer];
    const layerSize = [0.6, 1.0, 1.5][s.layer];
    s.x -= s.speed * layerSpeed;
    if (s.x < -5) s.x = TITLE_W + 5;

    const tw = (Math.sin(now * 0.003 + s.twinkle) + 1) / 2;
    const alpha = 0.2 + tw * 0.6;
    const sz = s.r * layerSize;

    if (s.bright) {
      tc.fillStyle = `rgba(255,255,240,${alpha})`;
      tc.fillRect(s.x - sz * 2, s.y, sz * 4, 1);
      tc.fillRect(s.x, s.y - sz * 2, 1, sz * 4);
      tc.fillStyle = `rgba(255,255,200,${alpha * 0.5})`;
      tc.beginPath(); tc.arc(s.x, s.y, sz * 1.5, 0, 6.28); tc.fill();
    } else {
      tc.fillStyle = `rgba(255,255,240,${alpha})`;
      tc.beginPath(); tc.arc(s.x, s.y, sz, 0, 6.28); tc.fill();
    }
  });

  // === SHOOTING STARS (occasional) ===
  if (Math.random() < 0.003) {
    menuParticles.push({
      x: Math.random() * TITLE_W * 0.8 + TITLE_W * 0.1,
      y: Math.random() * TITLE_H * 0.4,
      vx: -200 - Math.random() * 150,
      vy: 80 + Math.random() * 60,
      life: 0.5 + Math.random() * 0.3,
      maxLife: 0.8,
      type: 'shooting',
    });
  }

  // === AMBIENT FLOATING PARTICLES ===
  if (Math.random() < 0.08) {
    const colors = ['255,200,50', '200,150,255', '100,200,255', '255,100,100'];
    menuParticles.push({
      x: Math.random() * TITLE_W,
      y: TITLE_H + 5,
      vx: (Math.random() - 0.5) * 15,
      vy: -20 - Math.random() * 30,
      life: 2 + Math.random() * 2,
      maxLife: 4,
      type: 'float',
      color: colors[Math.floor(Math.random() * colors.length)],
      size: Math.random() * 2 + 1,
    });
  }

  // Update & draw particles
  menuParticles = menuParticles.filter(p => {
    p.x += p.vx * 0.016;
    p.y += p.vy * 0.016;
    p.life -= 0.016;
    if (p.life <= 0) return false;

    const alpha = Math.min(p.life / (p.maxLife * 0.3), 1);
    if (p.type === 'shooting') {
      tc.strokeStyle = `rgba(255,255,200,${alpha * 0.8})`;
      tc.lineWidth = 1.5;
      tc.beginPath();
      tc.moveTo(p.x, p.y);
      tc.lineTo(p.x - p.vx * 0.04, p.y - p.vy * 0.04);
      tc.stroke();
      tc.fillStyle = `rgba(255,255,255,${alpha})`;
      tc.beginPath(); tc.arc(p.x, p.y, 1.5, 0, 6.28); tc.fill();
    } else {
      const wobble = Math.sin(now * 0.005 + p.x * 0.1) * 5;
      tc.fillStyle = `rgba(${p.color},${alpha * 0.5})`;
      tc.beginPath(); tc.arc(p.x + wobble, p.y, p.size * 2, 0, 6.28); tc.fill();
      tc.fillStyle = `rgba(${p.color},${alpha * 0.8})`;
      tc.beginPath(); tc.arc(p.x + wobble, p.y, p.size, 0, 6.28); tc.fill();
    }
    return true;
  });
  if (menuParticles.length > 80) menuParticles = menuParticles.slice(-80);

  // === FLOATING FAMILY CHARACTERS ===
  floatingChars.forEach(fc => {
    fc.x += fc.vx * 0.016;
    fc.bobPhase += 0.02;
    if (fc.x > TITLE_W + 40) { fc.x = -30; fc.y = TITLE_H * 0.55 + Math.random() * TITLE_H * 0.3; }
    if (fc.x < -40) { fc.x = TITLE_W + 30; fc.y = TITLE_H * 0.55 + Math.random() * TITLE_H * 0.3; }

    const bob = Math.sin(fc.bobPhase) * 4;
    const pw = 22 * fc.scale;
    const ph = 30 * fc.scale;

    tc.save();
    tc.globalAlpha = fc.alpha;

    const glow = tc.createRadialGradient(fc.x, fc.y + ph/2 + bob, 0, fc.x, fc.y + ph/2 + bob, pw * 1.5);
    glow.addColorStop(0, `rgba(245,200,66,0.12)`);
    glow.addColorStop(1, `rgba(245,200,66,0)`);
    tc.fillStyle = glow;
    tc.beginPath(); tc.arc(fc.x, fc.y + ph/2 + bob, pw * 1.5, 0, 6.28); tc.fill();

    tc.save();
    tc.translate(fc.x - pw/2, fc.y + bob);
    tc.scale(fc.scale, fc.scale);
    tc.translate(-(fc.x - pw/2), -(fc.y + bob));
    drawCharSprite(tc, fc.x - pw/2, fc.y + bob, 22, 30, fc.data, now, {
      facing: fc.facing, bob: 0, isEnemy: false, invTimer: 0, powerUp: null
    });
    tc.restore();

    tc.font = 'bold 8px monospace';
    tc.textAlign = 'center';
    tc.fillStyle = `rgba(245,200,66,${fc.alpha})`;
    tc.fillText(fc.data.name, fc.x, fc.y + ph + bob + 12);

    tc.restore();
  });

  // === GROUND SILHOUETTE ===
  tc.fillStyle = '#0a0a12';
  tc.beginPath();
  tc.moveTo(0, TITLE_H);
  for (let gx = 0; gx <= TITLE_W; gx += 8) {
    const gh = Math.sin(gx * 0.02) * 8 + Math.sin(gx * 0.05 + 1) * 4 + 15;
    tc.lineTo(gx, TITLE_H - gh);
  }
  tc.lineTo(TITLE_W, TITLE_H);
  tc.closePath();
  tc.fill();

  // === TITLE TEXT: "DYSFUNCTIONAL FAMILY" ===
  const titleY = TITLE_H * 0.2;
  const pulse = (Math.sin(now * 0.003) + 1) / 2;
  const bigPulse = (Math.sin(now * 0.001) + 1) / 2;

  const titleGlow = tc.createRadialGradient(TITLE_W/2, titleY + 20, 10, TITLE_W/2, titleY + 20, 200);
  titleGlow.addColorStop(0, `rgba(245,200,66,${0.08 + bigPulse * 0.06})`);
  titleGlow.addColorStop(1, 'rgba(245,200,66,0)');
  tc.fillStyle = titleGlow;
  tc.fillRect(0, 0, TITLE_W, TITLE_H * 0.5);

  tc.textAlign = 'center';
  tc.textBaseline = 'middle';
  tc.font = 'bold 42px monospace';
  tc.fillStyle = '#2a1a00';
  tc.fillText('DYSFUNCTIONAL', TITLE_W/2 + 3, titleY + 3);
  tc.fillStyle = '#5a3a00';
  tc.fillText('DYSFUNCTIONAL', TITLE_W/2 + 2, titleY + 2);
  const grad1 = tc.createLinearGradient(0, titleY - 20, 0, titleY + 20);
  grad1.addColorStop(0, '#ffe066');
  grad1.addColorStop(0.5, '#f5c842');
  grad1.addColorStop(1, '#cc9900');
  tc.fillStyle = grad1;
  tc.fillText('DYSFUNCTIONAL', TITLE_W/2, titleY);
  tc.fillStyle = `rgba(255,255,200,${0.15 + pulse * 0.1})`;
  tc.fillText('DYSFUNCTIONAL', TITLE_W/2, titleY - 1);

  const famY = titleY + 50;
  tc.font = 'bold 52px monospace';
  tc.fillStyle = '#2a1a00';
  tc.fillText('FAMILY', TITLE_W/2 + 3, famY + 3);
  tc.fillStyle = '#5a3a00';
  tc.fillText('FAMILY', TITLE_W/2 + 2, famY + 2);
  const grad2 = tc.createLinearGradient(0, famY - 25, 0, famY + 25);
  grad2.addColorStop(0, '#ffe066');
  grad2.addColorStop(0.5, '#f5c842');
  grad2.addColorStop(1, '#cc9900');
  tc.fillStyle = grad2;
  tc.fillText('FAMILY', TITLE_W/2, famY);
  tc.fillStyle = `rgba(255,255,200,${0.15 + pulse * 0.1})`;
  tc.fillText('FAMILY', TITLE_W/2, famY - 1);

  const lineY = famY + 30;
  const lineW = 200 + pulse * 30;
  const lineGrad = tc.createLinearGradient(TITLE_W/2 - lineW/2, 0, TITLE_W/2 + lineW/2, 0);
  lineGrad.addColorStop(0, 'rgba(245,200,66,0)');
  lineGrad.addColorStop(0.3, 'rgba(245,200,66,0.6)');
  lineGrad.addColorStop(0.5, 'rgba(245,200,66,0.9)');
  lineGrad.addColorStop(0.7, 'rgba(245,200,66,0.6)');
  lineGrad.addColorStop(1, 'rgba(245,200,66,0)');
  tc.fillStyle = lineGrad;
  tc.fillRect(TITLE_W/2 - lineW/2, lineY, lineW, 2);

  tc.font = '10px monospace';
  tc.fillStyle = `rgba(200,200,200,${0.5 + pulse * 0.3})`;
  tc.fillText('A side-scrolling adventure! Stomp enemies! Collect coins!', TITLE_W/2, lineY + 18);

  // === PLAY BUTTON ===
  const btn = getPlayButtonRect();
  const btnPulse = (Math.sin(now * 0.005) + 1) / 2;
  const btnScale = playBtnHover ? 1.08 : 1.0;

  tc.save();
  tc.translate(btn.x + btn.w/2, btn.y + btn.h/2);
  tc.scale(btnScale, btnScale);
  tc.translate(-(btn.x + btn.w/2), -(btn.y + btn.h/2));

  const btnGlow = tc.createRadialGradient(btn.x + btn.w/2, btn.y + btn.h/2, 10, btn.x + btn.w/2, btn.y + btn.h/2, 80);
  btnGlow.addColorStop(0, `rgba(245,200,66,${playBtnHover ? 0.25 : 0.1 + btnPulse * 0.08})`);
  btnGlow.addColorStop(1, 'rgba(245,200,66,0)');
  tc.fillStyle = btnGlow;
  tc.beginPath(); tc.arc(btn.x + btn.w/2, btn.y + btn.h/2, 80, 0, 6.28); tc.fill();

  tc.fillStyle = '#4a2a00';
  tc.fillRect(btn.x + 3, btn.y + 3, btn.w, btn.h);

  const btnGrad = tc.createLinearGradient(0, btn.y, 0, btn.y + btn.h);
  btnGrad.addColorStop(0, playBtnHover ? '#ffe866' : '#f5c842');
  btnGrad.addColorStop(1, playBtnHover ? '#f5d042' : '#cc9900');
  tc.fillStyle = btnGrad;
  tc.fillRect(btn.x, btn.y, btn.w, btn.h);

  tc.fillStyle = 'rgba(255,255,255,0.2)';
  tc.fillRect(btn.x, btn.y, btn.w, btn.h / 3);

  tc.strokeStyle = '#7a4a00';
  tc.lineWidth = 2;
  tc.strokeRect(btn.x, btn.y, btn.w, btn.h);

  tc.font = 'bold 16px monospace';
  tc.textAlign = 'center';
  tc.textBaseline = 'middle';
  tc.fillStyle = '#1a0a00';
  tc.fillText('P L A Y', btn.x + btn.w/2, btn.y + btn.h/2 + 1);

  tc.restore();

  // === VERSION/CREDIT ===
  tc.font = '8px monospace';
  tc.textAlign = 'center';
  tc.fillStyle = 'rgba(150,150,150,0.4)';
  tc.fillText('v1.0 // ARROW KEYS + SPACE', TITLE_W/2, TITLE_H - 12);

  titleAnimId = requestAnimationFrame(titleLoop);
}

function stopTitleLoop() {
  if (titleAnimId) { cancelAnimationFrame(titleAnimId); titleAnimId = null; }
  if (titleCanvas) {
    titleCanvas.removeEventListener('click', handleTitleClick);
    titleCanvas.removeEventListener('mousemove', handleTitleMouseMove);
  }
}

// ═══════════════════════════════════════════════════
//  ANIMATED CHARACTER SELECT SCREEN
// ═══════════════════════════════════════════════════
let csSelectedIdx = 0;
let csHoverIdx = -1;
let csSparkles = [];
let csAnimId = null;

function initCharSelectScreen() {
  charSelectCanvas = document.getElementById('charselect-canvas');
  charSelectCtx = charSelectCanvas.getContext('2d');
  charSelectCanvas.width = TITLE_W;
  charSelectCanvas.height = TITLE_H;

  csSelectedIdx = 0;
  selectedChar = FAMILY[0];
  csSparkles = [];

  charSelectCanvas.addEventListener('click', handleCharSelectClick);
  charSelectCanvas.addEventListener('mousemove', handleCharSelectMouseMove);

  csAnimId = requestAnimationFrame(charSelectLoop);
}

function getCharCardRects() {
  const cards = [];
  const cols = 4, rows = 2;
  const cardW = 70, cardH = 70;
  const gapX = 16, gapY = 12;
  const totalW = cols * cardW + (cols - 1) * gapX;
  const totalH = rows * cardH + (rows - 1) * gapY;
  const startX = TITLE_W / 2 - totalW / 2;
  const startY = TITLE_H * 0.22;

  for (let i = 0; i < FAMILY.length; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    cards.push({
      x: startX + col * (cardW + gapX),
      y: startY + row * (cardH + gapY),
      w: cardW,
      h: cardH,
    });
  }
  return cards;
}

function getGoButtonRect() {
  const bw = 180, bh = 38;
  return { x: TITLE_W / 2 - bw / 2, y: TITLE_H * 0.78, w: bw, h: bh };
}

let csGoBtnHover = false;

function handleCharSelectMouseMove(e) {
  const rect = charSelectCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const cards = getCharCardRects();
  csHoverIdx = -1;
  for (let i = 0; i < cards.length; i++) {
    const c = cards[i];
    if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
      csHoverIdx = i;
      break;
    }
  }

  const goBtn = getGoButtonRect();
  csGoBtnHover = mx >= goBtn.x && mx <= goBtn.x + goBtn.w && my >= goBtn.y && my <= goBtn.y + goBtn.h;

  charSelectCanvas.style.cursor = (csHoverIdx >= 0 || csGoBtnHover) ? 'pointer' : 'default';
}

function handleCharSelectClick(e) {
  const rect = charSelectCanvas.getBoundingClientRect();
  const scaleX = TITLE_W / rect.width;
  const scaleY = TITLE_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const cards = getCharCardRects();
  for (let i = 0; i < cards.length; i++) {
    const c = cards[i];
    if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
      csSelectedIdx = i;
      selectedChar = FAMILY[i];
      for (let j = 0; j < 20; j++) {
        const angle = Math.random() * 6.28;
        const speed = Math.random() * 80 + 30;
        csSparkles.push({
          x: c.x + c.w/2, y: c.y + c.h/2,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 0.5 + Math.random() * 0.3,
          color: FAMILY[i].color,
        });
      }
      return;
    }
  }

  const goBtn = getGoButtonRect();
  if (mx >= goBtn.x && mx <= goBtn.x + goBtn.w && my >= goBtn.y && my <= goBtn.y + goBtn.h) {
    startGame();
  }
}

function charSelectLoop(now) {
  const cc = charSelectCtx;

  const bg = cc.createLinearGradient(0, 0, 0, TITLE_H);
  bg.addColorStop(0, '#050515');
  bg.addColorStop(0.5, '#0a0a2e');
  bg.addColorStop(1, '#150a25');
  cc.fillStyle = bg;
  cc.fillRect(0, 0, TITLE_W, TITLE_H);

  menuStars.forEach(s => {
    const tw = (Math.sin(now * 0.003 + s.twinkle) + 1) / 2;
    cc.fillStyle = `rgba(255,255,240,${0.15 + tw * 0.3})`;
    cc.beginPath(); cc.arc(s.x, s.y, s.r * 0.7, 0, 6.28); cc.fill();
  });

  // === TITLE ===
  cc.textAlign = 'center';
  cc.textBaseline = 'middle';
  cc.font = 'bold 26px monospace';
  const headerPulse = (Math.sin(now * 0.003) + 1) / 2;
  cc.fillStyle = '#3a2000';
  cc.fillText('SELECT YOUR FIGHTER', TITLE_W/2 + 2, TITLE_H * 0.08 + 2);
  const hGrad = cc.createLinearGradient(0, TITLE_H * 0.05, 0, TITLE_H * 0.11);
  hGrad.addColorStop(0, '#ffe066');
  hGrad.addColorStop(1, '#cc9900');
  cc.fillStyle = hGrad;
  cc.fillText('SELECT YOUR FIGHTER', TITLE_W/2, TITLE_H * 0.08);
  cc.fillStyle = `rgba(255,255,200,${0.1 + headerPulse * 0.15})`;
  cc.fillText('SELECT YOUR FIGHTER', TITLE_W/2, TITLE_H * 0.08 - 1);

  const lw = 250 + headerPulse * 20;
  const lg = cc.createLinearGradient(TITLE_W/2 - lw/2, 0, TITLE_W/2 + lw/2, 0);
  lg.addColorStop(0, 'rgba(245,200,66,0)');
  lg.addColorStop(0.5, 'rgba(245,200,66,0.5)');
  lg.addColorStop(1, 'rgba(245,200,66,0)');
  cc.fillStyle = lg;
  cc.fillRect(TITLE_W/2 - lw/2, TITLE_H * 0.13, lw, 1.5);

  // === CHARACTER CARDS ===
  const cards = getCharCardRects();
  cards.forEach((card, i) => {
    const fam = FAMILY[i];
    const isSelected = i === csSelectedIdx;
    const isHover = i === csHoverIdx;

    if (isSelected) {
      const selGlow = cc.createRadialGradient(card.x + card.w/2, card.y + card.h/2, 5, card.x + card.w/2, card.y + card.h/2, card.w);
      selGlow.addColorStop(0, `rgba(255,220,0,0.15)`);
      selGlow.addColorStop(1, `rgba(255,220,0,0)`);
      cc.fillStyle = selGlow;
      cc.beginPath(); cc.arc(card.x + card.w/2, card.y + card.h/2, card.w, 0, 6.28); cc.fill();
    }

    cc.fillStyle = isSelected ? 'rgba(255,220,0,0.15)' : isHover ? 'rgba(100,100,150,0.25)' : 'rgba(40,40,60,0.5)';
    cc.fillRect(card.x, card.y, card.w, card.h);

    cc.strokeStyle = isSelected ? '#ffdd00' : isHover ? '#8888cc' : '#444466';
    cc.lineWidth = isSelected ? 3 : 1.5;
    cc.strokeRect(card.x, card.y, card.w, card.h);

    if (isSelected) {
      const blink = (Math.sin(now * 0.008) + 1) / 2;
      cc.strokeStyle = `rgba(255,220,0,${0.6 + blink * 0.4})`;
      cc.lineWidth = 2;
      const cs = 8;
      cc.beginPath(); cc.moveTo(card.x-2, card.y+cs); cc.lineTo(card.x-2, card.y-2); cc.lineTo(card.x+cs, card.y-2); cc.stroke();
      cc.beginPath(); cc.moveTo(card.x+card.w-cs, card.y-2); cc.lineTo(card.x+card.w+2, card.y-2); cc.lineTo(card.x+card.w+2, card.y+cs); cc.stroke();
      cc.beginPath(); cc.moveTo(card.x-2, card.y+card.h-cs); cc.lineTo(card.x-2, card.y+card.h+2); cc.lineTo(card.x+cs, card.y+card.h+2); cc.stroke();
      cc.beginPath(); cc.moveTo(card.x+card.w-cs, card.y+card.h+2); cc.lineTo(card.x+card.w+2, card.y+card.h+2); cc.lineTo(card.x+card.w+2, card.y+card.h-cs); cc.stroke();
    }

    const sprW = 22, sprH = 30;
    const sprX = card.x + card.w/2 - sprW/2;
    const sprY = card.y + 8;
    const bob = Math.sin(now * 0.003 + i * 1.2) * 1.5;

    drawCharSprite(cc, sprX, sprY + bob, sprW, sprH, fam, now, {
      facing: 1, bob: 0, isEnemy: false, invTimer: 0, powerUp: null
    });

    cc.font = 'bold 8px monospace';
    cc.textAlign = 'center';
    cc.textBaseline = 'top';
    cc.fillStyle = isSelected ? '#ffdd00' : '#aaaacc';
    cc.fillText(fam.name, card.x + card.w/2, card.y + card.h - 16);

    cc.font = '6px monospace';
    cc.fillStyle = isSelected ? 'rgba(255,220,0,0.6)' : 'rgba(150,150,180,0.5)';
    cc.fillText(fam.cls.toUpperCase(), card.x + card.w/2, card.y + card.h - 6);
  });

  csSparkles = csSparkles.filter(s => {
    s.x += s.vx * 0.016;
    s.y += s.vy * 0.016;
    s.vy += 120 * 0.016;
    s.life -= 0.016;
    if (s.life <= 0) return false;
    const alpha = s.life * 2;
    cc.fillStyle = s.color;
    cc.globalAlpha = Math.min(alpha, 1);
    cc.beginPath(); cc.arc(s.x, s.y, 2, 0, 6.28); cc.fill();
    cc.fillStyle = '#fff';
    cc.globalAlpha = Math.min(alpha, 1) * 0.5;
    cc.beginPath(); cc.arc(s.x, s.y, 0.8, 0, 6.28); cc.fill();
    cc.globalAlpha = 1;
    return true;
  });
  if (csSparkles.length > 50) csSparkles = csSparkles.slice(-50);

  // === GO BUTTON ===
  const goBtn = getGoButtonRect();
  const goPulse = (Math.sin(now * 0.005) + 1) / 2;
  const goScale = csGoBtnHover ? 1.06 : 1.0;

  cc.save();
  cc.translate(goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2);
  cc.scale(goScale, goScale);
  cc.translate(-(goBtn.x + goBtn.w/2), -(goBtn.y + goBtn.h/2));

  const goGlow = cc.createRadialGradient(goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2, 10, goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2, 100);
  goGlow.addColorStop(0, `rgba(245,200,66,${csGoBtnHover ? 0.2 : 0.06 + goPulse * 0.06})`);
  goGlow.addColorStop(1, 'rgba(245,200,66,0)');
  cc.fillStyle = goGlow;
  cc.beginPath(); cc.arc(goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2, 100, 0, 6.28); cc.fill();

  cc.fillStyle = '#4a2a00';
  cc.fillRect(goBtn.x + 3, goBtn.y + 3, goBtn.w, goBtn.h);

  const goBtnGrad = cc.createLinearGradient(0, goBtn.y, 0, goBtn.y + goBtn.h);
  goBtnGrad.addColorStop(0, csGoBtnHover ? '#ffe866' : '#f5c842');
  goBtnGrad.addColorStop(1, csGoBtnHover ? '#f5d042' : '#cc9900');
  cc.fillStyle = goBtnGrad;
  cc.fillRect(goBtn.x, goBtn.y, goBtn.w, goBtn.h);

  cc.fillStyle = 'rgba(255,255,255,0.2)';
  cc.fillRect(goBtn.x, goBtn.y, goBtn.w, goBtn.h / 3);

  cc.strokeStyle = '#7a4a00';
  cc.lineWidth = 2;
  cc.strokeRect(goBtn.x, goBtn.y, goBtn.w, goBtn.h);

  cc.font = 'bold 16px monospace';
  cc.textAlign = 'center';
  cc.textBaseline = 'middle';
  cc.fillStyle = '#1a0a00';
  cc.fillText("L E T ' S   G O !", goBtn.x + goBtn.w/2, goBtn.y + goBtn.h/2 + 1);

  cc.restore();

  cc.font = '7px monospace';
  cc.textAlign = 'center';
  cc.fillStyle = 'rgba(150,150,150,0.35)';
  cc.fillText('CLICK A CHARACTER TO SELECT // THEN HIT GO', TITLE_W/2, TITLE_H - 10);

  csAnimId = requestAnimationFrame(charSelectLoop);
}

function stopCharSelectLoop() {
  if (csAnimId) { cancelAnimationFrame(csAnimId); csAnimId = null; }
  if (charSelectCanvas) {
    charSelectCanvas.removeEventListener('click', handleCharSelectClick);
    charSelectCanvas.removeEventListener('mousemove', handleCharSelectMouseMove);
  }
}

function goToCharSelect() {
  fadeTransition(() => {
    stopTitleLoop();
    document.getElementById('title').style.display = 'none';
    document.getElementById('charselect').style.display = 'flex';
    initCharSelectScreen();
  });
}

// ═══════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════
function startGame(){
  if (!selectedChar) {
    alert('Please select a character!');
    return;
  }

  fadeTransition(() => {
    stopCharSelectLoop();
    document.getElementById('charselect').style.display='none';
    document.getElementById('hud').style.display='flex';
    document.getElementById('game-wrap').style.display='flex';
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      document.getElementById('controls').style.display='flex';
    }
    resizeCanvas();
    initState();
    lastT=performance.now();
    showMsg('GO!',1000);
    bgMusic();
    requestAnimationFrame(loop);
  });
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
(function boot(){
  const bar=document.getElementById('lb');
  let p=0;
  const iv=setInterval(()=>{
    p+=Math.random()*18+8;
    bar.style.width=Math.min(p,95)+'%';
    if(p>=95){
      clearInterval(iv);
      bar.style.width='100%';
      setTimeout(()=>{
        document.getElementById('loading').style.display='none';
        document.getElementById('title').style.display='flex';
        initTitleScreen();
        setupControls();
        setupSwipe();
      },300);
    }
  },100);
})();
</script>
