function drawBG(now){
  // Dark blue-gray gradient sky for late-night office hours
  const skyGrad = ctx.createLinearGradient(0, 0, 0, VH);
  skyGrad.addColorStop(0, '#0a1020');
  skyGrad.addColorStop(0.5, '#1a2a3a');
  skyGrad.addColorStop(1, '#2a3a4a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, VW, VH);

  // Subtle light pollution glow from city
  const glowGrad = ctx.createLinearGradient(0, 0, 0, VH);
  glowGrad.addColorStop(0, 'rgba(50, 70, 100, 0)');
  glowGrad.addColorStop(0.7, 'rgba(80, 100, 120, 0.1)');
  glowGrad.addColorStop(1, 'rgba(100, 120, 150, 0.15)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, VW, VH);

  // Far background buildings (furthest layer, parallax 0.08)
  ctx.fillStyle = '#1a2a3a';
  for (let i = 0; i < 10; i++) {
    const bx = ((i * 400) - camX * 0.08) % LEVEL_W;
    const bh = Math.sin(i * 0.5) * 80 + 150;
    ctx.fillRect(bx, VH * 0.6 - bh, 180, bh);
  }

  // Mid-layer buildings (parallax 0.15)
  ctx.fillStyle = '#0f1a2a';
  for (let i = 0; i < 12; i++) {
    const bx = ((i * 320) - camX * 0.15) % LEVEL_W;
    const bh = Math.sin(i * 0.6) * 100 + 180;
    ctx.fillRect(bx, VH * 0.6 - bh, 150, bh);
  }

  // Lit windows on mid-layer buildings (small yellow rectangles) — deterministic positions to avoid flicker
  ctx.fillStyle = 'rgba(255, 240, 200, 0.8)';
  for (let i = 0; i < 12; i++) {
    const bx = ((i * 320) - camX * 0.15) % LEVEL_W;
    const bh = Math.sin(i * 0.6) * 100 + 180;
    // Draw scattered windows on building — positions derived from building/window index so they don't jitter each frame
    for (let w = 0; w < 8; w++) {
      const wx = bx + ((i * 73 + w * 37) % 130) + 5;
      const wy = VH * 0.6 - bh + ((i * 41 + w * 53) % Math.max(bh - 20, 1));
      ctx.fillRect(wx, wy, 8, 10);
    }
  }

  // Foreground buildings (parallax 0.3)
  ctx.fillStyle = '#0a0f1a';
  for (let i = 0; i < 15; i++) {
    const bx = ((i * 250) - camX * 0.3) % LEVEL_W;
    const bh = Math.sin(i * 0.4) * 120 + 200;
    ctx.fillRect(bx, VH * 0.6 - bh, 140, bh);
  }

  // Lit windows on foreground buildings — deterministic lit/dark pattern so they don't flash
  for (let i = 0; i < 15; i++) {
    const bx = ((i * 250) - camX * 0.3) % LEVEL_W;
    const bh = Math.sin(i * 0.4) * 120 + 200;
    // Grid pattern windows with stable on/off derived from building + cell index
    for (let row = 0; row < 12; row++) {
      for (let col = 0; col < 4; col++) {
        const wx = bx + col * 28 + 10;
        const wy = VH * 0.6 - bh + 20 + row * 18;
        // Stable pseudo-random from position; no per-frame jitter
        const h = Math.sin(i * 12.9898 + row * 78.233 + col * 37.719) * 43758.5453;
        const r = h - Math.floor(h);
        if (r > 0.55) {
          ctx.fillStyle = 'rgba(30, 30, 50, 0.7)';
        } else {
          ctx.fillStyle = 'rgba(255, 250, 200, 0.9)';
        }
        ctx.fillRect(wx, wy, 12, 12);
      }
    }
  }

  // Treat bgStars array as scattered window lights in the sky — gentle slow twinkle
  bgStars.forEach(s => {
    let flicker = (Math.sin(now * 0.0015 + s.twinkle) + 1) / 2;
    ctx.fillStyle = `rgba(255, 245, 180, ${0.6 + flicker * 0.18})`;
    ctx.fillRect(s.x - camX * 0.2 - 3, s.y - 3, 6, 6);
  });

  // Large glowing clock face at 5:00 (quitting time)
  const clockX = VW * 0.78;
  const clockY = VH * 0.14;

  // Clock glow
  const clockGlow = ctx.createRadialGradient(clockX, clockY, 20, clockX, clockY, 50);
  clockGlow.addColorStop(0, 'rgba(255, 200, 100, 0.3)');
  clockGlow.addColorStop(0.5, 'rgba(200, 150, 50, 0.1)');
  clockGlow.addColorStop(1, 'rgba(150, 100, 0, 0)');
  ctx.fillStyle = clockGlow;
  ctx.beginPath();
  ctx.arc(clockX, clockY, 50, 0, 6.28);
  ctx.fill();

  // Clock face background
  ctx.fillStyle = '#2a3a4a';
  ctx.beginPath();
  ctx.arc(clockX, clockY, 28, 0, 6.28);
  ctx.fill();

  // Clock rim (metallic look)
  ctx.strokeStyle = 'rgba(200, 180, 150, 0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(clockX, clockY, 28, 0, 6.28);
  ctx.stroke();

  // Clock face with numbers visible (simplified)
  ctx.fillStyle = '#e8d5b7';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Draw hour markers
  for (let h = 1; h <= 12; h++) {
    const angle = (h * Math.PI / 6) - Math.PI / 2;
    const mx = clockX + Math.cos(angle) * 22;
    const my = clockY + Math.sin(angle) * 22;
    if (h === 5) {
      ctx.fillStyle = 'rgba(255, 200, 100, 1)'; // Highlight 5 o'clock
    } else {
      ctx.fillStyle = 'rgba(232, 213, 183, 0.7)';
    }
    ctx.fillText(h, mx, my);
  }

  // Hour hand pointing to 5
  ctx.strokeStyle = 'rgba(255, 200, 100, 0.9)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(clockX, clockY);
  const hourAngle = (5 * Math.PI / 6) - Math.PI / 2;
  ctx.lineTo(clockX + Math.cos(hourAngle) * 12, clockY + Math.sin(hourAngle) * 12);
  ctx.stroke();

  // Minute hand pointing to 12
  ctx.strokeStyle = 'rgba(255, 220, 150, 0.9)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(clockX, clockY);
  const minAngle = -Math.PI / 2;
  ctx.lineTo(clockX + Math.cos(minAngle) * 18, clockY + Math.sin(minAngle) * 18);
  ctx.stroke();

  // Center dot
  ctx.fillStyle = 'rgba(255, 200, 100, 1)';
  ctx.beginPath();
  ctx.arc(clockX, clockY, 2, 0, 6.28);
  ctx.fill();
}

function drawPlatform(p){
  const [px,py,pw,ph,col]=p;
  const rx=px-camX, ry=py;
  if(rx+pw<0||rx>VW) return;

  // Office carpet floor (ph === 32) - dark gray carpet with baseboard molding
  if(ph===32){
    // Main carpet body with gray gradient
    const carpetGrad = ctx.createLinearGradient(0, ry, 0, ry + ph);
    carpetGrad.addColorStop(0, '#5a5a6a');
    carpetGrad.addColorStop(0.5, '#4a4a5a');
    carpetGrad.addColorStop(1, '#3a3a4a');
    ctx.fillStyle = carpetGrad;
    ctx.fillRect(rx, ry, pw, ph);

    // Soft shadow on bottom edge
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(rx, ry + ph - 5, pw, 5);

    // Baseboard molding strip at top (light brown/tan line, ~3px)
    ctx.fillStyle = '#8a7060';
    ctx.fillRect(rx, ry - 3, pw, 3);

    // Carpet texture specks - tiny random dots in varying gray shades
    ctx.fillStyle = 'rgba(100, 100, 110, 0.4)';
    for(let i = 0; i < pw; i += 8) {
      const sx1 = rx + i;
      const sy1 = ry + Math.random() * ph;
      ctx.fillRect(sx1, sy1, 1, 1);

      const sx2 = rx + i + 4;
      const sy2 = ry + Math.random() * ph;
      ctx.fillRect(sx2, sy2, 1, 1);
    }

    // Additional lighter texture specks
    ctx.fillStyle = 'rgba(80, 80, 90, 0.3)';
    for(let i = 2; i < pw; i += 12) {
      const sx = rx + i;
      const sy = ry + Math.random() * ph;
      ctx.fillRect(sx, sy, 1, 1);
    }

    // Subtle top highlight
    ctx.fillStyle = 'rgba(200, 200, 200, 0.1)';
    ctx.fillRect(rx, ry - 1, pw, 2);
  } else {
    // Office desk/shelf (warm wood-tone) - floating platforms
    const deskGrad = ctx.createLinearGradient(0, ry, 0, ry + ph);
    deskGrad.addColorStop(0, '#b8956a');
    deskGrad.addColorStop(0.5, '#9a7a5a');
    deskGrad.addColorStop(1, '#7a6040');
    ctx.fillStyle = deskGrad;
    ctx.fillRect(rx, ry, pw, ph);

    // Polished surface highlight at top (bright thin line)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    ctx.fillRect(rx, ry, pw, 2);

    // Bottom shadow for depth
    ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
    ctx.fillRect(rx, ry + ph - 2, pw, 2);

    // Thin lip/edge at the top
    ctx.fillStyle = '#6a5030';
    ctx.fillRect(rx, ry - 1, pw, 1);

    // Drawer handle shapes - small dark rounded rectangles every ~25px
    ctx.fillStyle = '#3a2a20';
    for(let hx = 15; hx < pw; hx += 25) {
      const handleX = rx + hx;
      const handleY = ry + Math.floor(ph / 2) - 2;
      // Small rounded rectangle for handle
      ctx.beginPath();
      ctx.roundRect(handleX - 4, handleY, 8, 4, 1);
      ctx.fill();
    }
  }
}

function drawCoin(c, now){
  if(c.collected) return;
  const cx=c.x-camX, cy=c.y;
  if(cx<-20||cx>VW+20) return;
  const bob=Math.sin(now*.005+c.x*.01)*3;
  const pulse=(Math.sin(now*.008+c.x*.02)+1)/2;
  const scale = Math.cos(now*.01+c.x*.005)*0.5+0.5;
  const rotation = now * 0.008 + c.x * 0.005;

  ctx.save();
  ctx.translate(cx, cy+bob);
  ctx.rotate(rotation);

  // Outer glow halo - warm brown glow for coffee
  const glowGrad = ctx.createRadialGradient(0, 0, 3, 0, 0, 13);
  glowGrad.addColorStop(0, `rgba(210,160,80,${0.4 + pulse*0.3})`);
  glowGrad.addColorStop(0.5, `rgba(200,140,60,${0.2 + pulse*0.15})`);
  glowGrad.addColorStop(1, `rgba(180,100,40,0)`);
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(0, 0, 13, 0, 6.28); ctx.fill();

  // Coffee cup body - small trapezoid (tan/white)
  ctx.fillStyle = '#f5f5dc';
  ctx.beginPath();
  ctx.moveTo(-4, -6);  // top left
  ctx.lineTo(4, -6);   // top right
  ctx.lineTo(5, 2);    // bottom right (wider at base)
  ctx.lineTo(-5, 2);   // bottom left (wider at base)
  ctx.closePath();
  ctx.fill();

  // Coffee inside (dark brown)
  ctx.fillStyle = '#8b6f47';
  ctx.beginPath();
  ctx.moveTo(-3.5, -4);
  ctx.lineTo(3.5, -4);
  ctx.lineTo(4.5, 1.5);
  ctx.lineTo(-4.5, 1.5);
  ctx.closePath();
  ctx.fill();

  // Cup handle (small arc on the right side)
  ctx.strokeStyle = '#d4a574';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.arc(6, -1, 2.5, -1.2, 1.2, false);
  ctx.stroke();

  // Steam wisps (wavy lines above the cup)
  ctx.strokeStyle = 'rgba(200,180,160,0.6)';
  ctx.lineWidth = 0.8;
  ctx.lineCap = 'round';
  // Left steam wisp
  ctx.beginPath();
  ctx.moveTo(-2, -7);
  ctx.quadraticCurveTo(-2.5, -9, -2, -11);
  ctx.stroke();
  // Middle steam wisp
  ctx.beginPath();
  ctx.moveTo(0, -7);
  ctx.quadraticCurveTo(0.3, -9, 0, -11);
  ctx.stroke();
  // Right steam wisp
  ctx.beginPath();
  ctx.moveTo(2, -7);
  ctx.quadraticCurveTo(2.5, -9, 2, -11);
  ctx.stroke();

  ctx.restore();
}

function drawPalmTree(pt, now) {
  if(pt.collected) return;
  const px = pt.x - camX;
  const baseY = GROUND_Y;
  if (px < -40 || px > VW + 40) return;

  const bob = Math.sin(now * 0.004 + pt.x * 0.01) * 1.5;
  const pulse = (Math.sin(now * 0.005 + pt.x) + 1) / 2;

  const glowColors = { shield: '#ffdd00', speed: '#4488ff', magnet: '#cc44ff' };
  const glowRGB = { shield: '255,220,0', speed: '68,136,255', magnet: '204,68,255' };
  const gc = glowColors[pt.type];
  const gr = glowRGB[pt.type];

  // Soft atmospheric glow around powerup
  const glowRad1 = ctx.createRadialGradient(px, baseY - 2, 3, px, baseY - 2, 35);
  glowRad1.addColorStop(0, `rgba(${gr}, ${0.35 + pulse * 0.15})`);
  glowRad1.addColorStop(0.5, `rgba(${gr}, ${0.15 + pulse * 0.08})`);
  glowRad1.addColorStop(1, `rgba(${gr}, 0)`);
  ctx.fillStyle = glowRad1;
  ctx.beginPath();
  ctx.arc(px, baseY - 2, 35, 0, 6.28);
  ctx.fill();

  // Ground shadow with soft feather
  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
  ctx.beginPath();
  ctx.ellipse(px, baseY - 1, 22, 4, 0, 0, 6.28);
  ctx.fill();

  // === OFFICE POWER-UP ITEM ===
  const itemH = 24;
  const topY = baseY - itemH + bob;

  if (pt.type === 'shield') {
    // Hard hat (yellow safety helmet)
    // Dome of the helmet
    const helmetGrad = ctx.createRadialGradient(px, topY - 2, 2, px, topY - 2, 10);
    helmetGrad.addColorStop(0, '#ffeb3b');
    helmetGrad.addColorStop(0.7, '#ffca28');
    helmetGrad.addColorStop(1, '#fbc02d');
    ctx.fillStyle = helmetGrad;
    ctx.beginPath();
    ctx.arc(px, topY - 2, 8, Math.PI, 0, false);
    ctx.fill();

    // Brim of the helmet
    ctx.fillStyle = '#ffa500';
    ctx.fillRect(px - 10, topY + 4, 20, 3);
    ctx.fillStyle = '#ff8c00';
    ctx.fillRect(px - 10, topY + 6, 20, 1.5);

    // Highlight on dome
    ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
    ctx.beginPath();
    ctx.arc(px - 2, topY - 5, 2, 0, 6.28);
    ctx.fill();

  } else if (pt.type === 'speed') {
    // Energy drink can (tall thin rectangle, red/blue colors)
    const canGrad = ctx.createLinearGradient(px - 3, topY, px + 3, topY);
    canGrad.addColorStop(0, '#1976d2');
    canGrad.addColorStop(0.5, '#d32f2f');
    canGrad.addColorStop(1, '#1976d2');
    ctx.fillStyle = canGrad;
    ctx.fillRect(px - 3, topY, 6, 18);

    // Can top/rim
    ctx.fillStyle = '#666666';
    ctx.fillRect(px - 3, topY - 2, 6, 2);

    // Highlight line
    ctx.strokeStyle = 'rgba(255,255,200,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px - 2, topY);
    ctx.lineTo(px - 2, topY + 16);
    ctx.stroke();

    // Lightning bolt pattern (speed indicator)
    ctx.strokeStyle = '#ffeb3b';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(px + 0.5, topY + 4);
    ctx.lineTo(px - 1, topY + 8);
    ctx.lineTo(px + 0.5, topY + 8);
    ctx.lineTo(px - 1, topY + 12);
    ctx.stroke();

  } else if (pt.type === 'magnet') {
    // Blueprint roll (blue rolled paper tube with white lines)
    // Main rolled paper cylinder
    const rollGrad = ctx.createLinearGradient(px - 4, topY, px + 4, topY);
    rollGrad.addColorStop(0, '#0d47a1');
    rollGrad.addColorStop(0.5, '#1565c0');
    rollGrad.addColorStop(1, '#0d47a1');
    ctx.fillStyle = rollGrad;
    ctx.beginPath();
    ctx.ellipse(px, topY, 4, 5, 0, 0, 6.28);
    ctx.fill();

    // End cap cylinders (rolled edges)
    ctx.fillStyle = '#1976d2';
    ctx.beginPath();
    ctx.arc(px, topY - 5, 2, 0, 6.28);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px, topY + 5, 2, 0, 6.28);
    ctx.fill();

    // Blueprint lines (grid pattern on the roll)
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 0.8;
    // Horizontal lines
    ctx.beginPath();
    ctx.moveTo(px - 3, topY - 2);
    ctx.lineTo(px + 3, topY - 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px - 3, topY);
    ctx.lineTo(px + 3, topY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px - 3, topY + 2);
    ctx.lineTo(px + 3, topY + 2);
    ctx.stroke();

    // Vertical lines
    ctx.beginPath();
    ctx.moveTo(px - 2, topY - 4);
    ctx.lineTo(px - 2, topY + 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px, topY - 5);
    ctx.lineTo(px, topY + 5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px + 2, topY - 4);
    ctx.lineTo(px + 2, topY + 4);
    ctx.stroke();
  }

  // Type label with soft shadow and glow
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  const label = pt.type.toUpperCase();

  // Shadow text
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillText(label, px + 0.5, topY - 4.5);

  // Main text with color glow
  ctx.globalAlpha = 0.6 + pulse * 0.4;
  ctx.fillStyle = gc;
  ctx.fillText(label, px, topY - 6);
  ctx.globalAlpha = 1;
}

function drawSparkle(s) {
  const alpha = Math.max(0, Math.min(1, s.life * 1.6));
  const size = 2.5 + s.life * 2;
  const sx = s.x - camX;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Main sparkle with soft radial gradient
  const sparkGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
  sparkGrad.addColorStop(0, s.color);
  sparkGrad.addColorStop(0.4, s.color + '99');
  sparkGrad.addColorStop(1, s.color + '00');
  ctx.fillStyle = sparkGrad;
  ctx.beginPath();
  ctx.arc(sx, s.y, size, 0, 6.28);
  ctx.fill();

  // Soft star rays with painterly strokes
  ctx.strokeStyle = s.color;
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = alpha * 0.7;
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const rayLen = size * 1.2;
    ctx.beginPath();
    ctx.moveTo(sx, s.y);
    ctx.lineTo(sx + Math.cos(angle) * rayLen, s.y + Math.sin(angle) * rayLen);
    ctx.stroke();
  }

  // Inner bright core
  ctx.globalAlpha = alpha * 0.8;
  const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.5);
  coreGrad.addColorStop(0, '#ffffff');
  coreGrad.addColorStop(0.6, '#ffffffcc');
  coreGrad.addColorStop(1, '#ffffff00');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(sx, s.y, size * 0.5, 0, 6.28);
  ctx.fill();

  ctx.restore();
}

function drawProjectile(proj, now) {
  const px = proj.x - camX;
  const py = proj.y;
  if (px < -20 || px > VW + 20) return;

  // Gentle wobble so envelopes feel thrown, not stamped
  const wobble = Math.sin(now * 0.006 + proj.x * 0.05) * 0.18;
  const pulse = (Math.sin(now * 0.01) + 1) / 2;

  // Soft motion-trail (papery, cool tone)
  const trail1Grad = ctx.createRadialGradient(
    px - proj.vx * 0.03, py - proj.vy * 0.03, 0,
    px - proj.vx * 0.03, py - proj.vy * 0.03, 9
  );
  trail1Grad.addColorStop(0, `rgba(220,220,255,${0.22 + pulse * 0.1})`);
  trail1Grad.addColorStop(1, `rgba(180,180,220,0)`);
  ctx.fillStyle = trail1Grad;
  ctx.beginPath(); ctx.arc(px - proj.vx * 0.03, py - proj.vy * 0.03, 9, 0, 6.28); ctx.fill();

  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(wobble);

  // Faint glow
  const glowGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 14);
  glowGrad.addColorStop(0, `rgba(255,240,200,${0.28 + pulse*0.15})`);
  glowGrad.addColorStop(1, 'rgba(255,220,150,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(0, 0, 14, 0, 6.28); ctx.fill();

  // Envelope body (rectangle) — slight tilt up for "flying" feel
  const envW = 14, envH = 10;
  const envX = -envW / 2, envY = -envH / 2;

  // Drop shadow under envelope
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(envX + 1, envY + 1, envW, envH);

  // Envelope paper gradient (off-white → cream)
  const paperGrad = ctx.createLinearGradient(0, envY, 0, envY + envH);
  paperGrad.addColorStop(0, '#ffffff');
  paperGrad.addColorStop(0.5, '#f6f2e6');
  paperGrad.addColorStop(1, '#e4dcc4');
  ctx.fillStyle = paperGrad;
  ctx.fillRect(envX, envY, envW, envH);

  // Envelope outline
  ctx.strokeStyle = '#6a5a3a';
  ctx.lineWidth = 0.8;
  ctx.strokeRect(envX, envY, envW, envH);

  // Envelope FLAP — triangle from top corners down to center
  ctx.beginPath();
  ctx.moveTo(envX, envY);
  ctx.lineTo(0, envY + envH * 0.55);
  ctx.lineTo(envX + envW, envY);
  // Fill flap with slightly darker cream
  const flapGrad = ctx.createLinearGradient(0, envY, 0, envY + envH * 0.55);
  flapGrad.addColorStop(0, '#f2ead0');
  flapGrad.addColorStop(1, '#d8cba0');
  ctx.fillStyle = flapGrad;
  ctx.fill();
  ctx.strokeStyle = '#6a5a3a';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Red WAX SEAL / urgent dot in the center
  const sealGrad = ctx.createRadialGradient(0, envY + envH * 0.6, 0.5, 0, envY + envH * 0.6, 2.2);
  sealGrad.addColorStop(0, '#ff7070');
  sealGrad.addColorStop(0.6, '#cc2222');
  sealGrad.addColorStop(1, '#881010');
  ctx.fillStyle = sealGrad;
  ctx.beginPath(); ctx.arc(0, envY + envH * 0.55, 1.8, 0, 6.28); ctx.fill();

  // Tiny "@" on the envelope body (stylized: short arc)
  ctx.strokeStyle = '#3a5a9a';
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.arc(envX + 3, envY + envH - 2.5, 1.2, 0, 6.28);
  ctx.stroke();

  // Subtle highlight on top edge
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(envX + 1, envY + 0.5);
  ctx.lineTo(envX + envW - 1, envY + 0.5);
  ctx.stroke();

  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  SHARED CHARACTER SPRITE DRAWING
// ═══════════════════════════════════════════════════
function drawCharSprite(ctx, cx, cy, w, h, data, now, opts) {
  const facing  = opts.facing  || 1;
  const bob     = opts.bob     || 0;
  const isEnemy = opts.isEnemy || false;
  const frame   = opts.frame   || 0;

  ctx.save();
  if (facing === -1) {
    ctx.translate(cx + w, cy); ctx.scale(-1, 1); ctx.translate(-w, 0);
  } else {
    ctx.translate(cx, cy);
  }

  const x = 0, y = 0, pw = w, ph = h;
  const cls = data.cls;

  // ── shared inner helpers with painterly style ──
  const shadow = () => {
    const shadowGrad = ctx.createRadialGradient(pw/2, ph+bob, 0, pw/2, ph+bob, pw*0.4);
    shadowGrad.addColorStop(0, 'rgba(0,0,0,0.35)');
    shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shadowGrad;
    ctx.beginPath(); ctx.ellipse(pw/2, ph+bob, pw*0.4, 3, 0, 0, 6.28); ctx.fill();
  };
  const boots = (lx, rx, by, bw, bh, col) => {
    const stride = frame === 1 ? 0.09 : -0.09;
    const bootGrad = ctx.createLinearGradient(0, y+ph*by+bob, 0, y+ph*(by+bh)+bob);
    bootGrad.addColorStop(0, col);
    bootGrad.addColorStop(1, '#1a1a1a');
    ctx.fillStyle = bootGrad;
    ctx.beginPath(); ctx.ellipse(x+pw*(lx+stride)+pw*bw/2, y+ph*by+bob+ph*bh/2, pw*bw/2, ph*bh/2, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+pw*(rx-stride)+pw*bw/2, y+ph*by+bob+ph*bh/2, pw*bw/2, ph*bh/2, 0, 0, 6.28); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.8;
    ctx.stroke();
  };
  // stdEyes: rounder eyes with highlights
  const stdEyes = (lx, rx, ey) => {
    // White of eyes (rounded)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(x+pw*lx+pw*0.04, y+ph*ey+bob+ph*0.03, pw*0.045, ph*0.035, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+pw*rx+pw*0.04, y+ph*ey+bob+ph*0.03, pw*0.045, ph*0.035, 0, 0, 6.28); ctx.fill();
    // Pupils (darker)
    ctx.fillStyle = '#1a1a2a';
    ctx.beginPath(); ctx.arc(x+pw*(lx+0.03), y+ph*(ey+0.01)+bob, pw*0.018, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(x+pw*(rx+0.03), y+ph*(ey+0.01)+bob, pw*0.018, 0, 6.28); ctx.fill();
    // Highlights
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(x+pw*(lx+0.045), y+ph*(ey-0.005)+bob, pw*0.01, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(x+pw*(rx+0.045), y+ph*(ey-0.005)+bob, pw*0.01, 0, 6.28); ctx.fill();
  };
  // angryBrows: softer brow strokes
  const angryBrows = (lx1, y1, lx2, y2, rx1, rx2) => {
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x+pw*lx1, y+ph*y1+bob); ctx.lineTo(x+pw*lx2, y+ph*y2+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+pw*rx1, y+ph*y1+bob); ctx.lineTo(x+pw*rx2, y+ph*y2+bob); ctx.stroke();
  };
  // skinArms: painted arms with gradient and soft edges
  const skinArms = (ay, ah, lw) => {
    const armGrad = ctx.createLinearGradient(0, y+ph*ay+bob, 0, y+ph*(ay+ah)+bob);
    armGrad.addColorStop(0, data.skin);
    armGrad.addColorStop(1, '#9a7563');
    ctx.fillStyle = armGrad;
    ctx.beginPath(); ctx.ellipse(x-pw*0.05, y+ph*ay+bob+ph*ah/2, pw*0.12, ph*ah/2, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+pw*0.95, y+ph*ay+bob+ph*ah/2, pw*0.12, ph*ah/2, 0, 0, 6.28); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = lw * 0.8;
    ctx.stroke();
  };
  // ─────────────────────────────────────────────────────────────────────

  if (cls === 'intern') {
    // Intern architect: hard hat, glasses, safety vest, clipboard
    shadow();
    boots(0.08, 0.56, 0.72, 0.36, 0.26, '#4a3a2a');

    // White dress shirt underlayer
    const shirtGrad = ctx.createLinearGradient(0, y+ph*0.38+bob, 0, y+ph*0.72+bob);
    shirtGrad.addColorStop(0, '#f4f4f0');
    shirtGrad.addColorStop(1, '#c8c8c0');
    ctx.fillStyle = shirtGrad;
    ctx.beginPath(); ctx.ellipse(x+pw*0.5, y+ph*0.55+bob, pw*0.42, ph*0.22, 0, 0, 6.28); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 0.7; ctx.stroke();

    // Safety vest (hi-vis yellow) over the shirt
    const vestGrad = ctx.createLinearGradient(0, y+ph*0.4+bob, 0, y+ph*0.7+bob);
    vestGrad.addColorStop(0, '#fff15a');
    vestGrad.addColorStop(0.5, data.color);
    vestGrad.addColorStop(1, '#c9a200');
    ctx.fillStyle = vestGrad;
    ctx.beginPath();
    ctx.moveTo(x+pw*0.18, y+ph*0.42+bob);
    ctx.lineTo(x+pw*0.82, y+ph*0.42+bob);
    ctx.lineTo(x+pw*0.88, y+ph*0.72+bob);
    ctx.lineTo(x+pw*0.12, y+ph*0.72+bob);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 0.8; ctx.stroke();
    // Vest zipper / seam
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(x+pw*0.5, y+ph*0.42+bob); ctx.lineTo(x+pw*0.5, y+ph*0.72+bob); ctx.stroke();
    // Reflective stripe
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fillRect(x+pw*0.15, y+ph*0.6+bob, pw*0.7, ph*0.03);

    skinArms(0.42, 0.3, 1);

    // Head
    const headGrad = ctx.createRadialGradient(x+pw*0.5, y+ph*0.22+bob, pw*0.05, x+pw*0.5, y+ph*0.22+bob, pw*0.35);
    headGrad.addColorStop(0, data.skin);
    headGrad.addColorStop(0.8, '#9a7563');
    headGrad.addColorStop(1, '#7a5a4a');
    ctx.fillStyle = headGrad;
    ctx.beginPath(); ctx.ellipse(x+pw*0.5, y+ph*0.24+bob, pw*0.33, ph*0.23, 0, 0, 6.28); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.stroke();

    // Small tuft of hair peeking under the hard hat
    ctx.fillStyle = data.hair;
    ctx.beginPath(); ctx.ellipse(x+pw*0.5, y+ph*0.17+bob, pw*0.28, ph*0.05, 0, 0, 6.28); ctx.fill();

    // HARD HAT (safety yellow w/ brim)
    const hatGrad = ctx.createRadialGradient(x+pw*0.5, y+ph*0.08+bob, pw*0.08, x+pw*0.5, y+ph*0.1+bob, pw*0.4);
    hatGrad.addColorStop(0, '#fff280');
    hatGrad.addColorStop(0.6, '#f5c842');
    hatGrad.addColorStop(1, '#b88b10');
    ctx.fillStyle = hatGrad;
    // Dome
    ctx.beginPath(); ctx.ellipse(x+pw*0.5, y+ph*0.11+bob, pw*0.32, ph*0.14, 0, Math.PI, 0); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.9; ctx.stroke();

    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.7; ctx.stroke();

    // Hair with gradient
    const defHairGrad = ctx.createLinearGradient(0, y+ph*0.04+bob, 0, y+ph*0.14+bob);
    defHairGrad.addColorStop(0, data.hair);
    defHairGrad.addColorStop(1, '#0a0a0a');
    ctx.fillStyle = defHairGrad;
    ctx.beginPath(); ctx.ellipse(x+pw*0.5, y+ph*0.09+bob, pw*0.4, ph*0.11, 0, 0, 6.28); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 0.8; ctx.stroke();

    stdEyes(0.28, 0.64, 0.15);
  }

  ctx.restore();
}

function drawEnemy(enemy, now){
  const sx = enemy.x - camX;
  if(sx < -40 || sx > VW + 40) return;

  const pw = enemy.w, ph = enemy.h;
  const foot = enemy.y;
  const ty = foot - ph;
  const bob = Math.sin(now * 0.003 + enemy.bobPhi) * 0.8;
  const b = bob;
  const isRight = enemy.facing > 0;

  // Handle flash timer for damaged warriors
  if (enemy.flashTimer) {
    enemy.flashTimer -= 0.016;  // Rough dt estimate for drawing
  }
  let flashAlpha = 0;
  if (enemy.flashTimer && enemy.flashTimer > 0) {
    flashAlpha = (enemy.flashTimer / 0.2) * 0.4;
  }

  // Draw character sprite
  const charData = {
    name: enemy.name,
    color: enemy.color,
    skin: enemy.skin,
    hair: enemy.hair,
    cls: enemy.cls
  };

  drawCharSprite(ctx, sx - pw/2, ty, pw, ph, charData, now, {
    facing: isRight ? 1 : -1,
    bob: b,
    isEnemy: true,
    frame: enemy.frame,
  });

  // Draw white flash overlay for damaged warriors
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(sx - pw/2, ty, pw, ph);
  }

  // Draw name with soft glow text shadow
  ctx.font='bold 6px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 3;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  ctx.fillText(enemy.name, sx, ty+b);
  ctx.fillStyle='#cc3333';
  ctx.shadowColor = 'rgba(204,51,51,0.3)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.fillText(enemy.name, sx, ty+b);
  ctx.shadowColor = 'transparent';

  // Show HP for warrior tanks
  if (enemy.behavior === 'tank' && enemy.hp) {
    ctx.fillStyle = enemy.hp === 2 ? '#ffdd00' : '#ff4444';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 3;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;
    ctx.fillText(`HP:${enemy.hp}`, sx, ty + b - 14);
    ctx.shadowColor = 'transparent';
  }

  // Draw warning exclamation with glow
  ctx.fillStyle='#cc3333';
  ctx.font='bold 10px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.shadowColor = 'rgba(204,51,51,0.4)';
  ctx.shadowBlur = 5;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.fillText('!', sx, ty+b-8);
  ctx.shadowColor = 'transparent';
}

function drawPlayer(now){
  const p=player;
  const sx=p.x-camX;
  const pw=p.w, ph=p.h;
  const y=p.y;
  const isRight = p.vx>=0;
  const bob = p.onGround && Math.abs(p.vx) > 10
    ? Math.sin(now * 0.018) * 1.5   // walking bob
    : p.onGround
      ? Math.sin(now * 0.002) * 0.4 // idle breathe
      : 0;
  const b=bob;
  const isInvincible = p.invTimer > 0;
  const flashOn = Math.sin(now * 0.02) > 0;

  if (isInvincible && !flashOn) {
    ctx.globalAlpha = 0.5;
  }

  if (p.powerUp === 'shield') {
    ctx.fillStyle = '#ffdd0044';
    ctx.beginPath();
    ctx.arc(sx+pw/2, y+ph/2+b, pw*1.5, 0, 6.28);
    ctx.fill();
    ctx.strokeStyle = '#ffdd00';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Apply squash/stretch
  ctx.save();
  const sqCx = sx + pw/2;
  const sqCy = y + ph;
  ctx.translate(sqCx, sqCy);
  ctx.scale(playerSquash.sx, playerSquash.sy);
  ctx.translate(-sqCx, -sqCy);

  // Speed trail effect
  if (p.powerUp === 'speed' && Math.abs(p.vx) > 80) {
    const dir = p.vx > 0 ? -1 : 1;
    for (let i = 1; i <= 3; i++) {
      ctx.globalAlpha = 0.15 / i;
      const trailData = {
        name: p.charName, color: p.charColor,
        skin: p.charSkin, hair: p.charHair, cls: p.charCls
      };
      drawCharSprite(ctx, sx - pw/2 + dir * i * 8, y, pw, ph, trailData, now, {
        facing: isRight ? 1 : -1, bob: b, isEnemy: false, invTimer: 0, powerUp: null
      });
    }
    ctx.globalAlpha = isInvincible && !flashOn ? 0.5 : 1;
  }

  // Draw character sprite using shared function
  const charData = {
    name: p.charName,
    color: p.charColor,
    skin: p.charSkin,
    hair: p.charHair,
    cls: p.charCls
  };

  drawCharSprite(ctx, sx - pw/2, y, pw, ph, charData, now, {
    facing: isRight ? 1 : -1,
    walking: p.onGround && Math.abs(p.vx) > 10,
    jumping: !p.onGround,
    frame: p.frame,
    bob: b,
    isEnemy: false,
    invTimer: p.invTimer,
    powerUp: p.powerUp
  });

  ctx.globalAlpha = 1;
  ctx.restore(); // end squash/stretch

  // Draw player name with soft glow shadow
  ctx.font='bold 6px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.fillStyle='#fff';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  ctx.fillText(p.charName,sx+pw/2,y+b);
  ctx.shadowColor = 'rgba(255,255,255,0.3)';
  ctx.shadowBlur = 3;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.fillText(p.charName,sx+pw/2,y+b);
  ctx.shadowColor = 'transparent';
}

function drawBoss(now) {
  if (!boss || boss.y < -100) return;

  const sx = boss.x - camX;
  const sy = boss.y;

  if (sx < -100 || sx > VW + 100) return;

  // Draw boss health bar above
  const hpBarWidth = 60;
  const hpBarHeight = 4;
  const hpBarX = sx - hpBarWidth / 2;
  const hpBarY = sy - boss.h - 15;

  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(hpBarX - 1, hpBarY - 1, hpBarWidth + 2, hpBarHeight + 2);
  ctx.fillStyle = '#ff2222';
  ctx.fillRect(hpBarX, hpBarY, hpBarWidth * Math.max(0, boss.hp / boss.maxHp), hpBarHeight);
  ctx.strokeStyle = '#ffff00';
  ctx.lineWidth = 1;
  ctx.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);

  // Draw boss name with magical glow
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.shadowColor = 'rgba(102,51,153,0.6)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.fillText('BLDG INSPECTOR', sx, hpBarY - 2);
  ctx.shadowColor = 'transparent';

  // Flash white when invulnerable
  const isFlashing = boss.invTimer > 0;
  const flashOn = Math.floor(boss.invTimer * 20) % 2 === 0;
  ctx.globalAlpha = isFlashing && !flashOn ? 0.5 : 1;

  // Draw office printer body (boxy gray with metallic gradient)
  const printerBodyGrad = ctx.createLinearGradient(sx - 30, sy - 20, sx + 30, sy + 10);
  printerBodyGrad.addColorStop(0, isFlashing && flashOn ? '#ffffff' : '#b8b8b8');
  printerBodyGrad.addColorStop(0.5, isFlashing && flashOn ? '#ffffcc' : '#888888');
  printerBodyGrad.addColorStop(1, isFlashing && flashOn ? '#ffff99' : '#5a5a5a');

  // Main printer body (rounded rectangle)
  ctx.fillStyle = printerBodyGrad;
  ctx.beginPath();
  ctx.roundRect(sx - 28, sy - 18, 56, 36, 4);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Paper tray on top with paper sheets sticking out
  ctx.fillStyle = '#9a9a9a';
  ctx.fillRect(sx - 24, sy - 24, 48, 6);
  // Paper sheets sticking out
  ctx.strokeStyle = '#e8e8e8';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'butt';
  for (let p = -8; p <= 8; p += 5) {
    ctx.beginPath();
    ctx.moveTo(sx + p, sy - 24);
    ctx.lineTo(sx + p - 2, sy - 30 + Math.sin(now * 0.003 + p) * 1);
    ctx.stroke();
  }

  // Angry red LED eyes (top front of printer)
  const eyeGlow1 = ctx.createRadialGradient(sx - 10, sy - 12, 0, sx - 10, sy - 12, 6);
  eyeGlow1.addColorStop(0, 'rgba(255, 50, 50, 0.9)');
  eyeGlow1.addColorStop(0.5, 'rgba(255, 0, 0, 0.4)');
  eyeGlow1.addColorStop(1, 'rgba(255, 0, 0, 0)');
  ctx.fillStyle = eyeGlow1;
  ctx.beginPath();
  ctx.arc(sx - 10, sy - 12, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ff3333';
  ctx.beginPath();
  ctx.arc(sx - 10, sy - 12, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(sx - 10, sy - 12, 2, 0, Math.PI * 2);
  ctx.fill();

  // Second angry red LED eye
  const eyeGlow2 = ctx.createRadialGradient(sx + 10, sy - 12, 0, sx + 10, sy - 12, 6);
  eyeGlow2.addColorStop(0, 'rgba(255, 50, 50, 0.9)');
  eyeGlow2.addColorStop(0.5, 'rgba(255, 0, 0, 0.4)');
  eyeGlow2.addColorStop(1, 'rgba(255, 0, 0, 0)');
  ctx.fillStyle = eyeGlow2;
  ctx.beginPath();
  ctx.arc(sx + 10, sy - 12, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ff3333';
  ctx.beginPath();
  ctx.arc(sx + 10, sy - 12, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(sx + 10, sy - 12, 2, 0, Math.PI * 2);
  ctx.fill();

  // Highlight on top of printer
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(sx - 26, sy - 16, 52, 3);

  // Paper output trays on the sides (like wings)
  // Left output tray
  ctx.save();
  ctx.translate(sx - 30, sy - 2);
  ctx.rotate(-0.4);
  ctx.fillStyle = '#c0c0c0';
  ctx.fillRect(0, 0, 16, 8);
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.stroke();
  // Paper in tray
  ctx.strokeStyle = '#e8e8e8';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(2 + i * 3, 1);
    ctx.lineTo(2 + i * 3, 7);
    ctx.stroke();
  }
  ctx.restore();

  // Right output tray
  ctx.save();
  ctx.translate(sx + 30, sy - 2);
  ctx.rotate(0.4);
  ctx.fillStyle = '#c0c0c0';
  ctx.fillRect(-16, 0, 16, 8);
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.stroke();
  // Paper in tray
  ctx.strokeStyle = '#e8e8e8';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-14 + i * 3, 1);
    ctx.lineTo(-14 + i * 3, 7);
    ctx.stroke();
  }
  ctx.restore();

  // Front paper access door/slot
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(sx - 20, sy, 40, 12);
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(sx - 20, sy, 40, 12);

  // Moving paper in front slot (indicates jam or activity)
  const paperPos = (now / 100) % 40;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx - 20 + paperPos, sy + 4);
  ctx.lineTo(sx - 20 + paperPos, sy + 8);
  ctx.stroke();

  // Telegraph visuals
  if (boss.telegraphing) {
    // Pulsing warning aura
    const pulseIntensity = Math.abs(Math.sin(now / 200));
    ctx.fillStyle = `rgba(255, 0, 0, ${0.3 * pulseIntensity})`;
    ctx.beginPath();
    ctx.arc(sx, sy - 15, 55 + pulseIntensity * 10, 0, Math.PI * 2);
    ctx.fill();

    // Bright eye glow
    const brightEyeColor = '#ffff00';
    ctx.fillStyle = brightEyeColor;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(sx + 36, sy - 24, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx + 38, sy - 12, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Attack-specific telegraph visuals
    if (boss.telegraphType === 'divebomb') {
      // Tilt downward for dive
      ctx.save();
      ctx.translate(sx, sy - 15);
      ctx.rotate(0.3);
      ctx.translate(-sx, -(sy - 15));
      ctx.fillStyle = '#ff4444';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.ellipse(sx, sy - 15, 40, 30, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else if (boss.telegraphType === 'firebreath') {
      // Orange glow at mouth for fire breath
      ctx.fillStyle = '#ff8833';
      ctx.globalAlpha = 0.6 + pulseIntensity * 0.3;
      ctx.beginPath();
      ctx.ellipse(sx + 38, sy - 18, 12, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Exclamation marks above boss
    ctx.fillStyle = '#ffff00';
    ctx.globalAlpha = 0.8;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    const exclamationX = sx - 15;
    const exclamationY = sy - boss.h - 25 - Math.sin(now / 300) * 5;
    ctx.fillText('!', exclamationX, exclamationY);
    ctx.fillText('!', sx, exclamationY);
    ctx.fillText('!', sx + 15, exclamationY);
    ctx.globalAlpha = 1;
  }

  ctx.globalAlpha = 1;
}

function drawFlag(now){

  frameGrad.addColorStop(1, '#7a6a5a');

  ctx.strokeStyle = '#4a4a4a';
  ctx.lineWidth = 2;
  ctx.strokeRect(fx - 12, fy + 8, 24, 32);

  // Door outline/frame fill with depth
  ctx.fillStyle = '#6a5a4a';
  ctx.fillRect(fx - 11, fy + 9, 22, 30);

  // Door handle
  ctx.fillStyle = '#c9a961';
  ctx.beginPath();
  ctx.arc(fx + 10, fy + 23, 1.5, 0, 6.28);

  ctx.strokeStyle = '#8a7a60';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Vertical line in door (divider)

  ctx.moveTo(fx, fy + 9);
  ctx.lineTo(fx, fy + 39);

  // Horizontal divider

  ctx.moveTo(fx - 11, fy + 24);

  // Green EXIT sign above with glow

  exitGlowGrad.addColorStop(0.5, 'rgba(50, 200, 50, 0.15)');

  ctx.arc(fx, fy - 2, 20, 0, 6.28);
